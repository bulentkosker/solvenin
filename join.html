<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzBhMGYxZSIvPjx0ZXh0IHg9IjYiIHk9IjIzIiBmb250LWZhbWlseT0iSW50ZXIsc2Fucy1zZXJpZiIgZm9udC13ZWlnaHQ9IjgwMCIgZm9udC1zaXplPSIyMCIgZmlsbD0id2hpdGUiPnM8L3RleHQ+PGNpcmNsZSBjeD0iMjUiIGN5PSIyMiIgcj0iNCIgZmlsbD0iIzNiODJmNiIvPjwvc3ZnPg==">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Company — Solvenin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --emerald: #0d4f3c;
  --emerald-dark: #0a2e20;
  --emerald-mid: #1a6b52;
  --emerald-light: rgba(13,79,60,0.08);
  --gold: #f0a500;
  --gold-dark: #d99200;
  --gold-light: #fff8e6;
  --bg: #f8f7f4;
  --text: #1a1a2e;
  --gray-light: #e8e4dc;
  --gray-mid: #b8b2a8;
  --gray-dark: #6b6560;
  --white: #ffffff;
  --red: #ef4444;
  --red-light: #fef2f2;
  --green: #10b981;
  --green-light: #ecfdf5;
  --orange: #f59e0b;
  --orange-light: #fffbeb;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.join-container {
  width: 100%;
  max-width: 480px;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo a {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  color: var(--emerald-dark);
  text-decoration: none;
  letter-spacing: -0.5px;
}
.logo a .dot { color: var(--gold); }

.card {
  background: var(--white);
  border: 1px solid var(--gray-light);
  border-radius: 16px;
  padding: 40px 36px;
  box-shadow: var(--shadow-md);
}

.card-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin: 0 auto 20px;
}
.card-icon.invite { background: var(--emerald-light); }
.card-icon.error { background: var(--red-light); }
.card-icon.warning { background: var(--orange-light); }
.card-icon.success { background: var(--green-light); }

.card-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  color: var(--text);
}

.card-subtitle {
  font-size: 14px;
  color: var(--gray-dark);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 28px;
}

.invite-details {
  background: var(--bg);
  border: 1px solid var(--gray-light);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 28px;
}
.invite-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
}
.invite-row + .invite-row {
  border-top: 1px solid var(--gray-light);
}
.invite-label {
  font-size: 13px;
  color: var(--gray-dark);
  font-weight: 500;
}
.invite-value {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.role-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  text-transform: capitalize;
  background: var(--emerald-light);
  color: var(--emerald);
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.btn-primary {
  background: var(--emerald);
  color: var(--white);
}
.btn-primary:hover:not(:disabled) {
  background: var(--emerald-dark);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn-secondary {
  background: var(--white);
  color: var(--text);
  border: 1px solid var(--gray-light);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--bg);
  border-color: var(--gray-mid);
}
.btn-danger {
  background: var(--white);
  color: var(--red);
  border: 1px solid var(--red);
}
.btn-danger:hover:not(:disabled) {
  background: var(--red-light);
}

.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 16px 0;
  color: var(--gray-mid);
  font-size: 12px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gray-light);
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--gray-light);
  border-top-color: var(--emerald);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-state {
  text-align: center;
  padding: 40px 0;
}
.loading-text {
  color: var(--gray-dark);
  font-size: 14px;
}

.toast {
  position: fixed;
  top: 24px;
  right: 24px;
  padding: 14px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  transform: translateX(120%);
  transition: transform 0.3s ease;
  z-index: 1000;
}
.toast.show { transform: translateX(0); }
.toast.success { background: var(--green); color: var(--white); }
.toast.error { background: var(--red); color: var(--white); }
</style>
</head>
<body>

<div class="join-container">
  <div class="logo">
    <a href="index.html">solvenin<span class="dot">.</span></a>
  </div>

  <div class="card" id="card">
    <div class="loading-state" id="loading-state">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">Loading invitation...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jaakjdzpdizjbzvbtcld.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── i18n ──
const T = {
  en: {
    loading: 'Loading invitation...',
    invalid_title: 'Invalid Invitation',
    invalid_msg: 'This invitation link is invalid or does not exist.',
    expired_title: 'Invitation Expired',
    expired_msg: 'This invitation has expired. Please ask the company administrator to send a new one.',
    accepted_title: 'Already Accepted',
    accepted_msg: 'This invitation has already been used.',
    cancelled_title: 'Invitation Cancelled',
    cancelled_msg: 'This invitation has been cancelled by the administrator.',
    invite_title: 'You\'re Invited!',
    invite_msg: 'You\'ve been invited to join a company on Solvenin.',
    company: 'Company',
    role: 'Role',
    invited_as: 'Invited As',
    login_prompt: 'Please sign in or create an account to accept this invitation.',
    btn_login: 'Sign In',
    btn_register: 'Create Account',
    btn_accept: 'Join',
    btn_decline: 'Decline Invitation',
    accepting: 'Joining...',
    success_title: 'Welcome!',
    success_msg: 'You have successfully joined',
    success_redirect: 'Redirecting to dashboard...',
    error_already_member: 'You are already a member of this company.',
    error_generic: 'Something went wrong. Please try again.',
    or: 'or',
    go_dashboard: 'Go to Dashboard',
    go_home: 'Go to Homepage',
  },
  tr: {
    loading: 'Davetiye yukleniyor...',
    invalid_title: 'Gecersiz Davetiye',
    invalid_msg: 'Bu davetiye baglantisi gecersiz veya mevcut degil.',
    expired_title: 'Davetiye Suresi Dolmus',
    expired_msg: 'Bu davetiyenin suresi dolmus. Lutfen sirket yoneticisinden yeni bir davetiye gondermesini isteyin.',
    accepted_title: 'Zaten Kabul Edilmis',
    accepted_msg: 'Bu davetiye zaten kullanilmis.',
    cancelled_title: 'Davetiye Iptal Edildi',
    cancelled_msg: 'Bu davetiye yonetici tarafindan iptal edilmistir.',
    invite_title: 'Davet Edildiniz!',
    invite_msg: 'Solvenin uzerinde bir sirkete katilmaya davet edildiniz.',
    company: 'Sirket',
    role: 'Rol',
    invited_as: 'Davet Edilen E-posta',
    login_prompt: 'Bu davetiyeyi kabul etmek icin giris yapin veya hesap olusturun.',
    btn_login: 'Giris Yap',
    btn_register: 'Hesap Olustur',
    btn_accept: 'Katil',
    btn_decline: 'Daveti Reddet',
    accepting: 'Katiliniyor...',
    success_title: 'Hosgeldiniz!',
    success_msg: 'Basariyla katildiniz:',
    success_redirect: 'Panele yonlendiriliyorsunuz...',
    error_already_member: 'Bu sirketin zaten bir uyesisiniz.',
    error_generic: 'Bir hata olustu. Lutfen tekrar deneyin.',
    or: 'veya',
    go_dashboard: 'Panele Git',
    go_home: 'Ana Sayfaya Git',
  }
};

const lang = localStorage.getItem('solvenin_lang') || 'en';
function t(key) { return (T[lang] || T['en'])[key] || T['en'][key] || key; }

// ── Toast ──
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ── State ──
let invitation = null;
let company = null;
let currentUser = null;
let token = null;

// ── Render helpers ──
const card = document.getElementById('card');

function renderError(iconClass, icon, titleKey, msgKey) {
  card.innerHTML = `
    <div class="card-icon ${iconClass}">${icon}</div>
    <div class="card-title">${t(titleKey)}</div>
    <div class="card-subtitle">${t(msgKey)}</div>
    <div class="btn-group">
      <a href="index.html" class="btn btn-secondary">${t('go_home')}</a>
    </div>`;
}

function renderInviteAuth() {
  const returnUrl = encodeURIComponent(window.location.href);
  card.innerHTML = `
    <div class="card-icon invite">&#x1f4e8;</div>
    <div class="card-title">${t('invite_title')}</div>
    <div class="card-subtitle">${t('invite_msg')}</div>
    <div class="invite-details">
      <div class="invite-row">
        <span class="invite-label">${t('company')}</span>
        <span class="invite-value">${company.name}</span>
      </div>
      <div class="invite-row">
        <span class="invite-label">${t('role')}</span>
        <span class="role-badge">${invitation.role}</span>
      </div>
      <div class="invite-row">
        <span class="invite-label">${t('invited_as')}</span>
        <span class="invite-value">${invitation.email}</span>
      </div>
    </div>
    <div class="card-subtitle" style="margin-bottom:20px">${t('login_prompt')}</div>
    <div class="btn-group">
      <a href="auth.html?token=${token}&mode=login" class="btn btn-primary">${t('btn_login')}</a>
      <div class="divider">${t('or')}</div>
      <a href="auth.html?token=${token}&mode=register" class="btn btn-secondary">${t('btn_register')}</a>
    </div>`;
}

function renderInviteAccept() {
  card.innerHTML = `
    <div class="card-icon invite">&#x1f4e8;</div>
    <div class="card-title">${t('invite_title')}</div>
    <div class="card-subtitle">${t('invite_msg')}</div>
    <div class="invite-details">
      <div class="invite-row">
        <span class="invite-label">${t('company')}</span>
        <span class="invite-value">${company.name}</span>
      </div>
      <div class="invite-row">
        <span class="invite-label">${t('role')}</span>
        <span class="role-badge">${invitation.role}</span>
      </div>
      <div class="invite-row">
        <span class="invite-label">${t('invited_as')}</span>
        <span class="invite-value">${invitation.email}</span>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" id="btn-accept" onclick="acceptInvitation()">
        ${t('btn_accept')} ${company.name}
      </button>
      <button class="btn btn-danger" id="btn-decline" onclick="declineInvitation()">
        ${t('btn_decline')}
      </button>
    </div>`;
}

function renderSuccess() {
  card.innerHTML = `
    <div class="card-icon success">&#x2705;</div>
    <div class="card-title">${t('success_title')}</div>
    <div class="card-subtitle">${t('success_msg')} <strong>${company.name}</strong>.</div>
    <div class="card-subtitle" style="margin-bottom:20px">${t('success_redirect')}</div>
    <div class="btn-group">
      <a href="dashboard.html" class="btn btn-primary">${t('go_dashboard')}</a>
    </div>`;
}

// ── Accept invitation ──
async function acceptInvitation() {
  const btnAccept = document.getElementById('btn-accept');
  const btnDecline = document.getElementById('btn-decline');
  btnAccept.disabled = true;
  btnDecline.disabled = true;
  btnAccept.innerHTML = '<div class="spinner" style="width:18px;height:18px;margin:0;border-width:2px"></div> ' + t('accepting');

  try {
    // Check if user is already a member
    const { data: existing } = await sb.from('company_users')
      .select('id')
      .eq('company_id', invitation.company_id)
      .eq('user_id', currentUser.id)
      .maybeSingle();

    if (existing) {
      showToast(t('error_already_member'), 'error');
      // Still mark invitation as accepted
      await sb.from('user_invitations').update({ status: 'accepted' }).eq('id', invitation.id);
      localStorage.setItem('currentCompanyId', invitation.company_id);
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      return;
    }

    // Insert into company_users
    const { error: insertErr } = await sb.from('company_users').insert({
      company_id: invitation.company_id,
      user_id: currentUser.id,
      role: invitation.role,
      status: 'active',
      joined_at: new Date().toISOString()
    });
    if (insertErr) throw insertErr;

    // Load default permissions
    const { data: defaults } = await sb.rpc('get_default_permissions', { p_role: invitation.role });
    if (defaults && defaults.length) {
      await sb.from('user_permissions').insert(
        defaults.map(d => ({
          company_id: invitation.company_id,
          user_id: currentUser.id,
          module: d.module,
          can_view: d.can_view,
          can_create: d.can_create,
          can_edit: d.can_edit,
          can_delete: d.can_delete
        }))
      );
    }

    // Update invitation status
    await sb.from('user_invitations').update({ status: 'accepted' }).eq('id', invitation.id);

    // Set active company
    localStorage.setItem('currentCompanyId', invitation.company_id);

    renderSuccess();
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2500);
  } catch (err) {
    console.error('Accept error:', err);
    showToast(t('error_generic'), 'error');
    btnAccept.disabled = false;
    btnDecline.disabled = false;
    btnAccept.textContent = t('btn_accept') + ' ' + company.name;
  }
}

// ── Decline invitation ──
async function declineInvitation() {
  const btnAccept = document.getElementById('btn-accept');
  const btnDecline = document.getElementById('btn-decline');
  btnAccept.disabled = true;
  btnDecline.disabled = true;

  try {
    await sb.from('user_invitations').update({ status: 'declined' }).eq('id', invitation.id);
    card.innerHTML = `
      <div class="card-icon warning">&#x1f44b;</div>
      <div class="card-title">${lang === 'tr' ? 'Davet Reddedildi' : 'Invitation Declined'}</div>
      <div class="card-subtitle">${lang === 'tr' ? 'Daveti basariyla reddetttiniz.' : 'You have declined the invitation.'}</div>
      <div class="btn-group">
        <a href="index.html" class="btn btn-secondary">${t('go_home')}</a>
      </div>`;
  } catch (err) {
    console.error('Decline error:', err);
    showToast(t('error_generic'), 'error');
    btnAccept.disabled = false;
    btnDecline.disabled = false;
  }
}

// ── Init ──
async function init() {
  document.getElementById('loading-text').textContent = t('loading');

  // Safety timeout — never stay on loading forever
  const loadingTimeout = setTimeout(() => {
    console.warn('[join] loading timeout — 5s elapsed');
    renderError('error', '&#x26d4;', 'invalid_title', 'invalid_msg');
  }, 5000);

  try {
    // Read token from URL
    const params = new URLSearchParams(window.location.search);
    token = params.get('token');
    console.log('[join] token from URL:', token);

    if (!token) {
      renderError('error', '&#x26d4;', 'invalid_title', 'invalid_msg');
      return;
    }

    // Look up invitation
    console.log('[join] fetching invitation...');
    const { data: inv, error: invErr } = await sb.from('user_invitations')
      .select('id, email, role, token, invited_at, status, company_id')
      .eq('token', token)
      .maybeSingle();
    console.log('[join] invitation result:', inv, '| error:', invErr);

    if (invErr || !inv) {
      renderError('error', '&#x26d4;', 'invalid_title', 'invalid_msg');
      return;
    }

    invitation = inv;

    // Check status
    if (inv.status === 'accepted') { renderError('warning', '&#x2705;', 'accepted_title', 'accepted_msg'); return; }
    if (inv.status === 'cancelled') { renderError('error', '&#x1f6ab;', 'cancelled_title', 'cancelled_msg'); return; }
    if (inv.status === 'expired') { renderError('warning', '&#x23f3;', 'expired_title', 'expired_msg'); return; }

    // Check expiry (7 days)
    if (inv.invited_at) {
      const diffDays = (Date.now() - new Date(inv.invited_at).getTime()) / 86400000;
      if (diffDays > 7) {
        await sb.from('user_invitations').update({ status: 'expired' }).eq('id', inv.id);
        renderError('warning', '&#x23f3;', 'expired_title', 'expired_msg');
        return;
      }
    }

    // Fetch company info
    console.log('[join] fetching company:', inv.company_id);
    const { data: comp, error: compErr } = await sb.from('companies')
      .select('id, name')
      .eq('id', inv.company_id)
      .maybeSingle();
    console.log('[join] company result:', comp, '| error:', compErr);

    if (!comp) {
      renderError('error', '&#x26d4;', 'invalid_title', 'invalid_msg');
      return;
    }
    company = comp;

    // Check auth state
    console.log('[join] checking auth...');
    const { data: { session } } = await sb.auth.getSession();
    console.log('[join] auth session:', session ? 'logged in as ' + session.user.email : 'not logged in');

    if (session) {
      currentUser = session.user;
      renderInviteAccept();
    } else {
      renderInviteAuth();
    }
  } catch (e) {
    console.error('[join] init error:', e);
    renderError('error', '&#x26d4;', 'invalid_title', 'invalid_msg');
  } finally {
    clearTimeout(loadingTimeout);
  }
}

init();
</script>
</body>
</html>
