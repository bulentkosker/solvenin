<style>
:root{--primary:#1e40af;--primary-dark:#1a2744;--white:#fff;--bg:#f0f2f5;--gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;--gray300:#cbd5e1;--gray400:#94a3b8;--gray500:#64748b;--gray600:#475569;--gray800:#1a2744;--green:#10b981;--red:#ef4444;--font-display:'Outfit',sans-serif;--font-body:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--gray800);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
.pos-header{background:var(--primary-dark);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;flex-shrink:0}
.pos-header .logo{font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:-.5px}
.pos-header .logo span{color:#38bdf8}
.pos-header .info{display:flex;gap:12px;align-items:center;font-size:12px;color:rgba(255,255,255,.6)}
.pos-header .info strong{color:#fff}
.pos-exit{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-body)}
.pos-lang{position:relative;display:inline-block}
.pos-lang-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;gap:6px}
.pos-lang-menu{position:absolute;top:100%;right:0;margin-top:6px;background:#1a2744;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px;min-width:170px;display:none;z-index:1000;max-height:340px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.pos-lang.open .pos-lang-menu{display:block}
.pos-lang-opt{padding:7px 12px;border-radius:6px;font-size:12px;color:rgba(255,255,255,.7);cursor:pointer;white-space:nowrap}
.pos-lang-opt:hover{background:rgba(255,255,255,.08);color:#fff}
.pos-lang-opt.active{color:#fff;font-weight:600}

/* MAIN LAYOUT */
.pos-main{display:flex;flex:1;overflow:hidden}

/* LEFT: Barcode + Quick Buttons */
.pos-left{flex:2;display:flex;flex-direction:column;background:var(--white);border-right:1px solid var(--gray200)}
.pos-barcode{padding:14px 16px;border-bottom:1px solid var(--gray100)}
.pos-barcode input{width:100%;padding:12px 16px;border:2px solid var(--primary);border-radius:12px;font-size:16px;outline:none;font-family:var(--font-body);text-align:center}
.pos-barcode input:focus{box-shadow:0 0 0 3px rgba(30,64,175,.15)}
.pos-barcode input::placeholder{color:var(--gray400);font-size:14px}
.pos-categories{padding:8px 16px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--gray100);flex-shrink:0}
.cat-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--gray200);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font-body);color:var(--gray600)}
.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pos-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;align-content:start}
.qb{border-radius:14px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .1s;user-select:none;border:none;font-family:var(--font-body);color:#fff;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qb:active{transform:scale(.95)}
.qb .qb-name{font-size:14px;font-weight:700;line-height:1.2;margin-bottom:4px}
.qb .qb-price{font-size:12px;opacity:.8}
.pos-empty{text-align:center;padding:40px;color:var(--gray400);font-size:13px;grid-column:1/-1}

/* RIGHT: Cart */
.pos-cart{flex:1;display:flex;flex-direction:column;min-width:340px;max-width:420px;background:var(--white)}
.cart-header{padding:14px 16px;border-bottom:1px solid var(--gray100);display:flex;justify-content:space-between;align-items:center}
.cart-header h3{font-family:var(--font-display);font-size:15px;font-weight:700}
.cart-customer{font-size:11px;color:var(--gray400);cursor:pointer;padding:4px 8px;border:1px solid var(--gray200);border-radius:6px}
.cart-items{flex:1;overflow-y:auto;padding:4px 0}
.ci{display:flex;align-items:center;padding:10px 16px;gap:8px;border-bottom:1px solid var(--gray100)}
.ci-name{flex:1;font-size:13px;font-weight:500}
.ci-qty{display:flex;align-items:center;gap:2px}
.ci-qty button{width:28px;height:28px;border-radius:6px;border:1px solid var(--gray200);background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ci-qty span{width:28px;text-align:center;font-weight:700;font-size:14px}
.ci-total{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--primary);min-width:70px;text-align:right}
.ci-del{color:var(--red);cursor:pointer;font-size:14px;padding:4px;opacity:.5}
.cart-empty{text-align:center;padding:40px;color:var(--gray400);font-size:13px}
.cart-summary{padding:12px 16px;border-top:1px solid var(--gray200);background:var(--gray50)}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:var(--gray500)}
.sr.total{font-size:20px;font-weight:800;color:var(--primary);padding:8px 0;font-family:var(--font-display)}
.cart-actions{padding:12px 16px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--gray200)}
.pay-row{display:flex;gap:8px}
.pay-btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .1s}
.pay-btn:active{transform:scale(.97)}
.pay-btn.cash{background:#dcfce7;color:#166534}
.pay-btn.card{background:#eff6ff;color:#1d4ed8}
.pay-btn.bank{background:#fef3c7;color:#92400e}

/* MODALS */
.pm{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center}
.pm.open{display:flex}
.pmc{background:#fff;border-radius:20px;padding:32px;width:400px;max-width:95vw;max-height:90vh;overflow-y:auto}
.pmc h3{font-family:var(--font-display);font-size:20px;font-weight:800;margin-bottom:16px}
.pf{margin-bottom:14px}
.pf label{font-size:12px;font-weight:600;color:var(--gray500);display:block;margin-bottom:4px}
.pf input,.pf select{width:100%;padding:10px 14px;border:1px solid var(--gray200);border-radius:10px;font-size:14px;outline:none;font-family:var(--font-body)}
.pf input:focus{border-color:var(--primary)}
.quick-amounts{display:flex;gap:6px;margin:8px 0}
.qa{padding:8px 12px;border:1px solid var(--gray200);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;font-family:var(--font-body)}
.qa:hover{background:var(--gray50);border-color:var(--primary)}
.change-box{text-align:center;padding:16px;background:var(--gray50);border-radius:12px;margin:12px 0}
.change-box .lbl{font-size:12px;color:var(--gray500)}
.change-box .amt{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--primary)}
.pm-actions{display:flex;gap:8px;margin-top:16px}
.pm-actions button{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-body)}

/* PIN modal */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:20px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--gray300);background:#fff}
.pin-dot.filled{background:var(--primary);border-color:var(--primary)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto}
.pin-key{padding:14px;border:1px solid var(--gray200);border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;background:#fff;text-align:center;font-family:var(--font-display)}
.pin-key:hover{background:var(--gray50)}

/* ===== RECEIPT ===== */
.receipt-preview{background:#fff;width:280px;margin:0 auto;padding:16px 12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.4;color:#000;border:1px dashed var(--gray300);border-radius:4px;max-height:60vh;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.receipt-preview .r-center{text-align:center}
.receipt-preview .r-logo{max-width:80px;max-height:40px;margin:0 auto 4px;display:block}
.receipt-preview .r-company{font-size:14px;font-weight:700;letter-spacing:.5px}
.receipt-preview .r-info{font-size:10px;color:#555}
.receipt-preview .r-sep-major{text-align:center;color:#000;margin:5px 0;letter-spacing:0;font-size:11px;overflow:hidden}
.receipt-preview .r-sep-minor{text-align:center;color:#999;margin:4px 0;letter-spacing:0;font-size:11px;overflow:hidden}
.receipt-preview .r-row{display:flex;justify-content:space-between;gap:4px}
.receipt-preview .r-row .r-amt{text-align:right;flex-shrink:0;white-space:nowrap}
.receipt-preview .r-item{margin:3px 0}
.receipt-preview .r-item-name{font-weight:600;font-size:11px}
.receipt-preview .r-item-detail{display:flex;justify-content:space-between;font-size:10px;color:#444;padding-left:12px}
.receipt-preview .r-total-row{font-size:13px;font-weight:700;letter-spacing:.3px}
.receipt-preview .r-footer{text-align:center;color:#666;margin-top:4px;font-size:9px}

/* Print: 58mm / 80mm receipt */
@media print{
  body *{visibility:hidden!important}
  #receipt-print-area,#receipt-print-area *{visibility:visible!important}
  #receipt-print-area{position:fixed;left:0;top:0;width:58mm;padding:2mm;font-family:'Courier New',monospace;font-size:9pt;line-height:1.3;color:#000;background:#fff;z-index:99999}
  #receipt-print-area .r-sep-major,#receipt-print-area .r-sep-minor{color:#000}
  #receipt-print-area .r-logo{max-width:18mm}
  @page{size:58mm auto;margin:2mm}
}
body.print-80mm #receipt-print-area{width:80mm!important;padding:3mm!important}
@media print{body.print-80mm #receipt-print-area{width:80mm!important}}
.pin-key:active{background:var(--gray100)}

.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:13px;color:#fff;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
#loading-screen{position:fixed;inset:0;background:#1a2744;display:flex;align-items:center;justify-content:center;z-index:9000;transition:opacity .3s}
.loading-logo{font-family:var(--font-display);font-size:32px;font-weight:800;color:#fff}.loading-logo span{color:#38bdf8}

<div class="pos-header">
  <div class="logo">solvenin<span>.</span> POS</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://jaakjdzpdizjbzvbtcld.supabase.co','sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9');
window._supabase = sb;

let companyId = null, currentUser = null, currSym = '$';
let products = [], categories = [], cart = [];
let cashRegisters = [], bankAccounts = [];
let selectedRegister = null, sessionId = null;
let selectedPayMethod = 'cash', selectedCustomerId = null;
let pinCallback = null, pinValue = '';
let companyInfo = {}; // name, address, phone, logo_url
let lastSaleData = null; // stored after completeSale for reprint

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'auth.html'; return; }
  currentUser = session.user;

  const { data: companies } = await sb.rpc('get_my_companies');
  if (!companies?.length) { window.location.href = 'dashboard.html'; return; }
  const saved = localStorage.getItem('currentCompanyId');
  const active = saved ? (companies.find(c => c.company_id === saved) || companies[0]) : companies[0];
  companyId = active.company_id;

  // Load company info (currency + receipt data)
  const { data: comp } = await sb.from('companies')
    .select('name,address,phone,logo_url,base_currency,invoice_settings,allow_negative_stock')
    .eq('id', companyId).single();
  if (comp) {
    const syms = {USD:'$',EUR:'€',TRY:'₺',GBP:'£',RUB:'₽',KZT:'₸',AZN:'₼',JPY:'¥',CNY:'¥'};
    currSym = syms[comp.base_currency] || comp.base_currency + ' ';
    const rs = comp.invoice_settings || {};
    // Resolve logo by mode
    const logoMode = rs.pos_receipt_logo_mode || 'company';
    let resolvedLogo = '';
    if (logoMode === 'company') resolvedLogo = comp.logo_url || '';
    else if (logoMode === 'custom') resolvedLogo = rs.pos_receipt_logo_url || '';
    companyInfo = {
      name: (rs.pos_receipt_title || '').trim() || comp.name || '',
      address: (rs.pos_receipt_address || '').trim() || comp.address || '',
      phone: (rs.pos_receipt_phone || '').trim() || comp.phone || '',
      logo_url: resolvedLogo,
      receipt_footer: rs.receipt_footer || '',
      receipt_show_logo: rs.receipt_show_logo !== false && logoMode !== 'none',
      receipt_paper: rs.receipt_paper || '58mm',
      receipt_print_mode: rs.receipt_print_mode || 'ask',  // 'auto'|'ask'|'none'
      receipt_show_subtotal: rs.receipt_show_subtotal !== false,
      receipt_show_vat: rs.receipt_show_vat !== false,
      receipt_show_cashier: rs.receipt_show_cashier !== false,
      allow_negative_stock: comp.allow_negative_stock !== false,
    };
  }

  document.getElementById('pos-cashier-name').textContent = currentUser.user_metadata?.full_name || currentUser.email;

  // Initialize offline DB + connectivity once before any data loads
  try {
    await window.PosOfflineDB.init();
    window.PosConnectivity.init();
  } catch (e) { console.warn('[POS] offline init failed:', e); }

  await Promise.all([loadProducts(), loadAccounts()]);

  // After products are loaded, cache them for offline use
  try {
    if (window.PosConnectivity.isOnline && products.length) {
      await window.PosOfflineDB.cacheProducts(products);
      await window.PosOfflineDB.cacheQuickButtons(quickButtons || []);
    }
  } catch (e) { console.warn('[POS] cache failed:', e); }

  // Sync any pending sales from a previous offline session
  try {
    if (window.PosConnectivity.isOnline) await window.PosSync.syncPendingSales();
  } catch (e) { console.warn('[POS] sync failed:', e); }

  const ls = document.getElementById('loading-screen');
  if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 300); }

  // Show register select
  if (cashRegisters.length) {
    document.getElementById('sel-register').innerHTML = cashRegisters.map(r => `<option value="${r.id}">${r.name} (${r.currency_code})</option>`).join('');
    document.getElementById('register-modal').classList.add('open');
  } else {
    showToast(t('pos_toast_no_register'), 'error');
  }
}

async function startSession() {
  const regId = document.getElementById('sel-register').value;
  if (!regId) return;
  selectedRegister = cashRegisters.find(r => r.id === regId);

  const { data: ses, error } = await sb.from('pos_sessions').insert({
    company_id: companyId, cash_register_id: regId,
    cashier_id: currentUser.id, opened_by: currentUser.id, status: 'open',
  }).select('id').single();
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  sessionId = ses.id;

  document.getElementById('pos-register-name').textContent = selectedRegister.name;
  document.getElementById('pos-session-time').textContent = '⏱ ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + "'den beri";
  document.getElementById('register-modal').classList.remove('open');
  loadCartFromStorage();
  document.getElementById('barcode-input').focus();
}

let quickButtons = [], buttonGroups = [];
async function loadProducts() {
  // Offline path: pull everything from IndexedDB cache
  if (window.PosConnectivity && !window.PosConnectivity.isOnline && window.PosOfflineDB) {
    try {
      const [cachedProducts, cachedButtons, cachedGroups] = await Promise.all([
        window.PosOfflineDB.getCachedProducts(),
        window.PosOfflineDB.getCachedQuickButtons(),
        window.PosOfflineDB.getCachedButtonGroups ? window.PosOfflineDB.getCachedButtonGroups() : Promise.resolve([]),
      ]);
      products = cachedProducts || [];
      categories = [];
      quickButtons = cachedButtons || [];
      buttonGroups = cachedGroups || [];
      console.log('[POS] loaded from offline cache:', products.length, 'products,', quickButtons.length, 'quick buttons');
      renderGroupTabs();
      renderQuickButtons();
      return;
    } catch (e) {
      console.warn('[POS] offline load failed:', e);
    }
  }
  // Online path
  const [prodRes, catRes, qbRes, grpRes] = await Promise.all([
    sb.from('products').select('id,name,sale_price,stock_quantity,unit,category_id,barcode').eq('company_id', companyId).eq('is_active', true).order('name'),
    sb.from('categories').select('id,name').eq('company_id', companyId).eq('is_active', true).order('name'),
    sb.from('pos_quick_buttons').select('*, products(id,name,sale_price,category_id)').eq('company_id', companyId).eq('is_active', true).order('button_order'),
    sb.from('pos_button_groups').select('*').eq('company_id', companyId).order('sort_order'),
  ]);
  products = prodRes.data || [];
  categories = catRes.data || [];
  quickButtons = qbRes.data || [];
  buttonGroups = grpRes.data || [];
  renderGroupTabs();
  renderQuickButtons();
}

async function loadAccounts() {
  const { data: regs } = await sb.from('cash_registers').select('id,name,currency_code').eq('company_id', companyId).eq('is_active', true);
  cashRegisters = regs || [];
  const { data: accs } = await sb.from('bank_accounts').select('id,account_name,currency_code').eq('company_id', companyId).eq('is_active', true);
  bankAccounts = accs || [];
}

function F(n) { return currSym + parseFloat(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

// ===== GROUP TABS =====
let activeGroupId = '';
function renderGroupTabs() {
  const el = document.getElementById('pos-categories');
  if (!buttonGroups.length) {
    // Backward compat: no groups — show all buttons, hide tabs
    el.innerHTML = '';
    activeGroupId = '';
    return;
  }
  // Restore last selected group from localStorage, else first group
  const savedKey = 'pos_active_group_' + companyId;
  const saved = localStorage.getItem(savedKey);
  if (saved && buttonGroups.find(g => g.id === saved)) activeGroupId = saved;
  else activeGroupId = buttonGroups[0].id;

  el.innerHTML = buttonGroups.map(g =>
    `<button class="cat-btn${g.id===activeGroupId?' active':''}" style="${g.id===activeGroupId?`border-color:${g.color};color:${g.color};`:''}" onclick="filterGroup(this,'${g.id}')">${g.name}</button>`
  ).join('');
}
function filterGroup(btn, id) {
  document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('active'); b.style.borderColor=''; b.style.color=''; });
  btn.classList.add('active');
  const g = buttonGroups.find(x => x.id === id);
  if (g) { btn.style.borderColor = g.color; btn.style.color = g.color; }
  activeGroupId = id;
  localStorage.setItem('pos_active_group_' + companyId, id);
  renderQuickButtons();
}

// ===== QUICK BUTTONS =====
function renderQuickButtons() {
  const grid = document.getElementById('pos-grid');
  const filtered = buttonGroups.length
    ? quickButtons.filter(b => b.group_id === activeGroupId)
    : quickButtons;
  if (!filtered.length) {
    grid.innerHTML = `<div class="pos-empty">${t('pos_no_quick_buttons')}.<br><a href="settings.html" style="color:var(--primary);font-weight:600">Settings → POS</a></div>`;
    return;
  }
  grid.innerHTML = filtered.map(b => `
    <button class="qb" style="background:${b.button_color || '#1e40af'}" onclick="addToCart('${b.product_id}')">
      <div class="qb-name">${b.button_name}</div>
      <div class="qb-price">${F(b.products?.sale_price)}</div>
    </button>
  `).join('');
}

// ===== BARCODE =====
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('barcode-input');
  inp.addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const code = inp.value.trim();
      if (!code) return;
      inp.value = '';
      // First check local cache
      let p = products.find(x => x.barcode === code);
      if (!p) {
        // Query Supabase directly (barcode may have been added after page load)
        const { data } = await sb.from('products').select('id,name,sale_price,unit,barcode')
          .eq('company_id', companyId).eq('barcode', code).eq('is_active', true).single();
        if (data) {
          p = data;
          // Add to local cache
          if (!products.find(x => x.id === data.id)) products.push(data);
        }
      }
      if (p) { addToCart(p.id); }
      else { showToast(t('pos_toast_barcode_not_found') + ': ' + code, 'error'); }
    }
  });
  // Always refocus barcode after any click (unless in modal)
  document.addEventListener('click', () => {
    if (!document.querySelector('.pm.open')) setTimeout(() => inp.focus(), 50);
  });
});

// ===== CART =====
function addToCart(pid) {
  let p = products.find(x => x.id === pid);
  if (!p) {
    const qb = quickButtons.find(b => b.product_id === pid);
    if (qb?.products) p = qb.products;
  }
  if (!p) { console.warn('[pos] Product not found:', pid); return; }
  // Negative stock check
  if (!companyInfo.allow_negative_stock) {
    const currentInCart = cart.find(c => c.pid === pid)?.qty || 0;
    const available = parseFloat(p.stock_quantity || 0) - currentInCart;
    if (available <= 0) {
      showToast(t('error_insufficient_stock') || 'Stok yetersiz', 'error');
      return;
    }
  }
  const ex = cart.find(c => c.pid === pid);
  if (ex) ex.qty++;
  else cart.push({ pid, name: p.name, price: parseFloat(p.sale_price||0), qty: 1, unit: p.unit || '' });
  renderCart();
  saveCartToStorage();
}

// ===== CART PERSISTENCE =====
function saveCartToStorage() {
  const key = 'pos_active_cart_' + companyId;
  if (cart.length > 0) {
    localStorage.setItem(key, JSON.stringify({ items: cart, customerId: selectedCustomerId, sessionId: sessionId, updatedAt: new Date().toISOString() }));
  } else {
    localStorage.removeItem(key);
  }
}

function loadCartFromStorage() {
  const key = 'pos_active_cart_' + companyId;
  const saved = localStorage.getItem(key);
  if (!saved) return;
  try {
    const data = JSON.parse(saved);
    if (data.items?.length) {
      cart = data.items;
      selectedCustomerId = data.customerId || null;
      renderCart();
      showToast(t('pos_toast_cart_restored') + ' (' + cart.length + ')', 'info');
    }
  } catch(e) { localStorage.removeItem(key); }
}

function cartQty(idx, delta) {
  if (delta < 0) {
    requireManager(t('pos_qty_decrease_pin'), () => {
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) cart.splice(idx, 1);
      renderCart();
      saveCartToStorage();
    });
    return;
  }
  // [+] PIN gerektirmez
  cart[idx].qty += delta;
  renderCart();
  saveCartToStorage();
}

function removeItem(idx) {
  requireManager(t('pos_remove_item_pin'), () => {
    cart.splice(idx, 1);
    renderCart();
    saveCartToStorage();
  });
}

function editQty(idx) {
  requireManager(t('pos_edit_qty_pin'), () => {
    const span = document.getElementById('qty-val-' + idx);
    if (!span) return;
    const input = document.createElement('input');
    input.type = 'number'; input.min = '0'; input.value = cart[idx].qty;
    input.style.cssText = 'width:40px;text-align:center;border:1px solid var(--primary);border-radius:4px;font-size:13px;font-weight:700;padding:2px;';
    input.onkeydown = (e) => { if (e.key === 'Enter') applyQty(idx, input); if (e.key === 'Escape') renderCart(); };
    input.onblur = () => applyQty(idx, input);
    span.replaceWith(input);
    input.focus(); input.select();
  });
}

function applyQty(idx, input) {
  const val = parseInt(input.value) || 0;
  if (val <= 0) cart.splice(idx, 1);
  else cart[idx].qty = val;
  renderCart();
  saveCartToStorage();
}

function clearCart() {
  if (!cart.length) return;
  requireManager(t('pos_clear_cart_pin'), async () => {
    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const { data: { user } } = await sb.auth.getUser();
    await sb.from('pos_cancelled_carts').insert({
      company_id: companyId, session_id: sessionId, cancelled_by: user?.id,
      items: cart, total, reason: 'cart cleared (manager approval)'
    });
    cart = [];
    renderCart();
    saveCartToStorage();
    showToast(t('pos_toast_cart_cleared'), 'info');
  });
}

function renderCart() {
  const el = document.getElementById('cart-items');
  const clearBtn = document.getElementById('btn-clear-cart');
  if (clearBtn) clearBtn.style.display = cart.length > 0 ? '' : 'none';
  if (!cart.length) { el.innerHTML = '<div class="cart-empty">'+t('pos_scan_to_add')+'</div>'; }
  else {
    el.innerHTML = cart.map((c,i) => `<div class="ci">
      <div class="ci-name">${c.name}</div>
      <div class="ci-qty">
        <button onclick="cartQty(${i},-1)">−</button>
        <span id="qty-val-${i}" onclick="editQty(${i})" style="cursor:pointer;min-width:28px;text-align:center" title="Tıkla: miktar düzenle">${c.qty}</span>
        <button onclick="cartQty(${i},1)">+</button>
      </div>
      <div class="ci-total">${F(c.qty*c.price)}</div>
      <div class="ci-del" onclick="removeItem(${i})">✕</div>
    </div>`).join('');
  }
  const sub = cart.reduce((s,c) => s + c.qty * c.price, 0);
  document.getElementById('s-sub').textContent = F(sub);
  document.getElementById('s-tax').textContent = F(0);
  document.getElementById('s-total').textContent = F(sub);
  document.getElementById('cart-count').textContent = `(${cart.reduce((s,c) => s+c.qty, 0)})`;
}

function getTotal() { return cart.reduce((s,c) => s + c.qty * c.price, 0); }

// ===== PIN SYSTEM + MANAGER SESSION =====
let managerSession = { userId: null, expiresAt: 0 };
let _sessionTimer = null;

function isManagerActive() {
  return managerSession.userId && Date.now() < managerSession.expiresAt;
}

function requireManager(reason, callback) {
  if (isManagerActive()) { callback(); return; }
  requestPin(reason, callback);
}

function activateManagerSession(userId) {
  managerSession = { userId, expiresAt: Date.now() + 10000 };
  // Show indicator
  let ind = document.getElementById('manager-indicator');
  if (!ind) {
    ind = document.createElement('div');
    ind.id = 'manager-indicator';
    ind.style.cssText = 'position:fixed;top:50px;right:16px;background:#1e40af;color:#fff;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;z-index:999;display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.2)';
    document.body.appendChild(ind);
  }
  ind.style.display = 'flex';
  updateManagerTimer();
  if (_sessionTimer) clearInterval(_sessionTimer);
  _sessionTimer = setInterval(updateManagerTimer, 1000);
}

function updateManagerTimer() {
  const ind = document.getElementById('manager-indicator');
  if (!ind) return;
  const remaining = Math.max(0, Math.ceil((managerSession.expiresAt - Date.now()) / 1000));
  if (remaining <= 0) {
    ind.style.display = 'none';
    managerSession = { userId: null, expiresAt: 0 };
    if (_sessionTimer) { clearInterval(_sessionTimer); _sessionTimer = null; }
    showToast(t('pos_toast_manager_session_ended'), 'info');
    return;
  }
  ind.innerHTML = '🔓 <span style="background:rgba(255,255,255,.2);padding:1px 6px;border-radius:4px">' + remaining + 's</span>';
}

function requestPin(reason, callback) {
  pinCallback = callback;
  pinValue = '';
  document.getElementById('pin-reason').textContent = reason;
  renderPinDots();
  renderPinPad();
  document.getElementById('pin-modal').classList.add('open');
}

function renderPinDots() {
  document.getElementById('pin-dots').innerHTML = [0,1,2,3].map(i =>
    `<div class="pin-dot ${i < pinValue.length ? 'filled' : ''}"></div>`).join('');
}

function renderPinPad() {
  document.getElementById('pin-pad').innerHTML = [1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k =>
    k === '' ? '<div></div>' :
    `<div class="pin-key" onclick="pinKey('${k}')">${k}</div>`).join('');
}

async function pinKey(k) {
  if (k === '⌫') { pinValue = pinValue.slice(0,-1); renderPinDots(); return; }
  if (pinValue.length >= 4) return;
  pinValue += k;
  renderPinDots();
  if (pinValue.length === 4) {
    const { data } = await sb.rpc('verify_pos_pin', { p_company_id: companyId, p_pin: pinValue });
    const valid = data || [];
    if (valid.length) {
      activateManagerSession(valid[0].user_id);
      const cb = pinCallback;
      closePin();
      if (cb) cb();
    } else {
      showToast(t('pos_toast_wrong_pin'), 'error');
      pinValue = '';
      renderPinDots();
    }
  }
}

function closePin() { document.getElementById('pin-modal').classList.remove('open'); pinCallback = null; pinValue = ''; }

// ===== CUSTOMER =====
function selectCustomer() {
  // Simple prompt for now — could be a modal with search
  selectedCustomerId = null;
  document.getElementById('cart-customer').textContent = '👤 ' + t('pos_guest');
}

// ===== PAYMENT =====
function openPayment(method) {
  if (!cart.length) return;
  selectedPayMethod = method;
  const total = getTotal();
  document.getElementById('pay-total').textContent = F(total);
  document.getElementById('pay-title').textContent = method === 'cash' ? '💵 ' + t('pos_cash_payment') : method === 'card' ? '💳 ' + t('pos_card_payment') : '🏦 ' + t('pos_transfer');
  document.getElementById('cash-section').style.display = method === 'cash' ? '' : 'none';
  document.getElementById('account-section').style.display = method !== 'cash' ? '' : 'none';

  if (method === 'cash') {
    document.getElementById('pay-received').value = '';
    document.getElementById('pay-change').textContent = F(0);
    // Quick amount buttons
    const amounts = [1000, 5000, 10000, 50000, 100000].filter(a => a >= total * 0.5);
    document.getElementById('quick-amounts').innerHTML =
      `<button class="qa" onclick="setReceived(${total})">${t('pos_exact_payment')}</button>` +
      amounts.slice(0,4).map(a => `<button class="qa" onclick="setReceived(${a})">+${F(a)}</button>`).join('');
  } else {
    document.getElementById('pay-account').innerHTML = `<option value="">${t('pos_select_account')}</option>` +
      bankAccounts.map(a => `<option value="${a.id}">${a.account_name} (${a.currency_code})</option>`).join('');
  }
  document.getElementById('payment-modal').classList.add('open');
  if (method === 'cash') setTimeout(() => document.getElementById('pay-received').focus(), 100);
}

function setReceived(v) { document.getElementById('pay-received').value = v; calcChange(); }
function calcChange() {
  const total = getTotal();
  const recv = parseFloat(document.getElementById('pay-received').value) || 0;
  document.getElementById('pay-change').textContent = F(Math.max(0, recv - total));
}
function closePayment() { document.getElementById('payment-modal').classList.remove('open'); }

async function completeSale() {
  const total = getTotal();
  if (selectedPayMethod === 'cash') {
    const recv = parseFloat(document.getElementById('pay-received').value) || 0;
    if (recv < total) { showToast(t('pos_toast_insufficient'), 'error'); return; }
  }
  if ((selectedPayMethod === 'card' || selectedPayMethod === 'bank') && !document.getElementById('pay-account').value) {
    showToast(t('pos_toast_select_account'), 'error'); return;
  }

  const btn = document.getElementById('btn-pay');
  btn.disabled = true; btn.textContent = '...';

  try {
    const orderNum = 'POS-' + Date.now().toString(36).toUpperCase();
    const today = new Date().toISOString().split('T')[0];

    // OFFLINE PATH — queue the sale in IndexedDB and finish the receipt locally
    if (window.PosConnectivity && !window.PosConnectivity.isOnline && window.completeSaleOfflineFirst) {
      const orderPayload = {
        company_id: companyId, order_number: orderNum, order_type: 'pos', status: 'paid',
        issue_date: today, subtotal: total, tax_rate: 0, tax_amount: 0, discount: 0, total,
        customer_id: selectedCustomerId || null, created_by: currentUser.id,
        _items: cart.map(c => ({
          product_id: c.pid, description: c.name,
          quantity: c.qty, unit_price: c.price, discount: 0, total: c.qty * c.price,
        })),
      };
      const result = await window.completeSaleOfflineFirst(orderPayload);
      // Show receipt — we don't update stock or cash registers offline; the sync
      // job will recreate the order online and the existing receipt-level
      // stock movement triggers will run server-side.
      const received = selectedPayMethod === 'cash' ? (parseFloat(document.getElementById('pay-received').value)||0) : total;
      const change = selectedPayMethod === 'cash' ? Math.max(0, received - total) : 0;
      const saleData = {
        orderNumber: orderNum, date: new Date(), total, subtotal: total,
        tax_amount: 0, items: cart.map(c => ({ name: c.name, qty: c.qty, price: c.price })),
        payMethod: selectedPayMethod, received, change,
        cashier: currentUser.user_metadata?.full_name || currentUser.email,
      };
      closePayment();
      showReceiptModal(saleData);
      cart = [];
      renderCart();
      saveCartToStorage();
      btn.disabled = false; btn.textContent = t('pos_complete_payment');
      showToast('💾 ' + (t('pos_offline_sync_info') || 'Saved locally — will sync when online'), 'info');
      return;
    }

    // 1. Sales order
    const { data: order, error } = await sb.from('sales_orders').insert({
      company_id: companyId, order_number: orderNum, order_type: 'pos', status: 'paid',
      issue_date: today, subtotal: total, tax_rate: 0, tax_amount: 0, discount: 0, total,
      customer_id: selectedCustomerId || null, created_by: currentUser.id,
    }).select('id').single();
    if (error) throw error;

    // 2. Items
    await sb.from('sales_order_items').insert(cart.map(c => ({
      order_id: order.id, product_id: c.pid, description: c.name,
      quantity: c.qty, unit_price: c.price, discount: 0, total: c.qty * c.price,
    })));

    // 3. Payment transaction
    if (selectedPayMethod === 'cash' && selectedRegister) {
      await sb.from('cash_transactions').insert({
        company_id: companyId, register_id: selectedRegister.id, type: 'in', amount: total,
        currency_code: selectedRegister.currency_code || 'USD',
        description: `POS – ${orderNum}`, category: 'sale',
        source_type: 'sales_order', sales_order_id: order.id, payment_method: 'cash',
        transaction_date: today,
      });
    } else if (selectedPayMethod === 'card' || selectedPayMethod === 'bank') {
      const accId = document.getElementById('pay-account').value;
      const acc = bankAccounts.find(a => a.id === accId);
      await sb.from('bank_transactions').insert({
        company_id: companyId, account_id: accId, type: 'in', amount: total,
        currency_code: acc?.currency_code || 'USD',
        description: `POS – ${orderNum}`, category: 'sale',
        source_type: 'sales_order', sales_order_id: order.id,
        payment_method: selectedPayMethod === 'card' ? 'credit_card' : 'bank_transfer',
        transaction_date: today,
      });
    }

    // 4. Stock movements + update product quantities
    const defaultWh = cashRegisters.length ? null : null; // Will get from warehouses
    const { data: whData } = await sb.from('warehouses').select('id').eq('company_id', companyId).eq('is_default', true).single();
    const whId = whData?.id || null;
    for (const c of cart) {
      const { error: smErr } = await sb.from('stock_movements').insert({
        company_id: companyId, product_id: c.pid, type: 'out', quantity: c.qty,
        warehouse_id: whId, sales_order_id: order.id, reference_type: 'sales_order',
        reference: orderNum, notes: 'POS satış',
        created_by: currentUser.id,
      });
      if (smErr) console.error('[pos] Stock movement error:', smErr.message);
      // Update product quantity
      const prod = products.find(p => p.id === c.pid);
      if (prod) {
        const newQty = Math.max(0, (prod.stock_quantity || 0) - c.qty);
        await sb.from('products').update({ quantity: newQty }).eq('id', c.pid);
        prod.stock_quantity = newQty;
      }
    }
    console.log('[pos] Stock movements created for', orderNum);

    // Receipt
    const received = selectedPayMethod === 'cash' ? (parseFloat(document.getElementById('pay-received').value)||0) : total;
    const change = selectedPayMethod === 'cash' ? Math.max(0, received - total) : 0;
    const saleData = {
      orderNumber: orderNum, date: new Date(), total, subtotal: total,
      tax_amount: 0, items: cart.map(c => ({ name: c.name, qty: c.qty, price: c.price })),
      payMethod: selectedPayMethod, received, change,
      cashier: currentUser.user_metadata?.full_name || currentUser.email,
    };
    closePayment();
    showReceiptModal(saleData);
    cart = [];
    renderCart();
    saveCartToStorage();
  } catch (e) {
    showToast(getErrorMessage(e), 'error');
  } finally {
    btn.disabled = false; btn.textContent = t('pos_complete_payment');
  }
}

// ===== RECEIPT GENERATION =====
const SEP_MAJOR = '════════════════════════════';
const SEP_MINOR = '────────────────────────────';

function generateReceiptHTML(sale) {
  const _t = window.t || (k => k);
  const ci = companyInfo;
  const now = sale.date ? new Date(sale.date) : new Date();
  const dateStr = now.toLocaleDateString('tr-TR');
  const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

  let logoHtml = '';
  if (ci.receipt_show_logo && ci.logo_url) {
    logoHtml = `<img class="r-logo" src="${ci.logo_url}" alt="">`;
  }

  // Items
  const itemsHtml = (sale.items || []).map(it => {
    const lineTotal = it.qty * it.price;
    return `<div class="r-item">
      <div class="r-item-name">${it.name}</div>
      <div class="r-item-detail"><span>${it.qty} x ${F(it.price)}</span><span class="r-amt">${F(lineTotal)}</span></div>
    </div>`;
  }).join('');

  const subtotal = sale.subtotal || sale.total;
  const taxAmt = sale.tax_amount || 0;
  const total = sale.total;

  // Subtotal + VAT (if enabled)
  let subtotalHtml = '';
  if (ci.receipt_show_subtotal && (taxAmt > 0 || ci.receipt_show_vat)) {
    subtotalHtml += `<div class="r-row"><span>${_t('pos_subtotal')||'Ara Toplam'}</span><span class="r-amt">${F(subtotal)}</span></div>`;
  }
  if (ci.receipt_show_vat && taxAmt > 0) {
    subtotalHtml += `<div class="r-row"><span>${_t('label_vat_amount')||'KDV'}</span><span class="r-amt">${F(taxAmt)}</span></div>`;
  }
  if (subtotalHtml) subtotalHtml += `<div class="r-sep-minor">${SEP_MINOR}</div>`;

  // Payment section
  let paymentHtml = '';
  const payLabel = { cash: _t('pos_cash')||'NAKİT', card: _t('pos_card')||'KART', bank: _t('pos_bank')||'HAVALE' };
  paymentHtml += `<div class="r-row"><span>${payLabel[sale.payMethod]||sale.payMethod}</span><span class="r-amt">${F(sale.payMethod === 'cash' ? (sale.received||total) : total)}</span></div>`;
  if (sale.payMethod === 'cash' && sale.change > 0) {
    paymentHtml += `<div class="r-row"><span>${_t('pos_change')||'PARA ÜSTÜ'}</span><span class="r-amt">${F(sale.change)}</span></div>`;
  }

  // Cashier line
  const cashierHtml = ci.receipt_show_cashier
    ? `<div class="r-row r-info"><span>${_t('pos_cashier')||'Kasiyer'}: ${sale.cashier}</span></div>` : '';

  const footer = ci.receipt_footer || (_t('pos_receipt_thanks') || 'Teşekkürler!');

  return `<div class="receipt-preview">
    <div class="r-center">
      ${logoHtml}
      <div class="r-company">${ci.name}</div>
      ${ci.address ? `<div class="r-info">${ci.address}</div>` : ''}
      ${ci.phone ? `<div class="r-info">${ci.phone}</div>` : ''}
    </div>
    <div class="r-sep-major">${SEP_MAJOR}</div>
    <div class="r-row"><span>${_t('pos_receipt_no')||'FİŞ'} #${sale.orderNumber}</span></div>
    <div class="r-row r-info"><span>${dateStr} ${timeStr}</span></div>
    ${cashierHtml}
    <div class="r-sep-minor">${SEP_MINOR}</div>
    ${itemsHtml}
    <div class="r-sep-major">${SEP_MAJOR}</div>
    ${subtotalHtml}
    <div class="r-row r-total-row"><span>${_t('col_total')||'TOPLAM'}</span><span class="r-amt">${F(total)}</span></div>
    <div class="r-sep-major">${SEP_MAJOR}</div>
    ${paymentHtml}
    <div class="r-sep-minor">${SEP_MINOR}</div>
    <div class="r-footer">${footer}<br>solvenin.com</div>
  </div>`;
}

function showReceiptModal(sale) {
  lastSaleData = sale;
  const mode = companyInfo.receipt_print_mode || 'ask';

  if (mode === 'none') {
    // Skip receipt entirely — go to new sale
    document.getElementById('barcode-input').focus();
    return;
  }

  if (mode === 'auto') {
    // Print immediately, then show brief confirmation
    printReceiptDirect(sale);
    // Flash a brief toast instead of blocking modal
    showToast(`✅ ${F(sale.total)} — ${t('pos_sale_completed')||'Satış tamamlandı'}`, 'success');
    document.getElementById('barcode-input').focus();
    return;
  }

  // mode === 'ask' — show modal with preview + buttons
  document.getElementById('r-total').textContent = F(sale.total);
  const change = sale.change || 0;
  document.getElementById('r-change').textContent = change > 0 ? `${t('pos_change')}: ${F(change)}` : '';
  document.getElementById('receipt-preview-container').innerHTML = generateReceiptHTML(sale);
  document.getElementById('receipt-modal').classList.add('open');
}

// Print without showing modal (for auto mode)
function printReceiptDirect(sale) {
  lastSaleData = sale;
  const area = document.getElementById('receipt-print-area');
  if (!area) return;
  area.innerHTML = generateReceiptHTML(sale);
  area.style.display = 'block';
  if (companyInfo.receipt_paper === '80mm') document.body.classList.add('print-80mm');
  else document.body.classList.remove('print-80mm');
  setTimeout(() => {
    window.print();
    setTimeout(() => { area.style.display = 'none'; }, 500);
  }, 100);
}

function printReceipt() {
  const area = document.getElementById('receipt-print-area');
  if (!area || !lastSaleData) return;
  area.innerHTML = generateReceiptHTML(lastSaleData);
  area.style.display = 'block';
  // Set paper size class
  if (companyInfo.receipt_paper === '80mm') document.body.classList.add('print-80mm');
  else document.body.classList.remove('print-80mm');
  setTimeout(() => {
    window.print();
    setTimeout(() => { area.style.display = 'none'; }, 500);
  }, 100);
}

function closeReceipt() {
  document.getElementById('receipt-modal').classList.remove('open');
  document.getElementById('barcode-input').focus();
}

function exitPOS() {
  if (cart.length === 0) { window.location.href = 'dashboard.html'; return; }
  requestPin(t('pos_cancel_receipt_pin'), async () => {
    // Log cancelled cart
    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const { data: { user } } = await sb.auth.getUser();
    await sb.from('pos_cancelled_carts').insert({
      company_id: companyId, session_id: sessionId, cancelled_by: user?.id,
      items: cart, total, reason: 'receipt cancelled by manager'
    });
    cart = [];
    saveCartToStorage();
    window.location.href = 'dashboard.html';
  });
}

// ===== EXIT PROTECTION =====
window.addEventListener('beforeunload', (e) => {
  if (cart.length > 0) { e.preventDefault(); e.returnValue = ''; }
});

// Prevent back button
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.pushState(null, '', location.href);
  if (cart.length > 0) showToast(t('pos_toast_cart_not_empty'), 'error');
});

function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type === 'error' ? '#dc2626' : '#1e40af';
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('receipt-modal').classList.contains('open')) closeReceipt();
    else if (document.getElementById('pin-modal').classList.contains('open')) closePin();
    else if (document.getElementById('payment-modal').classList.contains('open')) closePayment();
    // ESC ile POS'tan çıkış engelle
  }
});

// ===== LANG SWITCHER =====
function buildPosLangMenu() {
  const menu = document.getElementById('pos-lang-menu');
  if (!menu || typeof LANG_META === 'undefined') return;
  const order = ['ar','az','de','en','es','fr','ja','kg','kz','pl','pt','ru','tm','tr','uz','zh'];
  const cur = (typeof detectLang === 'function') ? detectLang() : 'tr';
  menu.innerHTML = order.map(code => {
    const m = LANG_META[code]; if (!m) return '';
    return `<div class="pos-lang-opt ${code===cur?'active':''}" onclick="posSelectLang('${code}')">${m.code} &nbsp; ${m.name}</div>`;
  }).join('');
  document.getElementById('pos-lang-code').textContent = (LANG_META[cur]?.code) || cur.toUpperCase();
}
function posSelectLang(code) {
  if (typeof setLang === 'function') setLang(code);
  document.getElementById('pos-lang').classList.remove('open');
  buildPosLangMenu();
  // Re-render dynamic JS strings (cart-empty, totals etc.)
  try { renderCart(); } catch(e){}
  // Refresh placeholder header label
  try { document.getElementById('cart-customer').textContent = '👤 ' + t('pos_guest'); } catch(e){}
}
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('pos-lang');
  if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
});
document.addEventListener('langChanged', () => {
  buildPosLangMenu();
  try { renderCart(); } catch(e){}
});
document.addEventListener('DOMContentLoaded', buildPosLangMenu);

init();
</script>
