<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzBhMGYxZSIvPjx0ZXh0IHg9IjYiIHk9IjIzIiBmb250LWZhbWlseT0iSW50ZXIsc2Fucy1zZXJpZiIgZm9udC13ZWlnaHQ9IjgwMCIgZm9udC1zaXplPSIyMCIgZmlsbD0id2hpdGUiPnM8L3RleHQ+PGNpcmNsZSBjeD0iMjUiIGN5PSIyMiIgcj0iNCIgZmlsbD0iIzNiODJmNiIvPjwvc3ZnPg==">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solvenin — Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0a0f1e;--navy2:#0f2650;--blue:#2563eb;--blue-light:#eff6ff;
  --sky:#60a5fa;--white:#fff;--bg:#f5f7fb;
  --gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;
  --gray300:#cbd5e1;--gray400:#94a3b8;--gray500:#64748b;
  --gray600:#475569;--gray700:#334155;--gray800:#1e293b;
  --green:#10b981;--green-light:#ecfdf5;
  --red:#ef4444;--red-light:#fef2f2;
  --orange:#f59e0b;--orange-light:#fffbeb;
  --purple:#8b5cf6;--purple-light:#f5f3ff;
  --teal:#0d9488;--teal-light:#f0fdfa;
  --sidebar-w:220px;
  --font-display:'Outfit',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:var(--font-body);background:var(--bg);color:var(--gray800);min-height:100vh;display:flex}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;width:calc(100vw - var(--sidebar-w));box-sizing:border-box}
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--gray200);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:40;box-shadow:var(--shadow-sm)}
.topbar-title{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--gray800);flex:1}
.topbar-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--gray200);background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .15s}
.topbar-btn:hover{background:var(--gray100)}
.content{padding:28px;flex:1}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-family:var(--font-display);font-size:22px;font-weight:700}
.page-header p{font-size:13px;color:var(--gray500);margin-top:3px}
.header-actions{display:flex;gap:10px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1d4ed8;box-shadow:0 4px 12px rgba(37,99,235,.3);transform:translateY(-1px)}
.btn-outline{background:#fff;color:var(--gray600);border:1px solid var(--gray200)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--gray200);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.stat-card.blue::before{background:var(--blue)}.stat-card.green::before{background:var(--green)}
.stat-card.orange::before{background:var(--orange)}.stat-card.red::before{background:var(--red)}
.stat-label{font-size:11px;font-weight:600;color:var(--gray500);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--gray800);line-height:1;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--gray400);margin-top:4px}
/* Tabs */
.tabs-row{display:flex;gap:4px;background:var(--gray100);padding:4px;border-radius:12px;width:fit-content;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 16px;border-radius:9px;border:none;background:none;font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--gray500);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:#fff;color:var(--blue);box-shadow:var(--shadow-sm)}
/* Filters */
.filters-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--gray200);border-radius:9px;padding:8px 14px;flex:1;max-width:280px}
.search-box input{background:none;border:none;outline:none;font-family:var(--font-body);font-size:13px;color:var(--gray800);width:100%}
.search-box input::placeholder{color:var(--gray400)}
.filter-select{background:#fff;border:1px solid var(--gray200);border-radius:9px;padding:8px 12px;font-family:var(--font-body);font-size:13px;color:var(--gray700);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--blue)}
/* Table */
.table-card{background:#fff;border:1px solid var(--gray200);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--gray400);letter-spacing:.5px;text-transform:uppercase;padding:11px 16px;border-bottom:1px solid var(--gray100);background:var(--gray50);white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:var(--gray600);border-bottom:1px solid var(--gray100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray50)}
.row-actions{display:flex;gap:6px;opacity:0;transition:opacity .2s}
tr:hover .row-actions{opacity:1}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:#065f46}
.badge-blue{background:var(--blue-light);color:#1e40af}
.badge-orange{background:var(--orange-light);color:#92400e}
.badge-red{background:var(--red-light);color:#991b1b}
.badge-purple{background:var(--purple-light);color:#5b21b6}
.badge-gray{background:var(--gray100);color:var(--gray600)}
.badge-teal{background:var(--teal-light);color:#0f766e}
/* Parts table inside modal */
.parts-table{width:100%;border-collapse:collapse;margin-top:8px}
.parts-table th{font-size:11px;font-weight:600;color:var(--gray400);text-transform:uppercase;padding:7px 10px;background:var(--gray50);border-bottom:1px solid var(--gray100);text-align:left}
.parts-table td{padding:7px 10px;border-bottom:1px solid var(--gray100);font-size:13px;vertical-align:middle}
.parts-table tr:last-child td{border-bottom:none}
.parts-table input,.parts-table select{width:100%;border:1px solid var(--gray200);border-radius:6px;padding:5px 8px;font-size:12px;font-family:var(--font-body);outline:none;background:#fff}
.parts-table input:focus,.parts-table select:focus{border-color:var(--blue)}
/* Equipment history panel */
.history-panel{background:var(--gray50);border-radius:12px;padding:16px;margin-top:16px}
.history-panel-title{font-size:12px;font-weight:700;color:var(--gray500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,30,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2);transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:22px 28px 18px;border-bottom:1px solid var(--gray100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray200);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--gray400)}
.modal-close:hover{background:var(--gray100)}
.modal-body{padding:24px 28px}
.modal-footer{padding:16px 28px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--gray100)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--gray500);letter-spacing:.3px;text-transform:uppercase}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--gray200);border-radius:9px;font-family:var(--font-body);font-size:13px;color:var(--gray800);outline:none;background:#fff;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.field textarea{resize:vertical;min-height:68px}
/* Section divider */
.section-label{font-size:11px;font-weight:700;color:var(--gray400);text-transform:uppercase;letter-spacing:.8px;padding:14px 0 8px;border-bottom:1px solid var(--gray100);margin-bottom:12px;grid-column:1/-1}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;background:var(--gray800);box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;transform:translateY(20px);opacity:0;transition:all .3s;max-width:360px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}
/* Confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(10,15,30,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.confirm-box h3{font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--gray500);margin-bottom:20px}
.confirm-actions{display:flex;gap:10px;justify-content:flex-end}
/* Empty */
.empty-state{text-align:center;padding:52px 24px;color:var(--gray400)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-state h3{font-size:14px;font-weight:600;color:var(--gray600);margin-bottom:6px}
/* Loading */
#loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9000;transition:opacity .3s}
.loading-logo{font-family:var(--font-display);font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px}
.loading-logo span{color:var(--sky)}
@media(max-width:900px){.stats-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
</style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">solvenin<span>.</span></div>
</div>

<div id="sb-sidebar"></div>

<div class="main">
  <header class="topbar">
    <div class="topbar-title" data-i18n="page_maintenance">Maintenance</div>
    <div style="flex:1"></div>
    <div class="topbar-btn" id="sb-notif-btn" title="Notifications">🔔</div>
    <div class="topbar-btn" onclick="handleLogout()" title="Logout" style="color:var(--red)">⏻</div>
  </header>

  <div class="content">
    <div class="page-header">
      <div style="flex:1;min-width:0">
        <h1>🔧 <span data-i18n="page_maintenance">Maintenance</span></h1>
        <p data-i18n="page_maintenance_sub">İş emirleri, ekipman ve bakım planları</p>
      </div>
      <div class="header-actions" id="tab-actions"></div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-label" data-i18n="stat_open_wo">Open Orders</div>
        <div class="stat-val" id="stat-open">0</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label" data-i18n="stat_upcoming">Upcoming</div>
        <div class="stat-val" id="stat-upcoming">0</div>
        <div class="stat-sub">30 days</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label" data-i18n="stat_recent_failures">Recent Failures</div>
        <div class="stat-val" id="stat-failures">0</div>
        <div class="stat-sub">30 days</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label" data-i18n="stat_total_equip">Equipment</div>
        <div class="stat-val" id="stat-equip">0</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs-row">
      <button class="tab-btn active" onclick="setTab(this,'wo')">📋 <span data-i18n="tab_work_orders">Work Orders</span></button>
      <button class="tab-btn" onclick="setTab(this,'equip')">⚙️ <span data-i18n="tab_equipment">Equipment</span></button>
      <button class="tab-btn" onclick="setTab(this,'plans')">📅 <span data-i18n="tab_maint_plans">Maintenance Plans</span></button>
      <button class="tab-btn" onclick="setTab(this,'failures')">⚠️ <span data-i18n="tab_failure_records">Failure Records</span></button>
      <button class="tab-btn" onclick="setTab(this,'providers')">🏢 <span data-i18n="tab_service_providers">Service Providers</span></button>
    </div>

    <div id="tab-content"></div>
  </div>
</div>

<!-- ===== WORK ORDER MODAL ===== -->
<div class="modal-overlay" id="wo-modal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <div class="modal-title" id="wo-modal-title">New Work Order</div>
      <button class="modal-close" onclick="closeModal('wo-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field">
          <label data-i18n="lbl_wo_number">Work Order #</label>
          <input type="text" id="wo-number" placeholder="WO-001">
        </div>
        <div class="field">
          <label data-i18n="col_equip">Equipment</label>
          <select id="wo-equip"></select>
        </div>
        <div class="field">
          <label data-i18n="lbl_wo_type">Type</label>
          <select id="wo-type">
            <option value="preventive" data-i18n="wo_type_preventive">Preventive</option>
            <option value="corrective" data-i18n="wo_type_corrective">Corrective</option>
            <option value="emergency" data-i18n="wo_type_emergency">Emergency</option>
            <option value="inspection" data-i18n="wo_type_inspection">Inspection</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="lbl_priority">Priority</label>
          <select id="wo-priority">
            <option value="low" data-i18n="priority_low">Low</option>
            <option value="medium" data-i18n="priority_medium">Medium</option>
            <option value="high" data-i18n="priority_high">High</option>
            <option value="critical" data-i18n="priority_critical">Critical</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="col_status">Status</label>
          <select id="wo-status">
            <option value="open" data-i18n="status_open">Open</option>
            <option value="in_progress" data-i18n="status_in_progress">In Progress</option>
            <option value="completed" data-i18n="status_completed">Completed</option>
            <option value="cancelled" data-i18n="status_cancelled">Cancelled</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="col_planned_date">Planned Date</label>
          <input type="date" id="wo-planned-date">
        </div>
        <div class="field">
          <label>Completion Date</label>
          <input type="date" id="wo-completed-date">
        </div>
        <div class="field">
          <label data-i18n="lbl_cost">Cost</label>
          <input type="number" id="wo-cost" min="0" step="0.01">
        </div>
        <div class="field">
          <label data-i18n="lbl_assignee">Assigned To</label>
          <input type="text" id="wo-assignee">
        </div>
        <div class="field">
          <label data-i18n="col_specialization">Service Provider</label>
          <select id="wo-provider">
            <option value="">— none —</option>
          </select>
        </div>
        <div class="field full">
          <label data-i18n="label_notes">Description</label>
          <textarea id="wo-desc" rows="2"></textarea>
        </div>
      </div>
      <!-- PARTS -->
      <div class="section-label" style="display:block;margin-top:8px" data-i18n="lbl_parts">Parts Used</div>
      <table class="parts-table">
        <thead><tr>
          <th style="width:45%" data-i18n="col_name">Part / Product</th>
          <th style="width:20%" data-i18n="lbl_part_qty">Qty</th>
          <th style="width:20%" data-i18n="lbl_part_cost">Cost</th>
          <th style="width:15%"></th>
        </tr></thead>
        <tbody id="wo-parts-body"></tbody>
      </table>
      <button class="btn btn-outline btn-sm" onclick="addWoPart()" style="margin-top:8px">+ <span data-i18n="btn_add_line">Add Part</span></button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('wo-modal')" data-i18n="btn_cancel">Cancel</button>
      <button class="btn btn-primary" onclick="saveWO()" data-i18n="btn_save">Save</button>
    </div>
  </div>
</div>

<!-- ===== EQUIPMENT MODAL ===== -->
<div class="modal-overlay" id="equip-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="equip-modal-title">New Equipment</div>
      <button class="modal-close" onclick="closeModal('equip-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field">
          <label data-i18n="lbl_equip_number">Equipment #</label>
          <input type="text" id="eq-number" placeholder="EQ-001">
        </div>
        <div class="field">
          <label data-i18n="lbl_equip_name">Name</label>
          <input type="text" id="eq-name">
        </div>
        <div class="field">
          <label data-i18n="lbl_equip_category">Category</label>
          <input type="text" id="eq-category" list="eq-cat-list">
          <datalist id="eq-cat-list"></datalist>
        </div>
        <div class="field">
          <label data-i18n="lbl_brand_model">Brand / Model</label>
          <input type="text" id="eq-brand">
        </div>
        <div class="field">
          <label data-i18n="lbl_location">Location</label>
          <input type="text" id="eq-location">
        </div>
        <div class="field">
          <label data-i18n="col_status">Status</label>
          <select id="eq-status">
            <option value="active" data-i18n="status_active">Active</option>
            <option value="maintenance" data-i18n="status_maintenance">Maintenance</option>
            <option value="inactive" data-i18n="status_inactive">Inactive</option>
            <option value="retired">Retired</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="lbl_last_maintenance">Last Maintenance</label>
          <input type="date" id="eq-last-maint">
        </div>
        <div class="field">
          <label data-i18n="lbl_next_maintenance">Next Maintenance</label>
          <input type="date" id="eq-next-maint">
        </div>
        <div class="field full">
          <label data-i18n="label_notes">Notes</label>
          <textarea id="eq-notes" rows="2"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('equip-modal')" data-i18n="btn_cancel">Cancel</button>
      <button class="btn btn-primary" onclick="saveEquip()" data-i18n="btn_save">Save</button>
    </div>
  </div>
</div>

<!-- ===== MAINTENANCE PLAN MODAL ===== -->
<div class="modal-overlay" id="plan-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="plan-modal-title">New Plan</div>
      <button class="modal-close" onclick="closeModal('plan-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full">
          <label data-i18n="lbl_plan_name">Plan Name</label>
          <input type="text" id="pl-name">
        </div>
        <div class="field">
          <label data-i18n="col_equip">Equipment</label>
          <select id="pl-equip"></select>
        </div>
        <div class="field">
          <label data-i18n="lbl_frequency">Frequency</label>

// ===== LOADERS =====

// ===== STATS =====
function updateStats() {
  const today = new Date();
  const in30 = new Date(today); in30.setDate(in30.getDate() + 30);
  document.getElementById('stat-open').textContent = workOrders.filter(w => ['open','in_progress'].includes(w.status)).length;
  document.getElementById('stat-upcoming').textContent = plans.filter(p => {
    if (!p.next_maintenance) return false;
    const d = new Date(p.next_maintenance);
    return d >= today && d <= in30;
  }).length;
  document.getElementById('stat-failures').textContent = failures.filter(f => {
    if (!f.date) return false;
    const d = new Date(f.date);
    const past30 = new Date(today); past30.setDate(past30.getDate() - 30);
    return d >= past30;
  }).length;
  document.getElementById('stat-equip').textContent = equipment.length;
}

// ===== TABS =====
function setTab(btn, tab) {
  activeTab = tab;

  const map = { wo:'btn_add_work_order', equip:'btn_add_equipment', plans:'btn_add_maint_plan', failures:'btn_add_failure', providers:'btn_add_provider' };
  const fnMap = { wo:'openWOModal()', equip:'openEquipModal()', plans:'openPlanModal()', failures:'openFailureModal()', providers:'openProviderModal()' };
  actions.innerHTML = `<button class="btn btn-primary" onclick="${fnMap[tab]}" data-i18n="${map[tab]}">+ Add</button>`;
  applyTranslations();
  if (tab === 'wo') renderWOs();

    document.getElementById('wo-priority').value = 'medium';

  } else {

    document.getElementById('wo-number').value = w.wo_number||'';
    document.getElementById('wo-equip').value = w.equipment_id||'';
    document.getElementById('wo-type').value = w.wo_type||'preventive';
    document.getElementById('wo-priority').value = w.priority||'medium';

    document.getElementById('wo-planned-date').value = w.planned_date||'';
    document.getElementById('wo-completed-date').value = w.completed_date||'';

    document.getElementById('wo-assignee').value = w.assigned_to||'';
    document.getElementById('wo-provider').value = w.provider_id||'';
    document.getElementById('wo-desc').value = w.description||'';
    const { data: parts } = await sb.from('work_order_parts').select('*').eq('work_order_id', id).eq('is_active', true);
    woParts = (parts||[]).map(p => ({ id:p.id, product_id:p.product_id||'', qty:p.quantity, cost:p.unit_cost||0 }));
  }
  renderWOParts();
  applyTranslations();
  openModal('wo-modal');
}

async function saveWO() {
  const { data: { user } } = await sb.auth.getUser();
  const status = document.getElementById('wo-status').value;
  const prevStatus = editingWOId ? workOrders.find(w => w.id === editingWOId)?.status : null;
  const payload = {
    company_id: companyId,
    wo_number: document.getElementById('wo-number').value.trim() || 'WO-'+Date.now(),
    equipment_id: document.getElementById('wo-equip').value || null,
    wo_type: document.getElementById('wo-type').value,
    priority: document.getElementById('wo-priority').value,
    status,
    planned_date: document.getElementById('wo-planned-date').value || null,
    completed_date: document.getElementById('wo-completed-date').value || null,
    cost: parseFloat(document.getElementById('wo-cost').value) || null,
    assigned_to: document.getElementById('wo-assignee').value.trim() || null,
    provider_id: document.getElementById('wo-provider').value || null,
    description: document.getElementById('wo-desc').value.trim() || null,
    created_by: user.id
  };

  let woId = editingWOId;
  if (editingWOId) {
    await sb.from('work_orders').update(payload).eq('id', editingWOId);
    await sb.from('work_order_parts').update({ is_active: false }).eq('work_order_id', editingWOId);
  } else {
    const { data, error } = await sb.from('work_orders').insert(payload).select().single();
    if (error) { showToast('Error: '+error.message,'error'); return; }
    woId = data.id;
  }

  // Parts
  if (woParts.length) {
    await sb.from('work_order_parts').insert(woParts.map(p => ({
      work_order_id: woId, company_id: companyId,
      product_id: p.product_id || null, quantity: p.qty, unit_cost: p.cost,
      created_by: user.id
    })));
  }

  // Auto-create maintenance_history when completed
  if (status === 'completed' && prevStatus !== 'completed') {
    const eq = equipment.find(e => e.id === payload.equipment_id);
    await sb.from('maintenance_history').insert({
      company_id: companyId,
      work_order_id: woId,
      equipment_id: payload.equipment_id,
      maintenance_date: payload.completed_date || payload.planned_date || new Date().toISOString().split('T')[0],
      maintenance_type: payload.wo_type,
      description: payload.description,
      cost: payload.cost,
      performed_by: payload.assigned_to,
      created_by: user.id
    }).select().maybeSingle();
    // Update equipment last_maintenance
    if (eq) {
      await sb.from('equipment').update({ last_maintenance: payload.completed_date || payload.planned_date }).eq('id', eq.id);
    }
  }

  showToast(t('toast_wo_saved'),'success');
  closeModal('wo-modal');
  await Promise.all([loadWOs(), loadEquipment()]);
  updateStats();
  renderWOs();
}

async function deleteWO(id) {
  if (!await showConfirm(t('confirm_delete_wo'), t('lbl_delete')||'Delete')) return;

// ===== PLAN CRUD =====
function calcNextMaint(lastDate, freq, intervalDays) {
  if (!lastDate) return '';
  const d = new Date(lastDate);
  const freqDays = { daily:1, weekly:7, monthly:30, quarterly:91, yearly:365 };
  const days = freq === 'custom' ? (intervalDays||30) : (freqDays[freq]||30);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}
function updateNextMaintDate() {
  const freq = document.getElementById('pl-freq').value;
  const last = document.getElementById('pl-last-maint').value;
  const interval = parseInt(document.getElementById('pl-interval').value)||30;
  document.getElementById('pl-interval-field').style.display = freq === 'custom' ? '' : 'none';
  document.getElementById('pl-next-maint').value = calcNextMaint(last, freq, interval);
}

// ===== HELPERS =====
function fmtCurr(n) { return n == null || isNaN(n) ? '—' : new Intl.NumberFormat(undefined,{minimumFractionDigits:0,maximumFractionDigits:2}).format(n); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

let toastTimer;
function showToast(msg, type='default') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type !== 'default' ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function showConfirm(msg, confirmLabel='Confirm') {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-box"><h3>${t('lbl_confirm')||'Confirm'}</h3><p>${msg}</p>
      <div class="confirm-actions">
        <button class="btn btn-outline" id="cn">${t('btn_cancel')||'Cancel'}</button>
        <button class="btn btn-danger" id="cy">${confirmLabel}</button>
      </div></div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cy').onclick = () => { overlay.remove(); resolve(true); };
    overlay.querySelector('#cn').onclick  = () => { overlay.remove(); resolve(false); };
  });
}
