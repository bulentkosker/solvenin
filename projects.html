<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzBhMGYxZSIvPjx0ZXh0IHg9IjYiIHk9IjIzIiBmb250LWZhbWlseT0iSW50ZXIsc2Fucy1zZXJpZiIgZm9udC13ZWlnaHQ9IjgwMCIgZm9udC1zaXplPSIyMCIgZmlsbD0id2hpdGUiPnM8L3RleHQ+PGNpcmNsZSBjeD0iMjUiIGN5PSIyMiIgcj0iNCIgZmlsbD0iIzNiODJmNiIvPjwvc3ZnPg==">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solvenin — Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:#0a0f1e;--navy2:#0f2650;--blue:#2563eb;--blue-light:#eff6ff;
  --sky:#60a5fa;--white:#fff;--bg:#f5f7fb;
  --gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;
  --gray300:#cbd5e1;--gray400:#94a3b8;--gray500:#64748b;
  --gray600:#475569;--gray700:#334155;--gray800:#1e293b;
  --green:#10b981;--green-light:#ecfdf5;
  --red:#ef4444;--red-light:#fef2f2;
  --orange:#f59e0b;--orange-light:#fffbeb;
  --purple:#8b5cf6;--purple-light:#f5f3ff;
  --teal:#0d9488;--teal-light:#f0fdfa;
  --sidebar-w:220px;
  --font-display:'Outfit',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:var(--font-body);background:var(--bg);color:var(--gray800);min-height:100vh;display:flex}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;width:calc(100vw - var(--sidebar-w));box-sizing:border-box}
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--gray200);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:40;box-shadow:var(--shadow-sm)}
.topbar-title{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--gray800);flex:1}
.topbar-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--gray200);background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .15s}
.topbar-btn:hover{background:var(--gray100)}
.content{padding:28px;flex:1}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-family:var(--font-display);font-size:22px;font-weight:700}
.page-header p{font-size:13px;color:var(--gray500);margin-top:3px}
.header-actions{display:flex;gap:10px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1d4ed8;box-shadow:0 4px 12px rgba(37,99,235,.3);transform:translateY(-1px)}
.btn-outline{background:#fff;color:var(--gray600);border:1px solid var(--gray200)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-ghost{background:none;border:none;color:var(--gray500);cursor:pointer;font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:hover{background:var(--gray100);color:var(--gray800)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px}

/* Project cards grid */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.project-card{background:#fff;border:1px solid var(--gray200);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.project-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--blue)}
.project-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.project-card-name{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--gray800);flex:1;margin-right:10px}
.project-card-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.project-card:hover .project-card-actions{opacity:1}
.project-card-meta{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.project-card-desc{font-size:12px;color:var(--gray500);margin-bottom:12px;line-height:1.5}
.progress-bar{height:6px;background:var(--gray100);border-radius:99px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:99px;background:var(--blue);transition:width .3s}
.progress-fill.green{background:var(--green)}
.progress-fill.orange{background:var(--orange)}
.project-card-footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--gray400);margin-top:12px;padding-top:12px;border-top:1px solid var(--gray100)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:#065f46}
.badge-blue{background:var(--blue-light);color:#1e40af}
.badge-orange{background:var(--orange-light);color:#92400e}
.badge-red{background:var(--red-light);color:#991b1b}
.badge-purple{background:var(--purple-light);color:#5b21b6}
.badge-gray{background:var(--gray100);color:var(--gray600)}
.badge-teal{background:var(--teal-light);color:#0f766e}

/* Filters */
.filters-row{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--gray200);border-radius:9px;padding:8px 14px;flex:1;max-width:300px}
.search-box input{background:none;border:none;outline:none;font-family:var(--font-body);font-size:13px;color:var(--gray800);width:100%}
.search-box input::placeholder{color:var(--gray400)}
.filter-select{background:#fff;border:1px solid var(--gray200);border-radius:9px;padding:8px 12px;font-family:var(--font-body);font-size:13px;color:var(--gray700);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--blue)}

/* Detail view */
#detail-view{display:none}
.detail-header{background:#fff;border:1px solid var(--gray200);border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.detail-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--gray800);margin-bottom:8px}
.detail-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px}
.detail-stat{padding:14px 16px;background:var(--gray50);border-radius:12px}
.detail-stat-label{font-size:11px;font-weight:600;color:var(--gray400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-stat-val{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--gray800)}

/* Tabs */
.tabs-row{display:flex;gap:4px;background:var(--gray100);padding:4px;border-radius:12px;width:fit-content;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:9px;border:none;background:none;font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--gray500);cursor:pointer;transition:all .15s}
.tab-btn.active{background:#fff;color:var(--blue);box-shadow:var(--shadow-sm)}

/* Table */
.table-card{background:#fff;border:1px solid var(--gray200);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--gray400);letter-spacing:.5px;text-transform:uppercase;padding:12px 16px;border-bottom:1px solid var(--gray100);background:var(--gray50);white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:var(--gray600);border-bottom:1px solid var(--gray100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray50)}
.row-actions{display:flex;gap:6px;opacity:0;transition:opacity .2s}
tr:hover .row-actions{opacity:1}

/* Kanban */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.kanban-col{background:var(--gray50);border-radius:14px;padding:14px;min-height:200px}
.kanban-col-header{font-size:12px;font-weight:700;color:var(--gray500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.kanban-col-count{background:var(--gray200);color:var(--gray600);border-radius:99px;padding:2px 8px;font-size:11px}
.kanban-card{background:#fff;border:1px solid var(--gray200);border-radius:10px;padding:12px;margin-bottom:8px;cursor:grab;transition:all .15s;box-shadow:var(--shadow-sm)}
.kanban-card:hover{box-shadow:var(--shadow-md);border-color:var(--blue)}
.kanban-card.dragging{opacity:.5;cursor:grabbing}
.kanban-col.drag-over{background:var(--blue-light);border:2px dashed var(--blue)}
.kanban-card-title{font-size:13px;font-weight:600;color:var(--gray800);margin-bottom:6px}
.kanban-card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,30,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2);transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:22px 28px 18px;border-bottom:1px solid var(--gray100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray200);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--gray400)}
.modal-close:hover{background:var(--gray100)}
.modal-body{padding:24px 28px}
.modal-footer{padding:16px 28px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--gray100)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--gray500);letter-spacing:.3px;text-transform:uppercase}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--gray200);border-radius:9px;font-family:var(--font-body);font-size:13px;color:var(--gray800);outline:none;background:#fff;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.field textarea{resize:vertical;min-height:68px}

/* Expense summary */
.budget-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.budget-card{background:#fff;border:1px solid var(--gray200);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm)}
.budget-card-label{font-size:11px;font-weight:600;color:var(--gray400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.budget-card-val{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--gray800)}

/* Time logs grouped */
.time-group{margin-bottom:16px}
.time-group-header{font-size:12px;font-weight:700;color:var(--gray500);letter-spacing:.5px;text-transform:uppercase;padding:8px 0;border-bottom:1px solid var(--gray100);margin-bottom:8px}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--gray400)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-state h3{font-size:14px;font-weight:600;color:var(--gray600);margin-bottom:6px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;background:var(--gray800);box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;transform:translateY(20px);opacity:0;transition:all .3s;max-width:360px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}

/* Confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(10,15,30,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.confirm-box h3{font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--gray500);margin-bottom:20px}
.confirm-actions{display:flex;gap:10px;justify-content:flex-end}

/* Loading */
#loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9000;transition:opacity .3s}
.loading-logo{font-family:var(--font-display);font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px}
.loading-logo span{color:var(--sky)}

@media(max-width:900px){
  .kanban-board{grid-template-columns:1fr 1fr}
  .detail-stats{grid-template-columns:1fr 1fr}
  .projects-grid{grid-template-columns:1fr}
  .budget-summary{grid-template-columns:1fr}
}
@media(max-width:768px){.sidebar{transform:translateX(-100%);transition:transform .25s}.sidebar.sb-open{transform:translateX(0)}.main{margin-left:0!important;width:100%!important}.topbar{padding-left:56px!important}.content{padding:16px!important}}
</style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">solvenin<span>.</span></div>
</div>

<div id="sb-sidebar"></div>

<div class="main">
  <header class="topbar">
    <div class="topbar-title" data-i18n="page_projects">Projects</div>
    <div style="flex:1"></div>
    <div class="topbar-btn" id="sb-notif-btn" title="Notifications">🔔</div>
    <div class="topbar-btn" onclick="handleLogout()" title="Logout" style="color:var(--red)">⏻</div>
  </header>

  <div class="content">

    <!-- ===== PROJECT LIST VIEW ===== -->
    <div id="list-view">
      <div class="page-header">
        <div style="flex:1;min-width:0">
          <h1>📅 <span data-i18n="page_projects">Projects</span></h1>
          <p data-i18n="page_projects_sub">Proje, görev ve milestone yönetimi</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="openProjectModal()" data-i18n="btn_add_project">+ New Project</button>
        </div>
      </div>

      <div class="filters-row">
        <div class="search-box">🔍 <input type="text" id="proj-search" placeholder="Search projects..." oninput="renderProjects()"></div>
        <select class="filter-select" id="proj-status" onchange="renderProjects()">
          <option value="" data-i18n="all_status">All Status</option>
          <option value="planning" data-i18n="status_draft">Planning</option>
          <option value="active" data-i18n="status_active">Active</option>
          <option value="on_hold" data-i18n="status_on_hold">On Hold</option>
          <option value="completed" data-i18n="status_completed">Completed</option>
          <option value="cancelled" data-i18n="status_cancelled">Cancelled</option>
        </select>
        <select class="filter-select" id="proj-priority" onchange="renderProjects()">
          <option value="">All Priority</option>
          <option value="low" data-i18n="priority_low">Low</option>
          <option value="medium" data-i18n="priority_medium">Medium</option>
          <option value="high" data-i18n="priority_high">High</option>
          <option value="critical" data-i18n="priority_critical">Critical</option>
        </select>
      </div>

      <div class="projects-grid" id="projects-grid"></div>
    </div>

    <!-- ===== DETAIL VIEW ===== -->
    <div id="detail-view">
      <div style="margin-bottom:16px">
        <button class="btn-ghost" onclick="closeDetail()" data-i18n="lbl_back_projects">← Projects</button>
      </div>

      <div class="detail-header" id="detail-header"></div>

      <div class="tabs-row">
        <button class="tab-btn active" onclick="setDetailTab(this,'tasks')" data-i18n="tab_tasks">Tasks</button>
        <button class="tab-btn" onclick="setDetailTab(this,'kanban')" data-i18n="tab_kanban">Kanban</button>
        <button class="tab-btn" onclick="setDetailTab(this,'time')" data-i18n="tab_time">Time</button>
        <button class="tab-btn" onclick="setDetailTab(this,'expenses')" data-i18n="tab_expenses">Expenses</button>
        <button class="tab-btn" onclick="setDetailTab(this,'milestones')" data-i18n="tab_milestones">Milestones</button>
      </div>

      <div class="header-actions" id="detail-tab-actions" style="margin-bottom:16px"></div>
      <div id="detail-tab-content"></div>
    </div>

  </div>
</div>

<!-- ===== PROJECT MODAL ===== -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="project-modal-title">New Project</div>
      <button class="modal-close" onclick="closeModal('project-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full">
          <label data-i18n="lbl_project_name">Project Name</label>
          <input type="text" id="p-name">
        </div>
        <div class="field full">
          <label data-i18n="label_notes">Description</label>
          <textarea id="p-desc" rows="2"></textarea>
        </div>
        <div class="field">
          <label data-i18n="col_status">Status</label>
          <select id="p-status">
            <option value="planning">Planning</option>
            <option value="active" data-i18n="status_active">Active</option>
            <option value="on_hold" data-i18n="status_on_hold">On Hold</option>
            <option value="completed" data-i18n="status_completed">Completed</option>
            <option value="cancelled" data-i18n="status_cancelled">Cancelled</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="lbl_priority">Priority</label>
          <select id="p-priority">
            <option value="low" data-i18n="priority_low">Low</option>
            <option value="medium" data-i18n="priority_medium">Medium</option>
            <option value="high" data-i18n="priority_high">High</option>
            <option value="critical" data-i18n="priority_critical">Critical</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="lbl_start_date">Start Date</label>
          <input type="date" id="p-start">
        </div>
        <div class="field">
          <label data-i18n="lbl_end_date">End Date</label>
          <input type="date" id="p-end">
        </div>
        <div class="field">
          <label data-i18n="lbl_budget">Budget</label>
          <input type="number" id="p-budget" min="0" step="0.01">
        </div>
        <div class="field">
          <label data-i18n="lbl_progress">Progress (%)</label>
          <input type="number" id="p-progress" min="0" max="100" value="0">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('project-modal')" data-i18n="btn_cancel">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()" data-i18n="btn_save">Save</button>
    </div>
  </div>
</div>

<!-- ===== TASK MODAL ===== -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="task-modal-title">New Task</div>
      <button class="modal-close" onclick="closeModal('task-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full">
          <label data-i18n="col_task">Task</label>
          <input type="text" id="t-title">
        </div>
        <div class="field">
          <label data-i18n="col_status">Status</label>
          <select id="t-status">
            <option value="todo" data-i18n="status_todo">To Do</option>
            <option value="in_progress" data-i18n="status_in_progress">In Progress</option>
            <option value="in_review" data-i18n="status_in_review">In Review</option>
            <option value="completed" data-i18n="status_completed">Completed</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="lbl_priority">Priority</label>
          <select id="t-priority">
            <option value="low" data-i18n="priority_low">Low</option>
            <option value="medium" data-i18n="priority_medium">Medium</option>
            <option value="high" data-i18n="priority_high">High</option>
            <option value="critical" data-i18n="priority_critical">Critical</option>

// ===== STATUS / PRIORITY HELPERS =====
const projStatusBadge = { planning:'badge-gray', active:'badge-blue', on_hold:'badge-orange', completed:'badge-green', cancelled:'badge-red' };
const taskStatusBadge = { todo:'badge-gray', in_progress:'badge-blue', in_review:'badge-orange', completed:'badge-green' };
const priorityBadge   = { low:'badge-teal', medium:'badge-blue', high:'badge-orange', critical:'badge-red' };

function pLabel(s) { return {low:t('priority_low'),medium:t('priority_medium'),high:t('priority_high'),critical:t('priority_critical')}[s]||s; }
function sLabel(s) { return {planning:'Planning',active:t('status_active'),on_hold:t('status_on_hold'),completed:t('status_completed'),cancelled:t('status_cancelled')}[s]||s; }
function tLabel(s) { return {todo:t('status_todo'),in_progress:t('status_in_progress'),in_review:t('status_in_review'),completed:t('status_completed')}[s]||s; }

// ===== RENDER PROJECTS =====
function renderProjects() {
  const q = (document.getElementById('proj-search')?.value||'').toLowerCase();
  const sf = document.getElementById('proj-status')?.value||'';
  const pf = document.getElementById('proj-priority')?.value||'';

  const list = projects.filter(p =>
    (!q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q)) &&
    (!sf || p.status === sf) &&
    (!pf || p.priority === pf)
  );

  const grid = document.getElementById('projects-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📅</div><h3>${t('no_data')||'No projects'}</h3></div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const prog = p.progress || 0;
    const progColor = prog >= 100 ? 'green' : prog >= 60 ? '' : prog >= 30 ? '' : 'orange';
    const overBudget = p.budget && p.spent > p.budget;
    return `
    <div class="project-card" onclick="openDetail('${p.id}')">
      <div class="project-card-top">
        <div class="project-card-name">${p.name}</div>
        <div class="project-card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-sm btn-outline btn-icon" onclick="openProjectModal('${p.id}')" title="${t('btn_edit')}">✏️</button>
          <button class="btn btn-sm btn-danger btn-icon" onclick="deleteProject('${p.id}')" title="${t('lbl_delete')||'Delete'}">🗑️</button>
        </div>
      </div>
      <div class="project-card-meta">
        <span class="badge ${projStatusBadge[p.status]||'badge-gray'}">${sLabel(p.status)}</span>
        <span class="badge ${priorityBadge[p.priority]||'badge-gray'}">${pLabel(p.priority)}</span>
      </div>
      ${p.description ? `<div class="project-card-desc">${p.description}</div>` : ''}
      <div class="progress-bar"><div class="progress-fill ${progColor}" style="width:${prog}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray400);margin-bottom:4px">
        <span>${t('lbl_progress')||'Progress'}</span><span>${prog}%</span>
      </div>
      <div class="project-card-footer">
        <span>${p.start_date||'—'} → ${p.end_date||'—'}</span>
        <span style="color:${overBudget?'var(--red)':'var(--gray400)'}">
          ${p.budget ? fmtCurr(p.spent||0)+' / '+fmtCurr(p.budget) : '—'}
        </span>
      </div>
    </div>`;
  }).join('');
  applyTranslations();
}

// ===== OPEN DETAIL =====
async function openDetail(id) {
  currentProject = projects.find(p => p.id === id);
  if (!currentProject) return;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  renderDetailHeader();
  await loadTasks(id);
  await loadTimeLogs(id);
  await loadExpenses(id);
  await loadMilestones(id);
  setDetailTab(document.querySelector('#detail-view .tab-btn.active'), activeDetailTab);
  applyTranslations();
}

function closeDetail() {
  currentProject = null;
  document.getElementById('list-view').style.display = '';
  document.getElementById('detail-view').style.display = 'none';
  activeDetailTab = 'tasks';
  document.querySelectorAll('#detail-view .tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
}

function renderDetailHeader() {
  const p = currentProject;
  const prog = p.progress || 0;
  const spent = expenses.reduce((s,e) => s + (e.amount||0), 0);
  const remaining = p.budget ? Math.max(0, p.budget - spent) : null;
  document.getElementById('detail-header').innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div class="detail-title">${p.name}</div>

          <span class="badge ${projStatusBadge[p.status]||'badge-gray'}">${sLabel(p.status)}</span>
          <span class="badge ${priorityBadge[p.priority]||'badge-gray'}">${pLabel(p.priority)}</span>
          ${p.start_date ? `<span style="font-size:12px;color:var(--gray500)">📅 ${p.start_date} → ${p.end_date||'?'}</span>` : ''}
        </div>
        ${p.description ? `<p style="font-size:13px;color:var(--gray500)">${p.description}</p>` : ''}
      </div>
      <button class="btn btn-outline btn-sm" onclick="openProjectModal('${p.id}')">✏️ ${t('btn_edit')||'Edit'}</button>
    </div>
    <div style="margin-top:14px">
      <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${prog}%"></div></div>
      <div style="font-size:11px;color:var(--gray400);margin-top:4px">${prog}% ${t('lbl_progress')||'progress'}</div>
    </div>
    <div class="detail-stats">
      <div class="detail-stat">
        <div class="detail-stat-label" data-i18n="tab_tasks">Tasks</div>
        <div class="detail-stat-val">${tasks.length}</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-label" data-i18n="lbl_budget">Budget</div>
        <div class="detail-stat-val">${p.budget ? fmtCurr(p.budget) : '—'}</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-label" data-i18n="lbl_spent">Spent</div>
        <div class="detail-stat-val" style="color:${p.budget && spent > p.budget ? 'var(--red)' : 'var(--gray800)'}">${fmtCurr(spent)}</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-label" data-i18n="lbl_remaining">Remaining</div>
        <div class="detail-stat-val">${remaining !== null ? fmtCurr(remaining) : '—'}</div>
      </div>
    </div>`;
}

// ===== DETAIL TABS =====
function setDetailTab(btn, tab) {
  activeDetailTab = tab;
  document.querySelectorAll('#detail-view .tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const actions = document.getElementById('detail-tab-actions');
  if (tab === 'tasks') {
    actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openTaskModal()" data-i18n="btn_add_task">+ Add Task</button>`;

// ===== TASKS TAB =====
function renderTasks() {
  const el = document.getElementById('detail-tab-content');

      <th data-i18n="col_status">Status</th>

      <th data-i18n="col_est_h">Est. h</th>
      <th></th>
    </tr></thead>
    <tbody>${tasks.map(t2 => `
      <tr>
        <td style="font-weight:600;color:var(--gray800)">${t2.title}</td>
        <td><span class="badge ${taskStatusBadge[t2.status]||'badge-gray'}">${tLabel(t2.status)}</span></td>
        <td><span class="badge ${priorityBadge[t2.priority]||'badge-gray'}">${pLabel(t2.priority)}</span></td>
        <td>${t2.assignee||'—'}</td>
        <td style="color:${t2.deadline && new Date(t2.deadline) < new Date() && t2.status !== 'completed' ? 'var(--red)' : 'var(--gray500)'}">${t2.deadline||'—'}</td>

          <button class="btn btn-sm btn-danger btn-icon" onclick="deleteTask('${t2.id}')">🗑️</button>
        </div></td>
      </tr>`).join('')}
    </tbody></table></div></div>`;
  applyTranslations();
}

// ===== KANBAN TAB =====
function renderKanban() {
  const cols = [
    { key:'todo',       label: t('kanban_todo')||'To Do' },
    { key:'in_progress',label: t('kanban_doing')||'In Progress' },
    { key:'in_review',  label: t('kanban_review')||'Review' },
    { key:'completed',  label: t('kanban_done')||'Done' }
  ];
  const el = document.getElementById('detail-tab-content');
  el.innerHTML = `<div class="kanban-board">${cols.map(col => {
    const colTasks = tasks.filter(t => t.status === col.key);
    return `<div class="kanban-col" data-col="${col.key}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="onKanbanDrop(event,'${col.key}')">
      <div class="kanban-col-header">
        <span>${col.label}</span>
        <span class="kanban-col-count">${colTasks.length}</span>
      </div>
      ${colTasks.map(t => `
        <div class="kanban-card" draggable="true" data-task-id="${t.id}"
          ondragstart="onKanbanDragStart(event,'${t.id}')"
          ondragend="this.classList.remove('dragging')">
          <div class="kanban-card-title">${t.title}</div>
          <div class="kanban-card-meta">
            <span class="badge ${priorityBadge[t.priority]||'badge-gray'}" style="font-size:10px">${pLabel(t.priority)}</span>
            ${t.assignee ? `<span style="font-size:11px;color:var(--gray400)">👤 ${t.assignee}</span>` : ''}
            ${t.deadline ? `<span style="font-size:11px;color:${new Date(t.deadline)<new Date()&&t.status!=='completed'?'var(--red)':'var(--gray400)'}">📅 ${t.deadline}</span>` : ''}
          </div>
        </div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

let dragTaskId = null;
function onKanbanDragStart(event, taskId) {
  dragTaskId = taskId;
  event.currentTarget.classList.add('dragging');
  event.dataTransfer.effectAllowed = 'move';
}
async function onKanbanDrop(event, newStatus) {
  event.currentTarget.classList.remove('drag-over');
  if (!dragTaskId) return;
  const task = tasks.find(t => t.id === dragTaskId);
  if (!task || task.status === newStatus) { dragTaskId = null; return; }
  await sb.from('tasks').update({ status: newStatus }).eq('id', dragTaskId);
  task.status = newStatus;
  dragTaskId = null;
  renderKanban();
}

// ===== TIME TAB =====
function renderTime() {
  const el = document.getElementById('detail-tab-content');

  }
  const totalH = timeLogs.reduce((s,l) => s + (l.hours||0), 0);
  // Group by person
  const byPerson = {};
  timeLogs.forEach(l => {
    const k = l.person || 'Unknown';
    byPerson[k] = (byPerson[k]||0) + (l.hours||0);
  });
  el.innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div class="detail-stat" style="flex:1;min-width:140px">
        <div class="detail-stat-label">${t('lbl_logged_hours')||'Total Hours'}</div>
        <div class="detail-stat-val">${totalH.toFixed(1)}h</div>
      </div>
      ${Object.entries(byPerson).map(([p,h]) => `
        <div class="detail-stat" style="flex:1;min-width:140px">
          <div class="detail-stat-label">👤 ${p}</div>
          <div class="detail-stat-val">${h.toFixed(1)}h</div>
        </div>`).join('')}
    </div>
    <div class="table-card"><div class="table-wrap"><table>
      <thead><tr>
        <th data-i18n="col_date">Date</th>
        <th>${t('lbl_duration_h')||'Hours'}</th>
        <th data-i18n="col_task">Task</th>
        <th>${t('col_assignee')||'Person'}</th>
        <th data-i18n="label_notes">Notes</th>
        <th></th>
      </tr></thead>
      <tbody>${timeLogs.map(l => {
        const taskName = tasks.find(t => t.id === l.task_id)?.title || '—';
        return `<tr>
          <td>${l.date||'—'}</td>
          <td style="font-weight:600">${l.hours}h</td>
          <td>${taskName}</td>
          <td>${l.person||'—'}</td>
          <td>${l.notes||'—'}</td>
          <td><div class="row-actions">
            <button class="btn btn-sm btn-danger btn-icon" onclick="deleteTimeLog('${l.id}')">🗑️</button>
          </div></td>
        </tr>`;
      }).join('')}
      </tbody></table></div></div>`;
  applyTranslations();
}

function renderExpenses() {
  const el = document.getElementById('detail-tab-content');
  const totalSpent = expenses.reduce((s,e) => s + (e.amount||0), 0);
  const budget = currentProject?.budget || 0;
  const remaining = budget ? Math.max(0, budget - totalSpent) : null;

  let html = `<div class="budget-summary">
    <div class="budget-card">
      <div class="budget-card-label" data-i18n="lbl_budget">Budget</div>
      <div class="budget-card-val">${budget ? fmtCurr(budget) : '—'}</div>
    </div>

async function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) { showToast(t('toast_name_required')||'Name required','error'); return; }
  const { data: { user } } = await sb.auth.getUser();
  const payload = {
    company_id: companyId, name,
    description: document.getElementById('p-desc').value.trim()||null,
    status: document.getElementById('p-status').value,
    priority: document.getElementById('p-priority').value,
    start_date: document.getElementById('p-start').value||null,
    end_date: document.getElementById('p-end').value||null,
    budget: parseFloat(document.getElementById('p-budget').value)||null,
    progress: parseInt(document.getElementById('p-progress').value)||0,
    created_by: user.id
  };
  if (editingProjectId) {
    await sb.from('projects').update(payload).eq('id', editingProjectId);
    if (currentProject?.id === editingProjectId) {
      Object.assign(currentProject, payload);
      renderDetailHeader();
    }
  } else {
    const { error } = await sb.from('projects').insert(payload);
    if (error) { showToast('Error: '+error.message,'error'); return; }
  }
  showToast(t('toast_project_saved'),'success');
  closeModal('project-modal');
  await loadProjects();
  renderProjects();
}

async function deleteProject(id) {
  const [tasks, expenses, logs, ms] = await Promise.all([
    sb.from('tasks').select('id',{count:'exact',head:true}).eq('project_id',id).eq('is_active',true),
    sb.from('project_expenses').select('id',{count:'exact',head:true}).eq('project_id',id).eq('is_active',true),
    sb.from('time_logs').select('id',{count:'exact',head:true}).eq('project_id',id).eq('is_active',true),
    sb.from('milestones').select('id',{count:'exact',head:true}).eq('project_id',id).eq('is_active',true),
  ]);
  const total = (tasks.count||0)+(expenses.count||0)+(logs.count||0)+(ms.count||0);
  if (total > 0) { showToast((t('err_has_related')||'Silinemez: {0} ilişkili kayıt var (görev, harcama, zaman kaydı vb.)').replace('{0}',total),'error'); return; }
  if (!await showConfirm(t('confirm_delete_project'), t('lbl_delete')||'Delete')) return;
  const _now = new Date().toISOString();
  const { data: { user: _u } } = await sb.auth.getUser();
  await sb.from('projects').update({ is_active:false, deleted_at:_now, deleted_by:_u?.id }).eq('id', id);
  showToast(t('toast_project_deleted'),'success');
  if (currentProject?.id === id) closeDetail();
  await loadProjects();
  renderProjects();
}

// ===== HELPERS =====
function fmtCurr(n) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat(undefined, { minimumFractionDigits:0, maximumFractionDigits:2 }).format(n);
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

let toastTimer;
function showToast(msg, type='default') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type !== 'default' ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function showConfirm(msg, confirmLabel='Confirm') {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-box">
      <h3>${t('lbl_confirm')||'Confirm'}</h3><p>${msg}</p>
      <div class="confirm-actions">
        <button class="btn btn-outline" id="conf-no">${t('btn_cancel')||'Cancel'}</button>
        <button class="btn btn-danger" id="conf-yes">${confirmLabel}</button>
      </div></div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#conf-yes').onclick = () => { overlay.remove(); resolve(true); };
    overlay.querySelector('#conf-no').onclick  = () => { overlay.remove(); resolve(false); };
  });
}
