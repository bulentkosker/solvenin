<html lang="en">
<head>
<meta charset="UTF-8">

<title>Solvenin — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="i18n.js"></script>
<script src="feature-flags.js"></script>
<script src="modules-config.js"></script>
<script src="utils.js"></script>
<style>
:root{--primary:#1e40af;--primary-dark:#1a2744;--white:#fff;--bg:#f5f7fb;--gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;--gray300:#cbd5e1;--gray400:#94a3b8;--gray500:#64748b;--gray600:#475569;--gray800:#1a2744;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--font-display:'Outfit',sans-serif;--font-body:'DM Sans',sans-serif;--sidebar-w:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--gray800);min-height:100vh;display:flex}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--gray200);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:40}
.topbar-title{font-family:var(--font-display);font-size:16px;font-weight:700}
.content{padding:16px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1a3a9e}
.btn-outline{background:var(--white);border:1px solid var(--gray200);color:var(--gray600)}.btn-outline:hover{background:var(--gray50)}
.btn-sm{padding:5px 10px;font-size:11px}
.view-toggle{display:flex;border:1px solid var(--gray200);border-radius:8px;overflow:hidden}
.view-toggle button{padding:6px 14px;border:none;background:var(--white);font-size:11px;cursor:pointer;font-weight:500;color:var(--gray500)}
.view-toggle button.active{background:var(--primary);color:#fff}

/* KANBAN */
.kanban{display:flex;gap:10px;flex:1;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:200px;flex:1;background:var(--gray50);border-radius:10px;display:flex;flex-direction:column;max-height:calc(100vh - 160px)}
.kanban-col-header{padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.kanban-col-header .badge{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600}
.kanban-col-body{flex:1;overflow-y:auto;padding:4px 8px 8px;display:flex;flex-direction:column;gap:6px}
.kanban-col-footer{padding:6px 12px;font-size:10px;color:var(--gray400);text-align:center;border-top:1px solid var(--gray200);flex-shrink:0}

.opp-card{background:var(--white);border:1px solid var(--gray200);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.opp-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--gray300)}
.opp-card.today{border-left-color:var(--orange)}
.opp-card.overdue{border-left-color:var(--red)}
.opp-card.won{background:#f0fdf4;border-left-color:var(--green)}
.opp-card.lost{background:var(--gray50);border-left-color:var(--gray300);opacity:.7}
.opp-card-company{font-size:10px;color:var(--gray400);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.opp-card-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3}
.opp-card-value{font-size:12px;font-weight:700;color:var(--primary)}
.opp-card-meta{display:flex;gap:8px;font-size:10px;color:var(--gray400);margin-top:4px}
.opp-card-action{font-size:10px;color:var(--orange);margin-top:4px;font-weight:500}
.opp-card-action.overdue{color:var(--red)}

/* LIST VIEW */
.list-view{display:none}
.list-view table{width:100%;border-collapse:collapse;font-size:12px}
.list-view th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--gray400);text-transform:uppercase;border-bottom:1px solid var(--gray200);background:var(--gray50)}
.list-view td{padding:8px 12px;border-bottom:1px solid var(--gray100)}
.list-view tr:hover td{background:var(--gray50)}
.stage-badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;display:inline-block}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:-480px;width:480px;max-width:95vw;height:100vh;background:var(--white);z-index:201;transition:right .25s;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.drawer.open{right:0}
.drawer-header{padding:16px 20px;border-bottom:1px solid var(--gray200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px}
.drawer-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray200);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

.timeline{margin-top:16px}
.tl-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray100)}
.tl-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--gray100)}
.tl-content{flex:1;min-width:0}
.tl-meta{font-size:10px;color:var(--gray400);margin-bottom:2px}
.tl-desc{font-size:12px;line-height:1.4}
.tl-next{font-size:11px;color:var(--orange);margin-top:3px;font-weight:500}

.act-btns{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px}
.act-btn{padding:5px 10px;border:1px solid var(--gray200);border-radius:6px;font-size:11px;cursor:pointer;background:var(--white);transition:all .15s}
.act-btn:hover{border-color:var(--primary);color:var(--primary)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;padding:0;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.08)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--gray100)}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray200);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px 24px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:12px 24px 20px;border-top:1px solid var(--gray100)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field label{font-size:11px;font-weight:600;color:var(--gray500);display:block;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--gray200);border-radius:8px;font-size:13px;font-family:var(--font-body);outline:none}
.field.full{grid-column:1/-1}

#loading-screen{position:fixed;inset:0;background:#0a0f1e;display:flex;align-items:center;justify-content:center;z-index:9000;transition:opacity .3s}
.loading-logo{font-family:var(--font-display);font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px}
.loading-logo span{color:#38bdf8}
@media(max-width:768px){.sidebar{transform:translateX(-100%);transition:transform .25s}.sidebar.sb-open{transform:translateX(0)}.main{margin-left:0!important;width:100%!important}.topbar{padding-left:56px!important}.content{padding:10px!important}.kanban-col{min-width:160px;flex:none;width:160px}}
</style>
<script src="cache.js"></script>
<script src="sidebar.js"></script>
<link rel="stylesheet" href="theme.css">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KPXCV8FEZB"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-KPXCV8FEZB');</script>
</head>
<body>
<div id="loading-screen"><div class="loading-logo">solvenin<span>.</span></div></div>
<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-title">🎯 <span data-i18n="crm_title">CRM — Satış Pipeline</span></div>
    <div style="flex:1"></div>
    <div class="view-toggle">
      <button class="active" onclick="setView('kanban',this)" data-i18n="crm_view_kanban">Kanban</button>
      <button onclick="setView('list',this)" data-i18n="crm_view_list">Liste</button>
    </div>
    <button class="btn btn-primary" onclick="openOppModal()" data-i18n="crm_new_opportunity">+ Yeni Fırsat</button>
  </header>

  <div class="content">
    <div class="toolbar">
      <input type="text" id="crm-search" placeholder="🔍 Fırsat ara..." data-i18n-placeholder="crm_search_placeholder" oninput="renderAll()" style="padding:6px 12px;border:1px solid var(--gray200);border-radius:8px;font-size:12px;width:200px">
      <select id="crm-filter-assigned" onchange="renderAll()" style="padding:6px 10px;border:1px solid var(--gray200);border-radius:8px;font-size:12px"><option value="" data-i18n="crm_filter_all_reps">Tüm Temsilciler</option></select>
    </div>

    <!-- KANBAN -->
    <div class="kanban" id="kanban-view"></div>

    <!-- LIST -->
    <div class="list-view" id="list-view" style="overflow:auto;flex:1">
      <table>
        <thead><tr>
          <th data-i18n="crm_col_customer">MÜŞTERİ</th>
          <th data-i18n="crm_col_opportunity">FIRSAT</th>
          <th data-i18n="crm_col_stage">AŞAMA</th>
          <th data-i18n="crm_col_amount">TAHMİNİ TUTAR</th>
          <th data-i18n="crm_col_probability">OLASILIK</th>
          <th data-i18n="crm_col_assigned">TEMSİLCİ</th>
          <th data-i18n="crm_col_close">KAPANIŞ</th>
          <th data-i18n="crm_col_last_activity">SON AKTİVİTE</th>
        </tr></thead>
        <tbody id="list-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div id="dr-company" style="font-size:11px;color:var(--gray400);font-weight:600;text-transform:uppercase"></div>
      <div id="dr-title" style="font-size:16px;font-weight:700;margin-top:2px"></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <select id="dr-stage" onchange="updateStage()" style="padding:4px 8px;border:1px solid var(--gray200);border-radius:6px;font-size:11px;font-weight:600"></select>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
  </div>
  <div class="drawer-body">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div><div style="font-size:10px;color:var(--gray400)" data-i18n="crm_dr_amount">TAHMİNİ TUTAR</div><div id="dr-value" style="font-size:18px;font-weight:800;color:var(--primary)"></div></div>
      <div><div style="font-size:10px;color:var(--gray400)" data-i18n="crm_dr_probability">OLASILIK</div><div id="dr-prob" style="font-size:18px;font-weight:800"></div></div>
      <div><div style="font-size:10px;color:var(--gray400)" data-i18n="crm_dr_assigned">TEMSİLCİ</div><div id="dr-assigned" style="font-size:12px;font-weight:500"></div></div>
      <div><div style="font-size:10px;color:var(--gray400)" data-i18n="crm_dr_close_date">KAPANIŞ</div><div id="dr-close" style="font-size:12px;font-weight:500"></div></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="btn btn-outline btn-sm" onclick="editOpp()" data-i18n="crm_btn_edit">✏️ Düzenle</button>
    </div>

    <!-- Drawer Tabs -->
    <div style="display:flex;border-bottom:2px solid var(--gray200);margin-bottom:12px">
      <button class="dr-tab active" onclick="switchDrawerTab('quotes',this)" style="padding:8px 14px;border:none;background:none;font-size:12px;font-weight:600;cursor:pointer;color:var(--primary);border-bottom:2px solid var(--primary);margin-bottom:-2px" data-i18n="crm_tab_quotes">📄 Teklifler</button>
      <button class="dr-tab" onclick="switchDrawerTab('activities',this)" style="padding:8px 14px;border:none;background:none;font-size:12px;font-weight:500;cursor:pointer;color:var(--gray500);border-bottom:2px solid transparent;margin-bottom:-2px" data-i18n="crm_tab_activities">⚡ Aktiviteler</button>
    </div>

    <!-- TAB: Teklifler -->
    <div id="dr-tab-quotes">
      <button class="btn btn-primary btn-sm" onclick="openQuoteModal()" style="margin-bottom:10px" data-i18n="crm_btn_new_quote">+ Yeni Teklif</button>
      <div id="dr-quotes-list" style="font-size:12px"></div>
    </div>

    <!-- TAB: Aktiviteler -->
    <div id="dr-tab-activities" style="display:none">
      <div class="act-btns">
        <button class="act-btn" onclick="addActivity('call')" data-i18n="crm_act_call">📞 Arama</button>
        <button class="act-btn" onclick="addActivity('email')" data-i18n="crm_act_email">📧 Email</button>
        <button class="act-btn" onclick="addActivity('meeting')" data-i18n="crm_act_meeting">🤝 Toplantı</button>
        <button class="act-btn" onclick="addActivity('whatsapp')" data-i18n="crm_act_whatsapp">💬 WhatsApp</button>
        <button class="act-btn" onclick="addActivity('note')" data-i18n="crm_act_note">📝 Not</button>
      </div>
      <div id="act-form" style="display:none;margin-top:10px;padding:10px;background:var(--gray50);border-radius:8px">
        <input type="hidden" id="act-type">
        <textarea id="act-desc" placeholder="Açıklama..." data-i18n-placeholder="crm_act_desc_placeholder" rows="2" style="width:100%;padding:6px 8px;border:1px solid var(--gray200);border-radius:6px;font-size:12px;font-family:inherit;margin-bottom:6px"></textarea>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="text" id="act-next" placeholder="Sonraki adım..." data-i18n-placeholder="crm_act_next_placeholder" style="flex:1;padding:5px 8px;border:1px solid var(--gray200);border-radius:6px;font-size:11px">
          <input type="date" id="act-next-date" style="padding:5px 8px;border:1px solid var(--gray200);border-radius:6px;font-size:11px">
          <button class="btn btn-primary btn-sm" onclick="saveActivity()" data-action="save" data-i18n="crm_btn_save">Kaydet</button>
        </div>
      </div>
      <div class="timeline" id="dr-timeline"></div>
    </div>
  </div>
</div>

<!-- OPP MODAL -->
<div class="modal-overlay" id="opp-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="opp-modal-title" data-i18n="crm_modal_new_opp">Yeni Fırsat</span>
      <button class="modal-close" onclick="closeModal('opp-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full"><label data-i18n="crm_lbl_customer_req">Müşteri *</label><select id="opp-contact"><option value="" data-i18n="crm_select_prompt">Seç...</option></select></div>
        <div class="field full"><label data-i18n="crm_lbl_title_req">Fırsat Başlığı *</label><input type="text" id="opp-title" placeholder="Örn: Mercimek ihracatı" data-i18n-placeholder="crm_placeholder_title"></div>
        <div class="field"><label data-i18n="crm_lbl_value">Tahmini Tutar</label><input type="number" id="opp-value" placeholder="0" min="0" step="0.01"></div>
        <div class="field"><label data-i18n="crm_lbl_probability">Olasılık %</label><input type="number" id="opp-prob" value="10" min="0" max="100"></div>
        <div class="field"><label data-i18n="crm_lbl_close_date">Beklenen Kapanış</label><input type="date" id="opp-close"></div>
        <div class="field"><label data-i18n="crm_lbl_stage">Aşama</label>
          <select id="opp-stage">
            <option value="lead" data-i18n="crm_stage_lead">Lead</option>
            <option value="contacted" data-i18n="crm_stage_contacted">İletişimde</option>
            <option value="proposal" data-i18n="crm_stage_proposal">Teklif Verildi</option>
            <option value="negotiation" data-i18n="crm_stage_negotiation">Müzakerede</option>
            <option value="won" data-i18n="crm_stage_won">Kazanıldı</option>
            <option value="lost" data-i18n="crm_stage_lost">Kaybedildi</option>
            <option value="postponed" data-i18n="crm_stage_postponed">Ertelendi</option>
          </select>
        </div>
        <div class="field full"><label data-i18n="crm_lbl_notes">Notlar</label><textarea id="opp-notes" rows="2"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('opp-modal')" data-i18n="crm_btn_cancel">İptal</button>
      <button class="btn btn-primary" onclick="saveOpp()" data-action="save" data-i18n="crm_btn_save">Kaydet</button>
    </div>
  </div>
</div>

<!-- QUOTE MODAL -->
<div class="modal-overlay" id="quote-modal">
  <div class="modal" style="max-width:720px">
    <div class="modal-head">
      <span class="modal-title" data-i18n="crm_modal_new_quote">Yeni Teklif</span>
      <button class="modal-close" onclick="closeModal('quote-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label data-i18n="crm_lbl_customer">Müşteri</label><select id="q-contact"></select></div>
        <div class="field"><label data-i18n="crm_lbl_quote_no">Teklif No</label><input type="text" id="q-number" readonly style="background:var(--gray50)"></div>
        <div class="field"><label data-i18n="crm_lbl_valid_until">Geçerlilik Tarihi</label><input type="date" id="q-valid"></div>
        <div class="field"><label data-i18n="crm_lbl_currency">Para Birimi</label>
          <select id="q-currency"><option value="KZT">KZT</option><option value="USD">USD</option><option value="EUR">EUR</option><option value="RUB">RUB</option><option value="TRY">TRY</option></select>
        </div>
      </div>
      <div style="margin-top:12px;font-size:11px;font-weight:700;color:var(--gray500);text-transform:uppercase;margin-bottom:6px" data-i18n="crm_lbl_items">Kalemler</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px">
        <thead><tr style="background:var(--gray50)">
          <th style="padding:6px 8px;text-align:left;font-size:10px;border:none" data-i18n="crm_col_product">ÜRÜN</th>
          <th style="padding:6px 8px;text-align:right;font-size:10px;border:none;width:70px" data-i18n="crm_col_qty">MİKTAR</th>
          <th style="padding:6px 8px;text-align:right;font-size:10px;border:none;width:90px" data-i18n="crm_col_unit_price">BİRİM FİYAT</th>
          <th style="padding:6px 8px;text-align:right;font-size:10px;border:none;width:90px" data-i18n="crm_col_total">TOPLAM</th>
          <th style="width:30px;border:none"></th>
        </tr></thead>
        <tbody id="q-items-body"></tbody>
      </table>
      <button onclick="addQuoteItem()" style="background:none;border:none;color:var(--primary);font-size:12px;cursor:pointer;font-weight:500;margin-bottom:10px" data-i18n="crm_btn_add_item">+ Kalem Ekle</button>
      <div class="form-grid" style="margin-top:8px">
        <div class="field full"><label data-i18n="crm_lbl_terms">Ödeme Koşulları</label><input type="text" id="q-terms" placeholder="30 gün vadeli" data-i18n-placeholder="crm_terms_placeholder"></div>
        <div class="field full"><label data-i18n="crm_lbl_notes">Notlar</label><textarea id="q-notes" rows="2"></textarea></div>
      </div>
      <div style="text-align:right;margin-top:10px;font-size:14px;font-weight:800;color:var(--primary)" id="q-total-display">—</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('quote-modal')" data-i18n="crm_btn_cancel">İptal</button>
      <button class="btn btn-primary" onclick="saveQuote()" data-action="save" data-i18n="crm_btn_save">Kaydet</button>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://jaakjdzpdizjbzvbtcld.supabase.co','sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9');
window._supabase = sb;

let companyId = null, currentUser = null;
let opps = [], contacts = [], activities = {};
let currentView = 'kanban', selectedOppId = null, editingOppId = null;

// Stages — labels resolved at render time via t() so they follow the active language
const STAGES = [
  {key:'lead',i18n:'crm_stage_lead',color:'#3b82f6',bg:'#eff6ff'},
  {key:'contacted',i18n:'crm_stage_contacted',color:'#8b5cf6',bg:'#f5f3ff'},
  {key:'proposal',i18n:'crm_stage_proposal',color:'#f59e0b',bg:'#fffbeb'},
  {key:'negotiation',i18n:'crm_stage_negotiation',color:'#f97316',bg:'#fff7ed'},
  {key:'won',i18n:'crm_stage_won',color:'#22c55e',bg:'#f0fdf4'},
  {key:'lost',i18n:'crm_stage_lost',color:'#6b7280',bg:'#f9fafb'},
  {key:'postponed',i18n:'crm_stage_postponed',color:'#94a3b8',bg:'#f8fafc'}
];
function stageLabel(key) {
  const s = STAGES.find(x => x.key === key);
  return s ? t(s.i18n) : key;
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'auth.html'; return; }
  currentUser = session.user;
  const { data: companies } = await sb.rpc('get_my_companies');
  if (!companies?.length) return;
  const saved = localStorage.getItem('currentCompanyId');
  const active = saved ? (companies.find(c => c.company_id === saved) || companies[0]) : companies[0];
  companyId = active.company_id;

  await Promise.all([loadOpps(), loadContacts()]);

  const savedLang = localStorage.getItem('solvenin_lang') || 'en';
  if (typeof setLang === 'function') setLang(savedLang);

  const ls = document.getElementById('loading-screen');
  if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 300); }
}

async function loadOpps() {
  const { data } = await sb.from('crm_opportunities').select('*, contacts(name)').eq('company_id', companyId).order('created_at', { ascending: false });
  opps = data || [];
  // Load last activity for each
  const ids = opps.map(o => o.id);
  if (ids.length) {
    const { data: acts } = await sb.from('crm_activities').select('opportunity_id,type,description,next_action,next_action_date,created_at').eq('company_id', companyId).order('created_at', { ascending: false });
    activities = {};
    (acts || []).forEach(a => { if (!activities[a.opportunity_id]) activities[a.opportunity_id] = a; });
  }
  renderAll();
}

async function loadContacts() {
  const { data } = await sb.from('contacts').select('id,name').eq('company_id', companyId).eq('is_active', true).order('name');
  contacts = data || [];
  const sel = document.getElementById('opp-contact');
  sel.innerHTML = `<option value="">${t('crm_select_prompt')}</option>` + contacts.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function F(n) { return fmt(n); }
function relTime(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (diff === 0) return t('crm_today');
  if (diff === 1) return t('crm_yesterday');
  if (diff < 0) return (t('crm_days_later') || '{n} days later').replace('{n}', Math.abs(diff));
  return (t('crm_days_ago') || '{n} days ago').replace('{n}', diff);
}

function renderAll() {
  const q = (document.getElementById('crm-search')?.value || '').toLowerCase();
  const assignFilter = document.getElementById('crm-filter-assigned')?.value || '';
  const filtered = opps.filter(o => {
    if (q && !o.title.toLowerCase().includes(q) && !(o.contacts?.name||'').toLowerCase().includes(q)) return false;
    if (assignFilter && o.assigned_to !== assignFilter) return false;
    return true;
  });
  renderKanban(filtered);
  renderList(filtered);
}

function renderKanban(list) {
  const kanban = document.getElementById('kanban-view');
  const today = new Date().toISOString().split('T')[0];
  kanban.innerHTML = STAGES.map(s => {
    const items = list.filter(o => o.stage === s.key);
    const totalVal = items.reduce((sum, o) => sum + parseFloat(o.value || 0), 0);
    return `<div class="kanban-col">
      <div class="kanban-col-header" style="color:${s.color}">
        <span>${t(s.i18n)}</span>
        <span class="badge" style="background:${s.bg};color:${s.color}">${items.length}</span>
      </div>
      <div class="kanban-col-body" ondragover="event.preventDefault()" ondrop="dropCard(event,'${s.key}')">
        ${items.map(o => {
          const act = activities[o.id];
          const nextDate = act?.next_action_date;
          let cardClass = '';
          if (s.key === 'won') cardClass = 'won';
          else if (s.key === 'lost') cardClass = 'lost';
          else if (nextDate && nextDate < today) cardClass = 'overdue';
          else if (nextDate && nextDate === today) cardClass = 'today';
          return `<div class="opp-card ${cardClass}" draggable="true" ondragstart="dragCard(event,'${o.id}')" onclick="openDrawer('${o.id}')">
            <div class="opp-card-company">${o.contacts?.name || '—'}</div>
            <div class="opp-card-title">${o.title}</div>
            <div class="opp-card-value">${F(o.value)} <span style="font-size:10px;font-weight:400;color:var(--gray400)">${o.probability}%</span></div>
            <div class="opp-card-meta">
              ${o.expected_close_date ? '📅 ' + o.expected_close_date.substring(5) : ''}
            </div>
            ${act?.next_action ? `<div class="opp-card-action ${nextDate && nextDate < today ? 'overdue' : ''}">⚡ ${act.next_action} ${nextDate ? '(' + relTime(nextDate) + ')' : ''}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
      <div class="kanban-col-footer">${totalVal > 0 ? F(totalVal) : '—'}</div>
    </div>`;
  }).join('');
}

function renderList(list) {
  const tbody = document.getElementById('list-tbody');
  const stageMap = {}; STAGES.forEach(s => stageMap[s.key] = s);
  tbody.innerHTML = list.map(o => {
    const s = stageMap[o.stage] || {};
    const act = activities[o.id];
    return `<tr onclick="openDrawer('${o.id}')" style="cursor:pointer">
      <td><strong>${o.contacts?.name || '—'}</strong></td>
      <td>${o.title}</td>
      <td><span class="stage-badge" style="background:${s.bg};color:${s.color}">${t(s.i18n)}</span></td>
      <td class="text-right" style="font-weight:600">${F(o.value)}</td>
      <td class="text-right">${o.probability}%</td>
      <td style="color:var(--gray500)">—</td>
      <td style="color:var(--gray500)">${o.expected_close_date || '—'}</td>
      <td style="color:var(--gray400);font-size:11px">${act ? relTime(act.created_at) : '—'}</td>
    </tr>`;
  }).join('');
}

// VIEW
function setView(v, btn) {
  currentView = v;
  document.getElementById('kanban-view').style.display = v === 'kanban' ? 'flex' : 'none';
  document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// DRAG & DROP
let draggedOppId = null;
function dragCard(e, id) { draggedOppId = id; e.dataTransfer.effectAllowed = 'move'; }
async function dropCard(e, stage) {
  e.preventDefault();
  if (!draggedOppId) return;
  await sb.from('crm_opportunities').update({ stage, updated_at: new Date().toISOString() }).eq('id', draggedOppId);
  const opp = opps.find(o => o.id === draggedOppId);
  if (opp) opp.stage = stage;
  draggedOppId = null;
  renderAll();
}

// MODAL
function openModal(id) { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

function openOppModal() {
  editingOppId = null;
  document.getElementById('opp-modal-title').textContent = t('crm_modal_new_opp');
  document.getElementById('opp-contact').value = '';
  document.getElementById('opp-title').value = '';
  document.getElementById('opp-value').value = '';
  document.getElementById('opp-prob').value = '10';
  document.getElementById('opp-close').value = '';
  document.getElementById('opp-stage').value = 'lead';
  document.getElementById('opp-notes').value = '';
  openModal('opp-modal');
}

function editOpp() {
  const o = opps.find(x => x.id === selectedOppId);
  if (!o) return;
  editingOppId = o.id;
  document.getElementById('opp-modal-title').textContent = t('crm_modal_edit_opp');
  document.getElementById('opp-contact').value = o.contact_id || '';
  document.getElementById('opp-title').value = o.title;
  document.getElementById('opp-value').value = o.value || '';
  document.getElementById('opp-prob').value = o.probability || 0;
  document.getElementById('opp-close').value = o.expected_close_date || '';
  document.getElementById('opp-stage').value = o.stage;
  document.getElementById('opp-notes').value = o.notes || '';
  openModal('opp-modal');
}

async function saveOpp() {
  if (submitting()) return;
  try {
  const title = document.getElementById('opp-title').value.trim();
  const contactId = document.getElementById('opp-contact').value;
  if (!title) { showToast(t('crm_toast_title_required'), 'error'); return; }
  const payload = {
    company_id: companyId,
    contact_id: contactId || null,
    title,
    value: parseFloat(document.getElementById('opp-value').value) || 0,
    probability: parseInt(document.getElementById('opp-prob').value) || 0,
    expected_close_date: document.getElementById('opp-close').value || null,
    stage: document.getElementById('opp-stage').value,
    notes: document.getElementById('opp-notes').value.trim() || null,
    updated_at: new Date().toISOString()
  };
  if (editingOppId) {
    await sb.from('crm_opportunities').update(payload).eq('id', editingOppId);
  } else {
    payload.created_by = currentUser.id;
    payload.assigned_to = currentUser.id;
    await sb.from('crm_opportunities').insert(payload);
  }
  closeModal('opp-modal');
  await loadOpps();
  showToast(t('crm_toast_opp_saved'), 'success');
  } catch(_e) { console.error(_e); showToast(getErrorMessage(_e),'error'); } finally { submitting.reset(); }
}

// DRAWER
function openDrawer(id) {
  selectedOppId = id;
  const o = opps.find(x => x.id === id);
  if (!o) return;
  document.getElementById('dr-company').textContent = o.contacts?.name || '—';
  document.getElementById('dr-title').textContent = o.title;
  document.getElementById('dr-value').textContent = F(o.value);
  document.getElementById('dr-prob').textContent = o.probability + '%';
  document.getElementById('dr-assigned').textContent = '—';
  document.getElementById('dr-close').textContent = o.expected_close_date || '—';
  // Stage dropdown
  const stageSel = document.getElementById('dr-stage');
  stageSel.innerHTML = STAGES.map(s => `<option value="${s.key}" ${s.key===o.stage?'selected':''}>${t(s.i18n)}</option>`).join('');
  document.getElementById('act-form').style.display = 'none';
  // Reset to quotes tab
  document.getElementById('dr-tab-quotes').style.display = '';
  document.getElementById('dr-tab-activities').style.display = 'none';
  document.querySelectorAll('.dr-tab').forEach((b,i) => { b.style.color = i===0?'var(--primary)':'var(--gray500)'; b.style.fontWeight = i===0?'600':'500'; b.style.borderBottomColor = i===0?'var(--primary)':'transparent'; });
  loadQuotes(id);
  loadTimeline(id);
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  selectedOppId = null;
}

async function updateStage() {
  const stage = document.getElementById('dr-stage').value;
  await sb.from('crm_opportunities').update({ stage, updated_at: new Date().toISOString() }).eq('id', selectedOppId);
  const opp = opps.find(o => o.id === selectedOppId);
  if (opp) opp.stage = stage;
  renderAll();
}

async function loadTimeline(oppId) {
  const { data } = await sb.from('crm_activities').select('*').eq('opportunity_id', oppId).order('created_at', { ascending: false });
  const icons = { call:'📞', email:'📧', meeting:'🤝', whatsapp:'💬', note:'📝' };
  const tl = document.getElementById('dr-timeline');
  if (!data?.length) { tl.innerHTML = `<div style="color:var(--gray400);font-size:12px;padding:10px 0">${t('crm_no_activities')}</div>`; return; }
  tl.innerHTML = data.map(a => `<div class="tl-item">
    <div class="tl-icon">${icons[a.type]||'📝'}</div>
    <div class="tl-content">
      <div class="tl-meta">${relTime(a.created_at)}</div>
      <div class="tl-desc">${a.description || '—'}</div>
      ${a.next_action ? `<div class="tl-next">⚡ ${a.next_action} ${a.next_action_date ? '→ ' + a.next_action_date : ''}</div>` : ''}
    </div>
  </div>`).join('');
}

// ACTIVITY
function addActivity(type) {
  document.getElementById('act-type').value = type;
  document.getElementById('act-desc').value = '';
  document.getElementById('act-next').value = '';
  document.getElementById('act-next-date').value = '';
  document.getElementById('act-form').style.display = '';
  document.getElementById('act-desc').focus();
}

async function saveActivity() {
  if (submitting()) return;
  try {
  const type = document.getElementById('act-type').value;
  const desc = document.getElementById('act-desc').value.trim();
  if (!desc) { showToast(t('crm_toast_desc_required'), 'error'); return; }
  const nextAction = document.getElementById('act-next').value.trim() || null;
  const nextDate = document.getElementById('act-next-date').value || null;
  await sb.from('crm_activities').insert({
    company_id: companyId, opportunity_id: selectedOppId,
    type, description: desc, next_action: nextAction,
    next_action_date: nextDate, created_by: currentUser.id
  });
  // Auto-reminder
  if (nextDate) {
    await sb.from('crm_reminders').insert({
      company_id: companyId, opportunity_id: selectedOppId,
      user_id: currentUser.id, reminder_date: nextDate,
      message: nextAction || desc
    });
  }
  document.getElementById('act-form').style.display = 'none';
  await loadOpps();
  loadTimeline(selectedOppId);
  showToast(t('crm_toast_act_saved'), 'success');
  } catch(_e) { console.error(_e); showToast(getErrorMessage(_e),'error'); } finally { submitting.reset(); }
}

// ===== DRAWER TABS =====
function switchDrawerTab(tab, btn) {
  document.getElementById('dr-tab-quotes').style.display = tab === 'quotes' ? '' : 'none';
  document.getElementById('dr-tab-activities').style.display = tab === 'activities' ? '' : 'none';
  document.querySelectorAll('.dr-tab').forEach(b => { b.style.color = 'var(--gray500)'; b.style.fontWeight = '500'; b.style.borderBottomColor = 'transparent'; });
  btn.style.color = 'var(--primary)'; btn.style.fontWeight = '600'; btn.style.borderBottomColor = 'var(--primary)';
}

// ===== QUOTE SYSTEM =====
let quoteItems = [], products = [];

async function loadProducts() {
  if (products.length) return;
  const { data } = await sb.from('products').select('id,name,sale_price,unit').eq('company_id', companyId).eq('is_active', true).order('name');
  products = data || [];
}

async function openQuoteModal() {
  await loadProducts();
  const o = opps.find(x => x.id === selectedOppId);
  // Contact dropdown
  const sel = document.getElementById('q-contact');
  sel.innerHTML = contacts.map(c => `<option value="${c.id}" ${c.id === o?.contact_id ? 'selected' : ''}>${c.name}</option>`).join('');
  // Quote number
  const { data: existing } = await sb.from('crm_quotes').select('quote_number').eq('company_id', companyId).order('created_at', { ascending: false }).limit(1);
  const lastNum = existing?.[0]?.quote_number ? parseInt(existing[0].quote_number.replace(/\D/g, '')) || 0 : 0;
  document.getElementById('q-number').value = 'QUO-' + String(lastNum + 1).padStart(4, '0');
  // Valid until: 30 days
  const valid = new Date(); valid.setDate(valid.getDate() + 30);
  document.getElementById('q-valid').value = valid.toISOString().split('T')[0];
  document.getElementById('q-terms').value = '';
  document.getElementById('q-notes').value = '';
  quoteItems = [{ product_id: '', description: '', qty: 1, price: 0, unit: '' }];
  renderQuoteItems();
  openModal('quote-modal');
}

function renderQuoteItems() {
  const tbody = document.getElementById('q-items-body');
  const inputS = 'padding:4px 6px;border:1px solid var(--gray200);border-radius:4px;font-size:12px;width:100%;box-sizing:border-box;';
  tbody.innerHTML = quoteItems.map((it, i) => `<tr>
    <td style="padding:4px"><select onchange="onQuoteProductSelect(${i},this.value)" style="${inputS}">
      <option value="">${t('crm_select_prompt')}</option>${products.map(p => `<option value="${p.id}" ${p.id === it.product_id ? 'selected' : ''}>${p.name}</option>`).join('')}
    </select></td>
    <td style="padding:4px"><input type="number" value="${it.qty || 1}" min="0.001" step="0.001" onchange="quoteItems[${i}].qty=parseFloat(this.value)||0;recalcQuote()" style="${inputS}text-align:right"></td>
    <td style="padding:4px"><input type="number" value="${it.price || 0}" min="0" step="0.01" onchange="quoteItems[${i}].price=parseFloat(this.value)||0;recalcQuote()" style="${inputS}text-align:right"></td>
    <td style="padding:4px;text-align:right;font-weight:600" id="qi-total-${i}">${F(it.qty * it.price)}</td>
    <td style="padding:4px;text-align:center"><button onclick="quoteItems.splice(${i},1);renderQuoteItems()" style="background:none;border:none;color:var(--red);cursor:pointer">✕</button></td>
  </tr>`).join('');
  recalcQuote();
}

function onQuoteProductSelect(idx, pid) {
  const p = products.find(x => x.id === pid);
  quoteItems[idx].product_id = pid;
  quoteItems[idx].description = p?.name || '';
  quoteItems[idx].price = parseFloat(p?.sale_price) || 0;
  quoteItems[idx].unit = p?.unit || '';
  renderQuoteItems();
}

function addQuoteItem() {
  quoteItems.push({ product_id: '', description: '', qty: 1, price: 0, unit: '' });
  renderQuoteItems();
}

function recalcQuote() {
  let total = 0;
  quoteItems.forEach((it, i) => {
    const lt = (it.qty || 0) * (it.price || 0);
    total += lt;
    const el = document.getElementById('qi-total-' + i);
    if (el) el.textContent = F(lt);
  });
  document.getElementById('q-total-display').textContent = t('crm_total_label') + ': ' + F(total);
}

async function saveQuote() {
  if (submitting()) return;
  try {
  const contactId = document.getElementById('q-contact').value;
  if (!contactId) { showToast(t('crm_toast_customer_required'), 'error'); return; }
  const validItems = quoteItems.filter(it => it.qty > 0 && (it.product_id || it.description));
  if (!validItems.length) { showToast(t('crm_toast_add_item'), 'error'); return; }
  const subtotal = validItems.reduce((s, it) => s + it.qty * it.price, 0);
  const { error, data: quote } = await sb.from('crm_quotes').insert({
    company_id: companyId, opportunity_id: selectedOppId, contact_id: contactId,
    quote_number: document.getElementById('q-number').value,
    status: 'draft', valid_until: document.getElementById('q-valid').value || null,
    currency_code: document.getElementById('q-currency').value || null,
    subtotal, total: subtotal,
    terms: document.getElementById('q-terms').value.trim() || null,
    notes: document.getElementById('q-notes').value.trim() || null,
    created_by: currentUser.id
  }).select().single();
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  // Save items
  const items = validItems.map(it => ({
    quote_id: quote.id, product_id: it.product_id || null,
    description: it.description || products.find(p => p.id === it.product_id)?.name || '',
    quantity: it.qty, unit: it.unit, unit_price: it.price,
    total: it.qty * it.price
  }));
  await sb.from('crm_quote_items').insert(items);
  closeModal('quote-modal');
  loadQuotes(selectedOppId);
  showToast(t('crm_toast_quote_saved') + ': ' + quote.quote_number, 'success');
  } catch(_e) { console.error(_e); showToast(getErrorMessage(_e),'error'); } finally { submitting.reset(); }
}

async function loadQuotes(oppId) {
  const { data } = await sb.from('crm_quotes').select('*').eq('opportunity_id', oppId).order('created_at', { ascending: false });
  const list = document.getElementById('dr-quotes-list');
  const statusColors = { draft:'var(--gray500)', sent:'var(--primary)', accepted:'var(--green)', rejected:'var(--red)', expired:'var(--orange)' };
  const statusLabels = { draft:t('crm_qstat_draft'), sent:t('crm_qstat_sent'), accepted:t('crm_qstat_accepted'), rejected:t('crm_qstat_rejected'), expired:t('crm_qstat_expired') };
  if (!data?.length) { list.innerHTML = `<div style="color:var(--gray400);font-size:12px;padding:8px 0">${t('crm_no_quotes')}</div>`; return; }
  list.innerHTML = data.map(q => `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray100)">
    <div>
      <div style="font-weight:600">${q.quote_number}</div>
      <div style="font-size:11px;color:var(--gray400)">${q.created_at ? new Date(q.created_at).toLocaleDateString() : ''} · ${F(q.total)}</div>
    </div>
    <div style="display:flex;gap:4px;align-items:center">
      <span style="font-size:10px;font-weight:600;color:${statusColors[q.status]||'var(--gray500)'}">${statusLabels[q.status]||q.status}</span>
      <button class="btn btn-outline btn-sm" onclick="viewQuotePDF('${q.id}')" title="PDF">📄</button>
      ${q.status === 'accepted' && !q.converted_to_order_id ? `<button class="btn btn-primary btn-sm" onclick="convertQuoteToOrder('${q.id}')">🛒</button>` : ''}
      ${q.status === 'draft' ? `<select onchange="updateQuoteStatus('${q.id}',this.value);this.value=''" style="padding:2px 6px;border:1px solid var(--gray200);border-radius:4px;font-size:10px">
        <option value="">${t('crm_qstat_change')}</option><option value="sent">${t('crm_qstat_sent')}</option><option value="accepted">${t('crm_qstat_accepted')}</option><option value="rejected">${t('crm_qstat_rejected')}</option>
      </select>` : ''}
      ${q.status === 'sent' ? `<select onchange="updateQuoteStatus('${q.id}',this.value);this.value=''" style="padding:2px 6px;border:1px solid var(--gray200);border-radius:4px;font-size:10px">
        <option value="">${t('crm_qstat_change')}</option><option value="accepted">${t('crm_qstat_accepted')}</option><option value="rejected">${t('crm_qstat_rejected')}</option>
      </select>` : ''}
    </div>
  </div>`).join('');
}

async function updateQuoteStatus(quoteId, status) {
  if (!status) return;
  await sb.from('crm_quotes').update({ status }).eq('id', quoteId);
  loadQuotes(selectedOppId);
  showToast(t('crm_toast_quote_status_updated'), 'success');
}

async function convertQuoteToOrder(quoteId) {
  const { data: quote } = await sb.from('crm_quotes').select('*').eq('id', quoteId).single();
  if (!quote) return;
  const { data: items } = await sb.from('crm_quote_items').select('*').eq('quote_id', quoteId);
  // Get next order number
  const { data: lastOrder } = await sb.from('sales_orders').select('order_number').eq('company_id', companyId).order('created_at', { ascending: false }).limit(1);
  const lastNum = lastOrder?.[0]?.order_number ? parseInt(lastOrder[0].order_number.replace(/\D/g, '')) || 0 : 0;
  const orderNumber = 'INV-' + String(lastNum + 1).padStart(4, '0');
  // Create order
  const { data: order, error } = await sb.from('sales_orders').insert({
    company_id: companyId, customer_id: quote.contact_id, order_number: orderNumber,
    order_type: 'sale', status: 'confirmed',
    issue_date: new Date().toISOString().split('T')[0],
    subtotal: quote.subtotal, tax_amount: quote.tax_amount || 0,
    discount: quote.discount || 0, total: quote.total,
    currency_code: quote.currency_code, exchange_rate: quote.exchange_rate,
    opportunity_id: quote.opportunity_id,
    notes: quote.notes, created_by: currentUser.id
  }).select().single();
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  // Copy items
  if (items?.length) {
    await sb.from('sales_order_items').insert(items.map(it => ({
      order_id: order.id, product_id: it.product_id,
      description: it.description, quantity: it.quantity,
      unit_price: it.unit_price, discount: it.discount_percent || 0,
      total: it.total, tax_rate_value: it.tax_rate || 0
    })));
  }
  // Update quote + opportunity
  await sb.from('crm_quotes').update({ converted_to_order_id: order.id, status: 'accepted' }).eq('id', quoteId);
  await sb.from('crm_opportunities').update({ stage: 'won', updated_at: new Date().toISOString() }).eq('id', quote.opportunity_id);
  const opp = opps.find(o => o.id === quote.opportunity_id);
  if (opp) opp.stage = 'won';
  renderAll();
  loadQuotes(selectedOppId);
  showToast(t('crm_toast_quote_converted') + ': ' + orderNumber, 'success');
}

async function viewQuotePDF(quoteId) {
  const { data: q } = await sb.from('crm_quotes').select('*, contacts(name,address,tax_number,email,phone)').eq('id', quoteId).single();
  const { data: items } = await sb.from('crm_quote_items').select('*, products(name,unit)').eq('quote_id', quoteId);
  if (!q) return;
  const w = window.open('', '_blank');
  const rows = (items||[]).map((it,i) => `<tr><td>${i+1}</td><td>${it.products?.name||it.description||'—'}</td><td style="text-align:right">${it.quantity} ${it.products?.unit||it.unit||''}</td><td style="text-align:right">${F(it.unit_price)}</td><td style="text-align:right;font-weight:700">${F(it.total)}</td></tr>`).join('');
  const L = {
    stamp: t('crm_pdf_quote_stamp'),
    date: t('crm_pdf_date'),
    validity: t('crm_pdf_validity'),
    currency: t('crm_pdf_currency'),
    taxno: t('crm_pdf_taxno'),
    product: t('crm_col_product'),
    qty: t('crm_col_qty'),
    unitPrice: t('crm_col_unit_price'),
    total: t('crm_col_total'),
    subtotal: t('crm_pdf_subtotal'),
    tax: t('crm_pdf_tax'),
    discount: t('crm_pdf_discount'),
    grand: t('crm_total_label'),
    terms: t('crm_pdf_terms_label'),
    validMsg: q.valid_until ? (t('crm_pdf_valid_msg')||'').replace('{date}', `<strong>${q.valid_until}</strong>`) : '',
    signature: t('crm_pdf_signature'),
  };
  w.document.write(`<!DOCTYPE html><html><head><title>${L.stamp} ${q.quote_number}</title>
  <style>body{font-family:Arial,sans-serif;padding:30px;color:#333;max-width:800px;margin:0 auto}
  .header{display:flex;justify-content:space-between;margin-bottom:30px}
  .stamp{background:#166534;color:#fff;padding:8px 24px;border-radius:6px;font-size:22px;font-weight:800;letter-spacing:2px;display:inline-block}
  .info{font-size:12px;color:#666;line-height:1.6}
  .info strong{color:#333}
  table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13px}
  th{background:#f3f4f6;padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;border-bottom:2px solid #ddd}
  td{padding:8px 10px;border-bottom:1px solid #eee}
  .totals{float:right;width:250px;font-size:13px}
  .totals div{display:flex;justify-content:space-between;padding:4px 0}
  .totals .grand{border-top:2px solid #166534;margin-top:4px;padding-top:6px;font-size:16px;font-weight:800;color:#166534}
  .footer{margin-top:40px;padding-top:20px;border-top:1px solid #ddd;font-size:11px;color:#888}
  .sig-box{border:1px dashed #ccc;width:200px;height:80px;margin-top:30px;display:flex;align-items:flex-end;justify-content:center;padding:8px;font-size:11px;color:#999}
  @media print{body{padding:0}}</style></head><body>
  <div class="header">
    <div><div class="stamp">${L.stamp}</div><div style="margin-top:8px;font-size:12px;color:#666">${q.quote_number}</div></div>
    <div class="info" style="text-align:right">
      <strong>${L.date}:</strong> ${new Date(q.created_at).toLocaleDateString()}<br>
      <strong>${L.validity}:</strong> ${q.valid_until || '—'}<br>
      ${q.currency_code ? '<strong>'+L.currency+':</strong> ' + q.currency_code : ''}
    </div>
  </div>
  <div class="info" style="margin-bottom:20px">
    <strong>${q.contacts?.name || '—'}</strong><br>
    ${q.contacts?.address || ''}${q.contacts?.tax_number ? '<br>'+L.taxno+': ' + q.contacts.tax_number : ''}
    ${q.contacts?.email ? '<br>' + q.contacts.email : ''}${q.contacts?.phone ? ' · ' + q.contacts.phone : ''}
  </div>
  <table><thead><tr><th>#</th><th>${L.product}</th><th style="text-align:right">${L.qty}</th><th style="text-align:right">${L.unitPrice}</th><th style="text-align:right">${L.total}</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="totals">
    <div><span>${L.subtotal}</span><span>${F(q.subtotal)}</span></div>
    ${q.tax_amount > 0 ? `<div><span>${L.tax}</span><span>${F(q.tax_amount)}</span></div>` : ''}
    ${q.discount > 0 ? `<div><span>${L.discount}</span><span>-${F(q.discount)}</span></div>` : ''}
    <div class="grand"><span>${L.grand}</span><span>${F(q.total)}</span></div>
  </div>
  <div style="clear:both"></div>
  ${q.terms ? `<div style="margin-top:20px;padding:10px;background:#f8f9fa;border-radius:6px;font-size:12px"><strong>${L.terms}:</strong> ${q.terms}</div>` : ''}
  ${q.notes ? `<div style="margin-top:8px;font-size:12px;color:#666">📝 ${q.notes}</div>` : ''}
  <div class="footer">
    ${L.validMsg}
    <div class="sig-box">${L.signature}</div>
  </div>
  <script>window.print();<\/script></body></html>`);
  w.document.close();
}

function showToast(msg, type) {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;background:${type === 'error' ? '#dc2626' : '#1e40af'}`;
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
