<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solvenin — Status</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzBhMGYxZSIvPjx0ZXh0IHg9IjYiIHk9IjIzIiBmb250LWZhbWlseT0iSW50ZXIsc2Fucy1zZXJpZiIgZm9udC13ZWlnaHQ9IjgwMCIgZm9udC1zaXplPSIyMCIgZmlsbD0id2hpdGUiPnM8L3RleHQ+PGNpcmNsZSBjeD0iMjUiIGN5PSIyMiIgcj0iNCIgZmlsbD0iIzNiODJmNiIvPjwvc3ZnPg==">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="i18n/loader.js"></script>
<script src="utils.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0f1e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:36px 32px;backdrop-filter:blur(8px)}
.header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;letter-spacing:-1px}
.logo span{color:#38bdf8}
.overall{flex:1;text-align:right}
.overall .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.overall .label{font-size:14px;font-weight:600}
.overall.green .dot{background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.6)}
.overall.amber .dot{background:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.6)}
.overall.red .dot{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.6)}
.last-check{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px}
.checks{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.check{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
.check .icon{font-size:18px}
.check .name{flex:1;font-size:14px;font-weight:600}
.check .ms{font-size:13px;color:rgba(255,255,255,0.6);font-family:'Outfit',sans-serif;font-weight:600}
.check.green{border-color:rgba(34,197,94,0.25)}
.check.amber{border-color:rgba(251,191,36,0.25)}
.check.red{border-color:rgba(239,68,68,0.25)}
.footer{padding-top:20px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;color:rgba(255,255,255,0.5);display:flex;justify-content:space-between;align-items:center}
.footer a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">solvenin<span>.</span></div>
    <div class="overall green" id="overall">
      <div><span class="dot"></span><span class="label" id="overall-label" data-i18n="health_all_ok">All systems operational</span></div>
      <div class="last-check"><span data-i18n="health_last_check">Last check:</span> <span id="last-check">—</span></div>
    </div>
  </div>
  <div class="checks">
    <div class="check" id="check-db"><span class="icon">⚪</span><span class="name" data-i18n="health_db">Database</span><span class="ms">—</span></div>
    <div class="check" id="check-auth"><span class="icon">⚪</span><span class="name" data-i18n="health_auth">Auth</span><span class="ms">—</span></div>
    <div class="check" id="check-api"><span class="icon">⚪</span><span class="name" data-i18n="health_api">API</span><span class="ms">—</span></div>
  </div>
  <div class="footer">
    <span><span data-i18n="health_version">Version:</span> <strong id="app-version">1.0.0</strong></span>
    <a href="mailto:support@solvenin.com">support@solvenin.com</a>
  </div>
</div>
<script>
const sb = window.supabase.createClient(
  'https://jaakjdzpdizjbzvbtcld.supabase.co',
  'sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9'
);

function classify(ms, ok) {
  if (!ok) return 'red';
  if (ms < 500) return 'green';
  if (ms < 2000) return 'amber';
  return 'red';
}
function iconFor(cls) { return cls === 'green' ? '🟢' : cls === 'amber' ? '🟡' : '🔴'; }

async function timed(fn) {
  const t0 = performance.now();
  let ok = true;
  try { await fn(); } catch (e) { ok = false; }
  return { ms: Math.round(performance.now() - t0), ok };
}

function applyCheck(id, result) {
  const el = document.getElementById(id);
  const cls = classify(result.ms, result.ok);
  el.classList.remove('green','amber','red');
  el.classList.add(cls);
  el.querySelector('.icon').textContent = iconFor(cls);
  el.querySelector('.ms').textContent = result.ok ? result.ms + 'ms' : 'error';
  return cls;
}

async function runChecks() {
  // 1. DB ping via the public feature_flags table (always allowed by RLS)
  const dbResult = await timed(async () => {
    const { data, error } = await sb.from('feature_flags')
      .select('flag_name,description')
      .eq('flag_name','app_version')
      .single();
    if (error) throw error;
    if (data && data.description) {
      document.getElementById('app-version').textContent = data.description;
    }
  });
  // 2. Auth ping
  const authResult = await timed(async () => {
    await sb.auth.getSession();
  });
  // 3. API ping (raw HEAD-style fetch on the REST root)
  const apiResult = await timed(async () => {
    const r = await fetch('https://jaakjdzpdizjbzvbtcld.supabase.co/rest/v1/feature_flags?select=flag_name&limit=1', {
      headers: {
        apikey: 'sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9',
        Authorization: 'Bearer sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9'
      }
    });
    if (!r.ok) throw new Error('http '+r.status);
  });

  const c1 = applyCheck('check-db', dbResult);
  const c2 = applyCheck('check-auth', authResult);
  const c3 = applyCheck('check-api', apiResult);

  // Overall status: worst of the three
  const order = { green: 0, amber: 1, red: 2 };
  const worst = [c1,c2,c3].reduce((a,b) => order[a] >= order[b] ? a : b, 'green');
  const overall = document.getElementById('overall');
  overall.classList.remove('green','amber','red');
  overall.classList.add(worst);
  const labelKey = worst === 'green' ? 'health_all_ok'
                 : worst === 'amber' ? 'health_degraded'
                 : 'health_outage';
  const fallback = worst === 'green' ? 'All systems operational'
                 : worst === 'amber' ? 'Degraded performance'
                 : 'Service disruption';
  document.getElementById('overall-label').textContent =
    (typeof t === 'function' ? t(labelKey) : '') || fallback;

  document.getElementById('last-check').textContent = new Date().toLocaleTimeString();
}

runChecks();
setInterval(runChecks, 30000);
if (typeof applyTranslations === 'function') applyTranslations();
</script>
</body>
</html>
