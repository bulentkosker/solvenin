<style>
:root{--primary:#1e40af;--primary-dark:#1a2744;--white:#fff;--bg:#f5f7fb;--gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;--gray300:#cbd5e1;--gray400:#94a3b8;--gray500:#64748b;--gray600:#475569;--gray800:#1a2744;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--font-display:'Outfit',sans-serif;--font-body:'DM Sans',sans-serif;--sb-w:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--gray800);min-height:100vh}

/* LOGIN */
.login-page{position:fixed;inset:0;background:var(--primary-dark);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--white);border-radius:14px;padding:36px 32px;width:380px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--primary-dark)}
.login-logo h1 span{color:#38bdf8}
.login-logo p{font-size:12px;color:var(--gray400);margin-top:4px;text-transform:uppercase;letter-spacing:2px;font-weight:600}
.login-box input{width:100%;padding:11px 14px;border:1px solid var(--gray200);border-radius:8px;font-size:13px;font-family:var(--font-body);margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--primary)}
.login-box button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.login-box button:hover{background:#1a3a9e}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center}

/* PANEL LAYOUT */
.panel-wrap{display:flex;min-height:100vh}
.sp-sidebar{width:var(--sb-w);background:var(--primary-dark);color:#fff;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sp-sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sp-sidebar-logo h2{font-family:var(--font-display);font-size:20px;font-weight:800;color:#fff}
.sp-sidebar-logo h2 span{color:#38bdf8}
.sp-sidebar-logo p{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-weight:600}
.sp-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sp-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.8);margin-bottom:2px;transition:all .15s}
.sp-nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sp-nav-item.active{background:rgba(56,189,248,.15);color:#38bdf8;font-weight:600}
.sp-nav-icon{width:18px;text-align:center}
.sp-sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:11px}
.sp-user-name{color:#fff;font-weight:600;margin-bottom:2px}
.sp-user-role{color:rgba(255,255,255,.5);text-transform:uppercase;font-size:9px;letter-spacing:1px;margin-bottom:6px}
.sp-logout{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.2);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;width:100%;font-weight:600}
.sp-logout:hover{background:rgba(239,68,68,.25)}

.sp-main{flex:1;margin-left:var(--sb-w);min-height:100vh}
.sp-topbar{height:56px;background:var(--white);border-bottom:1px solid var(--gray200);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:40}
.sp-title{font-family:var(--font-display);font-size:18px;font-weight:700}
.sp-content{padding:20px 24px}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--gray200);border-radius:10px;padding:14px 18px}
.stat-label{font-size:10px;color:var(--gray400);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-val{font-family:var(--font-display);font-size:24px;font-weight:800;margin-top:4px}
.stat-sub{font-size:11px;color:var(--gray400);margin-top:2px}

.card{background:var(--white);border:1px solid var(--gray200);border-radius:10px;padding:16px 20px;margin-bottom:16px}
.card h3{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:12px}

.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.bar-label{width:100px;font-weight:600}
.bar-track{flex:1;height:14px;background:var(--gray100);border-radius:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:7px}
.bar-value{width:120px;text-align:right;color:var(--gray500);font-size:11px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--gray400);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--gray200);background:var(--gray50)}
td{padding:8px 12px;border-bottom:1px solid var(--gray100)}
tr:hover td{background:var(--gray50)}
.text-right{text-align:right}
.badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;display:inline-block}
.badge-gray{background:var(--gray100);color:var(--gray500)}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-purple{background:#f3e8ff;color:#6b21a8}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 11px;border:1px solid var(--gray200);border-radius:8px;font-size:12px;font-family:var(--font-body)}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:var(--white);border:1px solid var(--gray200);color:var(--gray600)}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fecaca}
.btn-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.btn-sm{padding:4px 10px;font-size:11px}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:-560px;width:560px;max-width:95vw;height:100vh;background:var(--white);z-index:201;transition:right .25s;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.drawer.open{right:0}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--gray200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px}
.drawer-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray200);background:var(--white);cursor:pointer;font-size:16px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:14px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--gray100);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--font-display);font-size:16px;font-weight:700}
.modal-body{padding:18px 22px}
.modal-footer{padding:12px 22px 18px;border-top:1px solid var(--gray100);display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:12px}
.field label{font-size:11px;font-weight:600;color:var(--gray500);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--gray200);border-radius:8px;font-size:13px;font-family:var(--font-body)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}

@media(max-width:768px){.sp-sidebar{transform:translateX(-100%);transition:transform .25s}.sp-sidebar.open{transform:translateX(0)}.sp-main{margin-left:0}.stats-grid{grid-template-columns:1fr 1fr}}
.sp-search-select { position:relative; }
.sp-search-select input { width:100%;padding:8px 10px;border:1px solid var(--gray200);border-radius:8px;font-size:13px;box-sizing:border-box; }
.sp-search-select input:focus { border-color:var(--primary);outline:none; }
.sp-search-list { display:none;position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:#fff;border:1px solid var(--gray200);border-radius:0 0 8px 8px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1); }
.sp-search-select.open .sp-search-list { display:block; }
.sp-search-item { padding:8px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px;border-bottom:1px solid var(--gray50); }
.sp-search-item:hover { background:var(--gray50); }
.sp-search-item .co-name { font-weight:600; }
.sp-search-item .co-email { font-size:11px;color:var(--gray400); }
.sp-search-item.selected { background:#eff6ff; }
</style>

<script>
const { createClient } = supabase;
const sb = createClient('https://jaakjdzpdizjbzvbtcld.supabase.co','sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9');

let user = null; // {id, email, name, role}
let currentPage = 'dashboard';
let companies = [], allUsers = [], demos = [], panelUsers = [], logs = [];
let selectedCompany = null;

// ===== AUTH =====
function getToken() {
  try {
    const t = localStorage.getItem('sp_token');
    if (!t) return null;
    const data = JSON.parse(decodeURIComponent(atob(t).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
    if (data.exp < Date.now()) { localStorage.removeItem('sp_token'); return null; }
    return data;
  } catch(e) { localStorage.removeItem('sp_token'); return null; }
}

function setToken(u) {
  const data = { ...u, exp: Date.now() + 8*3600*1000 };
  // Unicode-safe base64 encoding
  const json = JSON.stringify(data);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  localStorage.setItem('sp_token', b64);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Email ve şifre gerekli'; return; }
  const { data, error } = await sb.rpc('sp_login', { p_email: email, p_password: password });
  if (error) { errEl.textContent = error.message; return; }
  if (!data?.ok) { errEl.textContent = 'Geçersiz email veya şifre'; return; }
  user = { id: data.id, email: data.email, name: data.name, role: data.role };
  setToken(user);
  showPanel();
}

function doLogout() {
  localStorage.removeItem('sp_token');
  user = null;
  document.getElementById('panel-wrap').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

function showPanel() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('panel-wrap').style.display = 'flex';
  document.getElementById('sp-user-name').textContent = user.name;
  document.getElementById('sp-user-role').textContent = user.role;
  buildNav();
  refreshExpiredTrashCount();
  switchPage('dashboard');
}

function buildNav() {
  const items = [
    { key: 'dashboard', icon: '🏠', label: 'Dashboard', roles: ['superadmin','support','partner','partner_manager'] },
    { key: 'companies', icon: '🏢', label: 'Şirketler', roles: ['superadmin','support','partner','partner_manager'] },
    { key: 'trash', icon: '🗑️', label: 'Çöp Kutusu', roles: ['superadmin','support'] },
    { key: 'users', icon: '👥', label: 'Kullanıcılar', roles: ['superadmin','support'] },
    { key: 'demos', icon: '🎯', label: 'Demolar', roles: ['superadmin','support','partner'] },
    { key: 'flags', icon: '🚩', label: 'Feature Flags', roles: ['superadmin','support'] },
    { key: 'repair', icon: '🔧', label: 'Veri Onarım', roles: ['superadmin','support'] },
    { key: 'panel_users', icon: '👤', label: 'Panel Kullanıcıları', roles: ['superadmin'] },
    { key: 'system', icon: '⚙️', label: 'Sistem Ayarları', roles: ['superadmin'] },
    { key: 'logs', icon: '📋', label: 'Loglar', roles: ['superadmin','support'] }
  ];
  const nav = document.getElementById('sp-nav');
  nav.innerHTML = items.filter(i => i.roles.includes(user.role)).map(i => {
    const expBadge = (i.key === 'trash' && _expiredTrashCount > 0)
      ? ` <span style="background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:auto">${_expiredTrashCount}</span>` : '';
    return `<div class="sp-nav-item ${i.key === currentPage ? 'active' : ''}" onclick="switchPage('${i.key}')"><span class="sp-nav-icon">${i.icon}</span>${i.label}${expBadge}</div>`;
  }).join('');
}

// Cached expired count for the nav badge — refreshed on dashboard load and after trash actions
let _expiredTrashCount = 0;
async function refreshExpiredTrashCount() {
  try {
    const { data } = await sb.rpc('sp_expired_trash_count');
    _expiredTrashCount = data || 0;
    if (typeof buildNav === 'function') buildNav();
  } catch(e) {}
}

function switchPage(key) {
  currentPage = key;
  buildNav();
  const titles = { dashboard:'🏠 Dashboard', companies:'🏢 Şirketler', trash:'🗑️ Çöp Kutusu', users:'👥 Kullanıcılar', demos:'🎯 Demolar', flags:'🚩 Feature Flags', repair:'🔧 Veri Onarım', panel_users:'👤 Panel Kullanıcıları', system:'⚙️ Sistem Ayarları', logs:'📋 Loglar' };
  document.getElementById('sp-title').textContent = titles[key] || key;
  if (key === 'dashboard') renderDashboard();
  else if (key === 'companies') renderCompanies();
  else if (key === 'trash') renderTrash();
  else if (key === 'users') renderUsers();
  else if (key === 'demos') renderDemos();
  else if (key === 'flags') renderFlags();
  else if (key === 'repair') renderRepair();
  else if (key === 'panel_users') renderPanelUsers();
  else if (key === 'system') renderSystem();
  else if (key === 'logs') renderLogs();
}

// ===== HELPERS =====
function fmt(n) { return (parseFloat(n)||0).toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('tr-TR'); }
function fmtDateTime(d) { if (!d) return '—'; return new Date(d).toLocaleString('tr-TR'); }
function fmtRel(d) {
  if (!d) return '—';
  const diff = Math.floor((Date.now() - new Date(d)) / 1000);
  if (diff < 60) return 'az önce';
  if (diff < 3600) return Math.floor(diff/60) + ' dk önce';
  if (diff < 86400) return Math.floor(diff/3600) + ' saat önce';
  return Math.floor(diff/86400) + ' gün önce';
}
function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
}

// ===== DASHBOARD =====
async function renderDashboard() {
  const content = document.getElementById('sp-content');
  content.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray400)">⏳ Yükleniyor...</div>';
  const { data: stats } = await sb.rpc('sp_dashboard_stats');
  const { data: recentLogs } = await sb.rpc('sp_recent_logs', { p_limit: 10 });
  const totalPlans = (stats.plan_free||0) + (stats.plan_standard||0) + (stats.plan_pro||0);
  const mrr = (stats.plan_standard||0) * 8.99 + (stats.plan_pro||0) * 12.99;
  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Toplam Şirket</div><div class="stat-val">${stats.companies}</div></div>
      <div class="stat-card"><div class="stat-label">Toplam Kullanıcı</div><div class="stat-val">${stats.users}</div></div>
      <div class="stat-card"><div class="stat-label">Aktif Demo</div><div class="stat-val">${stats.demos}</div></div>
      <div class="stat-card"><div class="stat-label">Partnerler</div><div class="stat-val">${stats.partners}</div></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Toplam Fatura</div><div class="stat-val">${fmt(stats.invoices)}</div></div>
      <div class="stat-card"><div class="stat-label">Cari Kaydı</div><div class="stat-val">${fmt(stats.contacts)}</div></div>
      <div class="stat-card"><div class="stat-label">Stok Hareketi</div><div class="stat-val">${fmt(stats.movements)}</div></div>
      <div class="stat-card"><div class="stat-label">Tahmini MRR</div><div class="stat-val">$${fmt(mrr.toFixed(0))}</div></div>
    </div>

    <!-- SYSTEM HEALTH WIDGET -->
    <div class="card" id="sys-health-card">
      <h3>🟢 <span id="sys-health-overall">Sistem Durumu</span></h3>

async function refreshSystemHealth() {
  if (!document.getElementById('sys-health-card')) return;
  const time = (fn) => { const t0 = performance.now(); return fn().then(() => ({ ms: Math.round(performance.now()-t0), ok: true })).catch(() => ({ ms: Math.round(performance.now()-t0), ok: false })); };
  const cls = (r) => !r.ok ? 'red' : r.ms < 500 ? 'green' : r.ms < 2000 ? 'amber' : 'red';
  const icon = (c) => c === 'green' ? '🟢' : c === 'amber' ? '🟡' : '🔴';
  const dbR = await time(() => sb.from('feature_flags').select('flag_name').eq('flag_name','app_version').single());
  const auR = await time(() => sb.auth.getSession());
  const apR = await time(() => fetch('https://jaakjdzpdizjbzvbtcld.supabase.co/rest/v1/feature_flags?select=flag_name&limit=1', { headers: { apikey: 'sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9', Authorization: 'Bearer sb_publishable_Zp3NcrPr7yPrL8zgpiNmfA_YF7RGHe9' } }).then(r => { if (!r.ok) throw new Error(); }));
  document.getElementById('sys-db-icon').textContent = icon(cls(dbR));
  document.getElementById('sys-db-ms').textContent = dbR.ok ? dbR.ms+'ms' : 'error';
  document.getElementById('sys-auth-icon').textContent = icon(cls(auR));
  document.getElementById('sys-auth-ms').textContent = auR.ok ? auR.ms+'ms' : 'error';
  document.getElementById('sys-api-icon').textContent = icon(cls(apR));
  document.getElementById('sys-api-ms').textContent = apR.ok ? apR.ms+'ms' : 'error';
  const order = { green:0, amber:1, red:2 };
  const worst = [cls(dbR),cls(auR),cls(apR)].reduce((a,b) => order[a]>=order[b]?a:b, 'green');
  const overall = document.getElementById('sys-health-overall');
  overall.textContent = worst==='green'?'Sistem Durumu — Tüm Sistemler Çalışıyor' : worst==='amber'?'Sistem Durumu — Yavaşlama' : 'Sistem Durumu — Kesinti';
  document.getElementById('sys-health-card').querySelector('h3').firstChild.textContent = (worst==='green'?'🟢 ':worst==='amber'?'🟡 ':'🔴 ');
  document.getElementById('sys-last-check').textContent = new Date().toLocaleTimeString();
}

function renderBar(label, value, total, color) {
  const pct = total > 0 ? Math.round(value / total * 100) : 0;
  return `<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="bar-value">${value} şirket (%${pct})</div>
  </div>`;
}

async function restoreFromTrash(id, name) {
  if (!confirm('"' + name + '" şirketini geri yüklemek istediğinize emin misiniz?')) return;
  const { data, error } = await sb.rpc('restore_company', {
    p_company_id: id,
    p_performed_by: null,
    p_performed_by_email: user.email
  });
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  if (!data?.success) { showToast(data?.error || 'Geri yüklenemedi', 'error'); return; }
  showToast('Şirket geri yüklendi: '+name, 'success');
  renderTrash();
}

async function permDeleteFromTrash(id, name) {
  const c = trashCompanies.find(x => x.id === id);
  if (!c) return;
  if (c.days_left > 0) { showToast('30 gün dolmadan kalıcı silinemez', 'error'); return; }
  if (!confirm('"' + name + '" şirketini KALICI olarak silmek istediğinize emin misiniz? Bu işlem geri alınamaz.')) return;
  if (!confirm('SON UYARI: Tüm veriler (siparişler, ürünler, müşteriler, vs.) kalıcı olarak silinecek. Devam edilsin mi?')) return;
  const { data, error } = await sb.rpc('permanently_delete_company', {
    p_company_id: id,
    p_performed_by: null,
    p_performed_by_email: user.email
  });
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  if (!data?.success) { showToast(data?.error || 'Kalıcı silinemedi', 'error'); return; }
  showToast('Şirket kalıcı silindi: '+name, 'success');
  renderTrash();
}

  if (!confirm(msg)) return;
  const { data, error } = await sb.rpc('sp_set_maintenance_mode', { p_enabled: enable });

  showToast(enable ? '🔒 Bakım modu AKTİF' : '✅ Bakım modu kapatıldı', enable?'error':'success');
  renderFlags();
}

async function saveFlagEdit() {
  if (!_editingFlag) return;
  const isGlobal = document.getElementById('flg-global').checked;
  const plans = Array.from(document.querySelectorAll('.flg-plan:checked')).map(c => c.value);
  const companies = document.getElementById('flg-companies').value
    .split('\n').map(s => s.trim()).filter(s => s.length === 36); // basic uuid length filter
  const rollout = parseInt(document.getElementById('flg-rollout').value) || 0;

  const { data, error } = await sb.rpc('sp_update_feature_flag', {
    p_flag_name: _editingFlag.flag_name,
    p_is_enabled_globally: isGlobal,
    p_enabled_for_plans: plans,
    p_enabled_for_companies: companies,
    p_rollout_percentage: rollout
  });
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  if (!data?.success) { showToast(data?.error || 'Güncellenemedi', 'error'); return; }
  showToast('Flag güncellendi: '+_editingFlag.flag_name, 'success');
  document.getElementById('flag-edit-overlay').classList.remove('open');
  _editingFlag = null;
  renderFlags();
}

async function saveSubscription(companyId) {
  const plan = document.getElementById('sub-plan').value;
  const maxUsers = parseInt(document.getElementById('sub-max').value);
  const status = document.getElementById('sub-status').value;
  const start = document.getElementById('sub-start').value;
  const end = document.getElementById('sub-end').value;
  const note = document.getElementById('sub-note').value.trim();
  if (!maxUsers || maxUsers < 1) { showToast('Max kullanıcı sayısı girin (zorunlu)', 'error'); return; }
  if (!note) { showToast('Not girin (zorunlu)', 'error'); return; }
  const { error } = await sb.rpc('sp_update_subscription', {
    p_user_id: user.id, p_company_id: companyId,
    p_plan: plan, p_max_users: maxUsers, p_status: status,
    p_start: start || null, p_end: end || null, p_note: note
  });
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  closeModal();
  showToast('Abonelik güncellendi', 'success');
  await renderCompanies();
  if (selectedCompany) openCompanyDrawer(selectedCompany.id);
}

async function openUserPlanModal(u) {
  const planEnd = u.plan_end ? new Date(u.plan_end).toISOString().split('T')[0] : '';
  // Fetch via SECURITY DEFINER RPC (anon key can't read profiles directly)
  const { data: prof } = await sb.rpc('sp_get_user_plan', { p_user_id: u.id });
  const { data: ownedCompanies } = await sb.from('companies').select('id').eq('owner_id', u.id);
  const coIds = (ownedCompanies||[]).map(c=>c.id);
  let activeUsers = 0;
  if (coIds.length) {
    const { data: cus } = await sb.from('company_users').select('user_id').in('company_id', coIds);
    activeUsers = new Set((cus||[]).map(x=>x.user_id)).size;
  }
  const currentCount = prof?.plan_user_count ?? 1;
  openModal('💼 Kullanıcı Planı: ' + (u.full_name || u.email), `
    <div class="field"><label>Email</label><div style="padding:6px 0;font-size:12px;color:var(--gray500)">${u.email || '—'}</div></div>
    <div class="field"><label>Plan</label>
      <select id="up-plan">
        <option value="free" ${u.plan==='free'?'selected':''}>Free</option>
        <option value="standard" ${u.plan==='standard'?'selected':''}>Standard</option>
        <option value="pro" ${u.plan==='pro'?'selected':''}>Pro</option>
      </select>
    </div>
    <div class="field"><label>Plan Durumu</label>
      <select id="up-status">
        <option value="active" ${(u.plan_status||'active')==='active'?'selected':''}>Active</option>
        <option value="trial" ${u.plan_status==='trial'?'selected':''}>Trial</option>
        <option value="expired" ${u.plan_status==='expired'?'selected':''}>Expired</option>
        <option value="cancelled" ${u.plan_status==='cancelled'?'selected':''}>Cancelled</option>
        <option value="paused" ${u.plan_status==='paused'?'selected':''}>Paused</option>
      </select>
    </div>
    <div class="field"><label>Bitiş Tarihi</label>
      <input type="date" id="up-end" value="${planEnd}">
      <div style="font-size:11px;color:var(--gray400);margin-top:3px">Boş bırakılırsa süresiz</div>
    </div>
    <div class="field"><label>Kullanıcı Limiti (plan_user_count)</label>
      <input type="number" id="up-count" min="1" value="${currentCount}" oninput="checkUserCountOverage(${activeUsers})">
      <div id="up-count-warn" style="font-size:11px;color:var(--gray400);margin-top:3px">Aktif kullanıcı sayısı: ${activeUsers}. Sınırsız için 999999 girin.</div>
    </div>
  `, [
    { text: 'İptal', cls: 'btn-outline', onclick: 'closeModal()' },
    { text: 'Kaydet', cls: 'btn-primary', onclick: `saveUserPlan('${u.id}',${activeUsers})` }
  ]);
}

function checkUserCountOverage(activeUsers) {
  const val = parseInt(document.getElementById('up-count').value) || 0;
  const warn = document.getElementById('up-count-warn');
  if (val < activeUsers) {
    warn.style.color = '#dc2626';
    warn.innerHTML = `⚠️ Mevcut kullanıcı sayısı (${activeUsers}) yeni limitin (${val}) üzerinde. ${activeUsers - val} kullanıcıyı silmeniz gerekebilir.`;
  } else {
    warn.style.color = 'var(--gray400)';
    warn.textContent = `Aktif kullanıcı sayısı: ${activeUsers}. Sınırsız için 999999 girin.`;
  }
}

async function saveUserPlan(userId, activeUsers) {
  const plan = document.getElementById('up-plan').value;
  const status = document.getElementById('up-status').value;
  const endStr = document.getElementById('up-end').value;
  const countStr = document.getElementById('up-count').value;
  const count = countStr ? parseInt(countStr) : null;
  const planEnd = endStr ? new Date(endStr + 'T23:59:59').toISOString() : null;
  if (count !== null && activeUsers > count) {
    if (!confirm(`Mevcut kullanıcı sayısı (${activeUsers}) yeni limitin (${count}) üzerinde. Yine de kaydetmek istiyor musunuz? Fazla kullanıcılar login olabilir ama yeni işlem yapamaz.`)) return;
  }
  const { data, error } = await sb.rpc('sp_update_user_plan', {
    p_user_id: userId, p_plan: plan, p_plan_end: planEnd, p_plan_status: status, p_plan_user_count: count
  });
  if (error || data?.success === false) {
    showToast('Hata: ' + (error?.message || data?.error || 'unknown'), 'error');
    return;
  }
  closeModal();
  showToast('Plan güncellendi', 'success');
  await renderUsers();
}

  const content = document.getElementById('sp-content');

let _usersFilter = 'all'; // 'all' | 'owners'
const _usersExpanded = new Set(); // company_name → expanded?

function renderUsersTable() {
  const q = (document.getElementById('u-search')?.value || '').toLowerCase();
  const filtered = allUsers.filter(u => {
    if (q && !(u.full_name||'').toLowerCase().includes(q) && !(u.email||'').toLowerCase().includes(q) && !(u.company_name||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const planBadgeOf = p => ({ free:'badge-gray', standard:'badge-blue', pro:'badge-purple' }[p||'free'] || 'badge-gray');
  const statusBadgeOf = s => ({ active:'badge-green', trial:'badge-orange', expired:'badge-red', cancelled:'badge-red', paused:'badge-gray' }[s||'active'] || 'badge-gray');
  const suspBadge = u => u && u.is_suspended ? ' <span style="font-size:9px;padding:1px 5px;background:#fef3c7;color:#92400e;border-radius:3px;font-weight:700">🚫 ASKIDA</span>' : '';

  // Group by company_name; identify owner per group
  const groups = {};
  filtered.forEach(u => {
    const key = u.company_name || '—';
    if (!groups[key]) groups[key] = { owner: null, members: [] };
    if (u.company_role === 'owner') groups[key].owner = u;
    else groups[key].members.push(u);
  });

  // If filter = owners only: flat list of owners
  const ownersOnly = _usersFilter === 'owners';
  const toolbarHTML = `
    <div class="toolbar">
      <input type="text" id="u-search" placeholder="🔍 Kullanıcı ara..." oninput="renderUsersTable()" value="${q}">
      <div class="tab-group" style="display:inline-flex;gap:4px;background:var(--gray100);border-radius:8px;padding:3px">
        <button onclick="setUsersFilter('all')" style="padding:5px 12px;border-radius:6px;border:none;background:${_usersFilter==='all'?'#fff':'transparent'};font-size:12px;font-weight:${_usersFilter==='all'?'700':'500'};cursor:pointer;color:var(--gray800);box-shadow:${_usersFilter==='all'?'0 1px 3px rgba(0,0,0,.08)':'none'}">Tümü</button>
        <button onclick="setUsersFilter('owners')" style="padding:5px 12px;border-radius:6px;border:none;background:${_usersFilter==='owners'?'#fff':'transparent'};font-size:12px;font-weight:${_usersFilter==='owners'?'700':'500'};cursor:pointer;color:var(--gray800);box-shadow:${_usersFilter==='owners'?'0 1px 3px rgba(0,0,0,.08)':'none'}">Sadece Ownerlar</button>
      </div>
      <div style="flex:1"></div>
      <span style="font-size:12px;color:var(--gray500)">${filtered.length} kullanıcı · ${Object.keys(groups).length} şirket</span>
    </div>
  `;

  let rowsHTML = '';
  Object.entries(groups).sort((a,b) => (a[0]||'').localeCompare(b[0]||'')).forEach(([companyName, g]) => {
    const o = g.owner;
    const members = g.members;
    const expanded = _usersExpanded.has(companyName);
    if (ownersOnly) {
      // Flat: only owner
      if (!o) return;
      rowsHTML += `<tr>
        <td></td>
        <td><strong>${o.full_name || '—'}</strong>${suspBadge(o)}</td>
        <td style="color:var(--gray500);font-size:11px">${o.email || '—'}</td>
        <td>${companyName}</td>
        <td><span class="badge badge-purple">owner</span></td>
        <td><span class="badge ${planBadgeOf(o.plan)}">${o.plan || 'free'}</span></td>
        <td><span class="badge ${statusBadgeOf(o.plan_status)}">${o.plan_status || 'active'}</span></td>
        <td style="color:var(--gray500);font-size:11px">${o.plan_end ? fmtDate(o.plan_end) : '—'}</td>
        <td style="color:var(--gray500);font-size:11px">${fmtDate(o.created_at)}</td>
        <td><button class="btn btn-outline btn-sm" onclick='openUserPlanModal(${JSON.stringify(o).replace(/'/g, "&apos;")})'>💼 Plan</button></td>
      </tr>`;
    } else {
      // Grouped: owner row + collapsible members
      const hasMembers = members.length > 0;
      const arrow = hasMembers ? (expanded ? '▼' : '▶') : '';
      if (o) {
        rowsHTML += `<tr style="background:#f8fafc;border-top:2px solid var(--gray100);cursor:${hasMembers?'pointer':'default'}" ${hasMembers?`onclick="toggleUserGroup('${companyName.replace(/'/g, "\\'")}')"`:''}>
          <td style="width:24px;text-align:center;color:var(--gray400);font-size:10px">${arrow}</td>
          <td><strong>👤 ${o.full_name || '—'}</strong>${suspBadge(o)}</td>
          <td style="color:var(--gray500);font-size:11px">${o.email || '—'}</td>
          <td><strong>${companyName}</strong></td>
          <td><span class="badge badge-purple">owner</span></td>
          <td><span class="badge ${planBadgeOf(o.plan)}">${o.plan || 'free'}</span></td>
          <td><span class="badge ${statusBadgeOf(o.plan_status)}">${o.plan_status || 'active'}</span></td>
          <td style="color:var(--gray500);font-size:11px">${o.plan_end ? fmtDate(o.plan_end) : '—'}</td>
          <td style="color:var(--gray500);font-size:11px">${fmtDate(o.created_at)}</td>
          <td><button class="btn btn-outline btn-sm" onclick='event.stopPropagation();openUserPlanModal(${JSON.stringify(o).replace(/'/g, "&apos;")})'>💼 Plan</button></td>
        </tr>`;
      } else {
        rowsHTML += `<tr style="background:#fef3c7;border-top:2px solid var(--gray100)">
          <td></td>
          <td colspan="9" style="color:#92400e;font-size:11px">⚠️ Owner bulunamadı: ${companyName}</td>
        </tr>`;
      }
      if (expanded && hasMembers) {
        members.forEach(m => {
          rowsHTML += `<tr style="background:#fff">
            <td style="text-align:right;color:var(--gray400);padding-right:8px">└</td>
            <td style="padding-left:24px;color:var(--gray600)">${m.full_name || '—'}${suspBadge(m)}</td>
            <td style="color:var(--gray500);font-size:11px">${m.email || '—'}</td>
            <td style="color:var(--gray400);font-size:11px">↑</td>
            <td><span class="badge badge-gray">${m.company_role || '—'}</span></td>
            <td colspan="3" style="color:var(--gray400);font-size:11px;font-style:italic">(plan owner'dan miras)</td>
            <td style="color:var(--gray500);font-size:11px">${fmtDate(m.created_at)}</td>
            <td></td>
          </tr>`;
        });
      } else if (!expanded && hasMembers) {
        // show count hint
        rowsHTML = rowsHTML.replace(
          `onclick="toggleUserGroup('${companyName.replace(/'/g, "\\'")}')"><td style="width:24px;text-align:center;color:var(--gray400);font-size:10px">${arrow}</td><td><strong>👤 ${o.full_name || '—'}</strong>${suspBadge(o)}`,
          `onclick="toggleUserGroup('${companyName.replace(/'/g, "\\'")}')"><td style="width:24px;text-align:center;color:var(--gray400);font-size:10px">${arrow}</td><td><strong>👤 ${o.full_name || '—'}</strong>${suspBadge(o)} <span style="color:var(--gray400);font-size:10px;font-weight:500">+${members.length}</span>`
        );
      }
    }
  });

  document.getElementById('sp-content').innerHTML = `
    ${toolbarHTML}
    <div class="card" style="padding:0">
      <table>
        <thead><tr><th style="width:24px"></th><th>AD</th><th>EMAIL</th><th>ŞİRKET</th><th>ROL</th><th>PLAN</th><th>DURUM</th><th>BİTİŞ</th><th>KAYIT</th><th></th></tr></thead>
        <tbody>
          ${rowsHTML || '<tr><td colspan="10" style="text-align:center;color:var(--gray400);padding:30px">Kullanıcı bulunamadı</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

function setUsersFilter(f) { _usersFilter = f; renderUsersTable(); }
function toggleUserGroup(companyName) {
  if (_usersExpanded.has(companyName)) _usersExpanded.delete(companyName);
  else _usersExpanded.add(companyName);
  renderUsersTable();
}

function fmtN(v) { return v == null ? '—' : parseFloat(v).toLocaleString(undefined, {maximumFractionDigits:2}); }
function _rtOk(el, html) { el.style.background = '#dcfce7'; el.style.color = '#166534'; el.innerHTML = html; }
function _rtWarn(el, html) { el.style.background = '#fef3c7'; el.style.color = '#92400e'; el.innerHTML = html; }
function _rtErr(el, html) { el.style.background = '#fef2f2'; el.style.color = '#991b1b'; el.innerHTML = html; }

function _discrepancyTable(headers, items, opts) {
  const hasAction = opts?.actionCol;
  return `<table style="width:100%;margin:8px 0;font-size:11px;border-collapse:collapse">
    <thead><tr>${headers.map(h => `<th style="padding:4px 8px;text-align:${h.align||'left'};border-bottom:1px solid #e5e7eb">${h.label}</th>`).join('')}${hasAction ? '<th style="padding:4px 8px;text-align:center;border-bottom:1px solid #e5e7eb">İşlem</th>' : ''}</tr></thead>
    <tbody>${items.slice(0, 30).map((r, i) =>
      `<tr id="${opts?.rowPrefix||'rt'}-row-${i}">${headers.map(h => `<td style="padding:3px 8px;text-align:${h.align||'left'};border-bottom:1px solid #f3f4f6">${h.fmt ? h.fmt(r[h.key], r) : (r[h.key] ?? '—')}</td>`).join('')}${hasAction ? `<td style="padding:3px 8px;text-align:center;border-bottom:1px solid #f3f4f6"><button class="btn btn-outline btn-sm" style="padding:2px 8px;font-size:10px" onclick="${opts.actionFn}('${r[opts.actionKey]}',${i})">🔧</button></td>` : ''}</tr>`
    ).join('')}</tbody>
  </table>${items.length > 30 ? `<div style="font-size:10px;color:var(--gray400)">...ve ${items.length - 30} kayıt daha</div>` : ''}`;
}

async function fixSingleSalesStock(orderId, rowIdx) {
  const row = document.getElementById('rt-sales-row-' + rowIdx);
  const { data, error } = await sb.rpc('sp_fix_single_sales_stock', { p_company_id: repairCompanyId, p_order_id: orderId });
  if (error) { showToast(error.message, 'error'); return; }
  if (row) { row.style.background = '#dcfce7'; row.querySelector('td:last-child').innerHTML = '✅'; }
  const el = document.getElementById('rt-result-sales_stock');
  const remaining = el?.querySelectorAll('tbody tr:not([style*=dcfce7]) button')?.length || 0;
  const counter = document.getElementById('rt-sales-counter');
  if (counter) counter.textContent = remaining > 0 ? `⚠️ ${remaining} eksik kaldı` : '✅ Tümü düzeltildi';
  if (remaining === 0) { const fixAll = document.getElementById('rt-sales-fixall'); if (fixAll) fixAll.style.display = 'none'; }
}

async function runRepair(key, mode) {
  if (!repairCompanyId) { showToast('Önce şirket seçin', 'error'); return; }
  const start = document.getElementById('repair-start').value;
  const end = document.getElementById('repair-end').value;
  const el = document.getElementById('rt-result-' + key);
  el.style.display = 'block'; el.style.background = '#f8fafc'; el.style.color = 'var(--gray500)';
  el.innerHTML = '⏳ Çalışıyor...';

  try {
    // === SALES STOCK ===
    if (key === 'sales_stock') {
      if (mode === 'fix') {
        const { data, error } = await sb.rpc('sp_apply_missing_sales_stock', { p_user_id: user.id, p_company_id: repairCompanyId, p_start: start, p_end: end });
        if (error) throw new Error(error.message);
        _rtOk(el, `✅ ${data?.created || 0} stok hareketi oluşturuldu`); loadRepairHistory();
        setTimeout(() => runRepair('sales_stock', 'analyze'), 500);
      } else {
        const { data, error } = await sb.rpc('sp_analyze_missing_sales_stock', { p_company_id: repairCompanyId, p_start: start, p_end: end });
        if (error) throw new Error(error.message);
        if (!data || !data.items) { _rtOk(el, '✅ Eksik stok hareketi yok'); return; }
        const fmtD = v => v ? new Date(v+'T00:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
        const fmtQ = (v, r) => fmtN(r.quantity) + (r.unit ? ' ' + r.unit : '');
        const rows = (data.details || []).map(r => ({...r, issue_date_fmt: fmtD(r.issue_date), qty_fmt: fmtN(r.quantity) + (r.unit ? ' ' + r.unit : '')}));
        const hdr = [{key:'order_number',label:'Fatura No'},{key:'issue_date_fmt',label:'Tarih'},{key:'contact_name',label:'Cari'},{key:'product_name',label:'Ürün'},{key:'qty_fmt',label:'Miktar',align:'right'}];
        _rtWarn(el, `<span id="rt-sales-counter">⚠️ <strong>${data.orders}</strong> faturada <strong>${data.items}</strong> eksik stok hareketi</span>` +
          _discrepancyTable(hdr, rows, { actionCol: true, rowPrefix: 'rt-sales', actionFn: 'fixSingleSalesStock', actionKey: 'order_id' }) +
          `<button id="rt-sales-fixall" class="btn btn-primary btn-sm" style="margin-top:4px;background:#dc2626;border-color:#dc2626" onclick="runRepair('sales_stock','fix')">🔧 Tümünü Düzelt (${data.items} kayıt)</button>`);
      }

    // === PURCHASE STOCK ===
    } else if (key === 'purchase_stock') {
      if (mode === 'fix') {
        const { data, error } = await sb.rpc('sp_apply_missing_purchase_stock', { p_user_id: user.id, p_company_id: repairCompanyId, p_start: start, p_end: end });
        if (error) throw new Error(error.message);
        _rtOk(el, `✅ ${data?.created || 0} stok hareketi oluşturuldu`); loadRepairHistory();
        setTimeout(() => runRepair('purchase_stock', 'analyze'), 500);
      } else {
        const { data, error } = await sb.rpc('sp_analyze_missing_purchase_stock', { p_company_id: repairCompanyId, p_start: start, p_end: end });
        if (error) throw new Error(error.message);
        if (!data || !data.items) { _rtOk(el, '✅ Eksik stok hareketi yok'); return; }
        const fmtD2 = v => v ? new Date(v+'T00:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
        const rows = (data.details || []).map(r => ({...r, issue_date_fmt: fmtD2(r.issue_date), qty_fmt: fmtN(r.quantity) + (r.unit ? ' ' + r.unit : '')}));
        const hdr = [{key:'order_number',label:'Sipariş No'},{key:'issue_date_fmt',label:'Tarih'},{key:'contact_name',label:'Tedarikçi'},{key:'product_name',label:'Ürün'},{key:'qty_fmt',label:'Miktar',align:'right'}];
        _rtWarn(el, `<span id="rt-purch-counter">⚠️ <strong>${data.orders}</strong> alışta <strong>${data.items}</strong> eksik stok hareketi</span>` +
          _discrepancyTable(hdr, rows, { actionCol: true, rowPrefix: 'rt-purch', actionFn: 'fixSinglePurchaseStock', actionKey: 'order_id' }) +
          `<button id="rt-purch-fixall" class="btn btn-primary btn-sm" style="margin-top:4px;background:#dc2626;border-color:#dc2626" onclick="runRepair('purchase_stock','fix')">🔧 Tümünü Düzelt (${data.items} kayıt)</button>`);
      }

    // === RECALC STOCK ===
    } else if (key === 'recalc_stock') {
      if (mode === 'fix') {
        const { data } = await sb.rpc('sp_recalc_product_stock', { p_user_id: user.id, p_company_id: repairCompanyId });
        _rtOk(el, `✅ ${data.updated} ürünün bakiyesi güncellendi`); loadRepairHistory();
        setTimeout(() => runRepair('recalc_stock', 'analyze'), 500);
      } else {
        const { data } = await sb.rpc('sp_analyze_stock_discrepancies', { p_company_id: repairCompanyId });
        if (data.count > 0) {
          const hdr = [{key:'name',label:'Ürün'},{key:'current',label:'Mevcut',align:'right',fmt:v=>fmt(v)},{key:'calculated',label:'Hesaplanan',align:'right',fmt:v=>fmt(v)},{key:'diff',label:'Fark',align:'right',fmt:v=>`<span style="color:${v>0?'var(--green)':'var(--red)'}; font-weight:700">${v>0?'+':''}${fmt(v)}</span>`}];
          _rtWarn(el, `⚠️ <strong>${data.count}</strong> üründe tutarsızlık bulundu` + _discrepancyTable(hdr, data.items) +
            `<button class="btn btn-primary btn-sm" style="margin-top:4px;background:#dc2626;border-color:#dc2626" onclick="runRepair('recalc_stock','fix')">🔧 Düzelt (${data.count} ürün)</button>`);
        } else _rtOk(el, '✅ Tüm stok bakiyeleri doğru');
      }

    // === RECALC CASH ===
    } else if (key === 'recalc_cash') {
      if (mode === 'fix') {
        const { data } = await sb.rpc('sp_recalc_cash_balances', { p_user_id: user.id, p_company_id: repairCompanyId });
        _rtOk(el, `✅ ${data.updated} kasanın bakiyesi güncellendi`); loadRepairHistory();
        setTimeout(() => runRepair('recalc_cash', 'analyze'), 500);
      } else {
        const { data } = await sb.rpc('sp_analyze_cash_discrepancies', { p_company_id: repairCompanyId });
        if (data.count > 0) {
          const hdr = [{key:'name',label:'Kasa'},{key:'current',label:'Mevcut',align:'right',fmt:v=>fmt(v)},{key:'calculated',label:'Hesaplanan',align:'right',fmt:v=>fmt(v)},{key:'diff',label:'Fark',align:'right',fmt:v=>`<span style="color:${v>0?'var(--green)':'var(--red)'}; font-weight:700">${v>0?'+':''}${fmt(v)}</span>`}];
          _rtWarn(el, `⚠️ <strong>${data.count}</strong> kasada tutarsızlık bulundu` + _discrepancyTable(hdr, data.items) +
            `<button class="btn btn-primary btn-sm" style="margin-top:4px;background:#dc2626;border-color:#dc2626" onclick="runRepair('recalc_cash','fix')">🔧 Düzelt (${data.count} kasa)</button>`);
        } else _rtOk(el, '✅ Tüm kasa bakiyeleri doğru');
      }

    // === RECALC BANK ===
    } else if (key === 'recalc_bank') {
      if (mode === 'fix') {
        const { data } = await sb.rpc('sp_recalc_bank_balances', { p_user_id: user.id, p_company_id: repairCompanyId });
        _rtOk(el, `✅ ${data.updated} banka hesabının bakiyesi güncellendi`); loadRepairHistory();
        setTimeout(() => runRepair('recalc_bank', 'analyze'), 500);
      } else {
        const { data } = await sb.rpc('sp_analyze_bank_discrepancies', { p_company_id: repairCompanyId });
        if (data.count > 0) {
          const hdr = [{key:'name',label:'Hesap'},{key:'current',label:'Mevcut',align:'right',fmt:v=>fmt(v)},{key:'calculated',label:'Hesaplanan',align:'right',fmt:v=>fmt(v)},{key:'diff',label:'Fark',align:'right',fmt:v=>`<span style="color:${v>0?'var(--green)':'var(--red)'}; font-weight:700">${v>0?'+':''}${fmt(v)}</span>`}];
          _rtWarn(el, `⚠️ <strong>${data.count}</strong> banka hesabında tutarsızlık bulundu` + _discrepancyTable(hdr, data.items) +
            `<button class="btn btn-primary btn-sm" style="margin-top:4px;background:#dc2626;border-color:#dc2626" onclick="runRepair('recalc_bank','fix')">🔧 Düzelt (${data.count} hesap)</button>`);
        } else _rtOk(el, '✅ Tüm banka bakiyeleri doğru');
      }

    // === TRIAL BALANCE ===
    } else if (key === 'trial_balance') {
      const { data } = await sb.rpc('sp_check_trial_balance', { p_company_id: repairCompanyId, p_end: end });
      if (data.balanced)
        _rtOk(el, `✅ Mizan dengeli<br>Borç: ${fmt(data.total_debit)} — Alacak: ${fmt(data.total_credit)}`);
      else
        _rtErr(el, `⚠️ Mizan dengede değil!<br>Borç: ${fmt(data.total_debit)}<br>Alacak: ${fmt(data.total_credit)}<br>Fark: <strong>${fmt(data.difference)}</strong>`);

    // === CONTACT BALANCES ===
    } else if (key === 'contact_balances') {
      if (mode === 'fix') {
        await fixAllContactBalances();
        loadRepairHistory();
      } else {
        const { data } = await sb.rpc('get_all_contact_balances', { p_company_id: repairCompanyId });
        if (!data?.length) {
          _rtOk(el, '✅ Tüm cariler dengeli');
        } else {
          const rows = data.map(c => ({ ...c, balance_fmt: fmtN(c.balance) }));
          const hdr = [{key:'contact_name',label:'Cari'},{key:'balance_fmt',label:'Bakiye',align:'right'}];
          _rtWarn(el, `<span id="rt-contact-counter">⚠️ <strong>${data.length}</strong> caride açık bakiye var</span>` +
            _discrepancyTable(hdr, rows, { actionCol: true, rowPrefix: 'rt-contact', actionFn: 'fixSingleContactBalance', actionKey: 'contact_id' }) +
            `<button id="rt-contact-fixall" class="btn btn-primary btn-sm" style="margin-top:4px;background:#dc2626;border-color:#dc2626" onclick="runRepair('contact_balances','fix')">🔧 Tümünü Düzelt (${data.length} kayıt)</button>`);
        }
      }
    }
  } catch (e) {
    _rtErr(el, '❌ Hata: ' + e.message);
  }
}

async function loadRepairHistory() {
  const el = document.getElementById('repair-history');
  if (!el) return;
  if (!repairCompanyId) { el.innerHTML = 'Şirket seçilince gösterilir'; return; }
  const { data } = await sb.rpc('sp_repair_history', { p_company_id: repairCompanyId });
  if (!data?.length) { el.innerHTML = '<div style="padding:10px;color:var(--gray400)">Henüz onarım kaydı yok</div>'; return; }
  const typeLabels = {
    missing_sales_stock: '📦 Satış Stok',
    missing_purchase_stock: '📦 Alış Stok',
    recalc_product_stock: '📦 Stok Bakiye',
    recalc_cash_balances: '💰 Kasa Bakiye',
    recalc_bank_balances: '🏦 Banka Bakiye'
  };
  el.innerHTML = `<table>
    <thead><tr><th>Tarih</th><th>Onarım Türü</th><th>Yapan</th><th>Dönem</th><th class="text-right">Etkilenen</th><th class="text-right">Oluşturulan</th></tr></thead>
    <tbody>
      ${data.map(r => `<tr>
        <td style="color:var(--gray500);font-size:11px">${fmtDateTime(r.created_at)}</td>
        <td>${typeLabels[r.repair_type] || r.repair_type}</td>
        <td>${r.performed_by_name || '—'}</td>
        <td style="font-size:11px;color:var(--gray500)">${r.date_range_start || '—'} / ${r.date_range_end || '—'}</td>
        <td class="text-right">${r.affected_records || 0}</td>
        <td class="text-right">${r.created_records || 0}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

let _cleanupPreview = null;
let _cleanupCompanyId = null;

async function loadCleanupPreview() {
  const prev = document.getElementById('cleanup-preview');
  const acts = document.getElementById('cleanup-actions');
  const res  = document.getElementById('cleanup-result');
  if (res) res.innerHTML = '';
  if (!_cleanupCompanyId) { if (prev) prev.innerHTML = ''; if (acts) acts.style.display='none'; return; }

  if (prev) prev.innerHTML = '<div style="padding:12px;color:var(--gray500)">Yükleniyor...</div>';
  const { data, error } = await sb.rpc('sp_cleanup_preview', { p_company_id: _cleanupCompanyId });
  if (error || !data) { if (prev) prev.innerHTML = '<div style="color:#dc2626">Hata: '+(error?.message||'veri yok')+'</div>'; return; }
  _cleanupPreview = data;

  const fmtN = n => parseFloat(n||0).toLocaleString('tr-TR',{maximumFractionDigits:0});
  const fmtD = d => d ? new Date(d).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
  const total = (data.sales||0)+(data.purchases||0)+(data.movements||0)+(data.cash_txns||0)+(data.bank_txns||0)+(data.contact_txns||0)+(data.journal_entries||0)+(data.payments||0);

  if (prev) prev.innerHTML = `
    <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px;font-size:12px;line-height:1.8">
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">🏢 ${data.company_name}</div>
      <div>👤 Owner: ${data.owner_name||'—'} &nbsp; ${data.owner_email||''}</div>
      <div>💳 Plan: ${(data.plan||'free').charAt(0).toUpperCase()+(data.plan||'free').slice(1)} &nbsp; 📅 Kayıt: ${fmtD(data.created_at)} &nbsp; 📍 ${(data.country_code||'—').toUpperCase()}</div>
      <hr style="border:none;border-top:1px solid #e5e7eb;margin:8px 0">
      <div style="font-weight:600;margin-bottom:4px">Silinecek veriler:</div>
      <div>📄 ${fmtN(data.sales)} satış siparişi &nbsp;&nbsp; ${fmtN(data.sales_total)} ₸</div>
      <div>📦 ${fmtN(data.purchases)} alış siparişi &nbsp;&nbsp; ${fmtN(data.purchases_total)} ₸</div>
      <div>📊 ${fmtN(data.movements)} stok hareketi</div>
      <div>💰 ${fmtN(data.cash_txns)} kasa hareketi &nbsp; 🏦 ${fmtN(data.bank_txns)} banka hareketi</div>
      <div>👥 ${fmtN(data.contact_txns)} cari işlem &nbsp; 💳 ${fmtN(data.payments)} ödeme &nbsp; 📒 ${fmtN(data.journal_entries)} muhasebe kaydı</div>
      <div style="margin-top:6px;font-weight:600;color:#b91c1c">Toplam: ${fmtN(total)} kayıt</div>
    </div>`;
  if (acts) acts.style.display = total > 0 ? 'block' : 'none';
}

async function doCleanup(scope) {
  if (!_cleanupCompanyId || !_cleanupPreview) return;
  const name = _cleanupPreview.company_name;

  // Step 1: type company name
  const typed = prompt(`Devam etmek için şirket adını yazın:\n\n"${name}"`);
  if (!typed || typed.trim().toLowerCase() !== name.toLowerCase()) {
    showToast('Şirket adı eşleşmedi', 'error'); return;
  }

  // Step 2: superadmin password
  const pwd = prompt('Servis paneli şifrenizi girin:');
  if (!pwd) return;
  const { data: auth } = await sb.rpc('sp_login', { p_email: user.email, p_password: pwd });
  if (!auth?.ok) { showToast('Geçersiz şifre', 'error'); return; }

  // Execute
  const { data, error } = await sb.rpc('sp_cleanup_execute', {
    p_company_id: _cleanupCompanyId,
    p_sp_user_id: user.id,
    p_scope: scope
  });
  if (error) { showToast('Hata: ' + error.message, 'error'); return; }

  const counts = data?.counts || {};
  const resEl = document.getElementById('cleanup-result');
  const deadline = new Date(); deadline.setDate(deadline.getDate()+7);
  const items = Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>`✅ ${v} ${k}`).join('<br>');

  if (resEl) resEl.innerHTML = `
    <div style="background:#ecfdf5;border:1px solid #6ee7b7;border-radius:10px;padding:14px;font-size:12px">
      <div style="font-weight:700;font-size:14px;color:#065f46;margin-bottom:6px">✅ ${name} verileri temizlendi</div>
      ${items}
      <div style="margin-top:8px;color:#92400e">⚠️ 7 gün içinde geri alabilirsiniz — Son tarih: ${deadline.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})}</div>
      <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="doRestore('${_cleanupCompanyId}')">↩️ Geri Al</button>
    </div>`;

  document.getElementById('cleanup-actions').style.display = 'none';
  loadCleanupPreview();
  loadCleanupLog();
  sb.rpc('sp_log', { p_user_id: user.id, p_action: 'test_data_cleanup', p_company_id: _cleanupCompanyId, p_details: counts });
}

async function doRestore(companyId) {
  if (!confirm('Bu şirketin temizlenen verilerini geri almak istediğinize emin misiniz?')) return;
  const { data, error } = await sb.rpc('sp_cleanup_restore', { p_company_id: companyId, p_sp_user_id: user.id });
  if (error) { showToast('Hata: ' + error.message, 'error'); return; }
  showToast(`${data?.restored||0} kayıt geri alındı`, 'success');
  loadCleanupPreview();
  loadCleanupLog();
}

async function loadCleanupLog() {
  const el = document.getElementById('cleanup-log');
  if (!el) return;
  // Purge expired first
  await sb.rpc('sp_cleanup_purge_expired');
  const { data } = await sb.rpc('sp_cleanup_list');
  if (!data?.length) { el.innerHTML = '<div style="padding:8px;color:var(--gray400)">Bekleyen temizleme yok</div>'; return; }

  el.innerHTML = data.map(r => {
    const counts = r.details?.counts || {};
    const autoDelete = r.details?.auto_delete_at ? new Date(r.details.auto_delete_at) : null;
    const daysLeft = autoDelete ? Math.max(0, Math.ceil((autoDelete - Date.now()) / 86400000)) : 0;
    const ago = Math.ceil((Date.now() - new Date(r.created_at).getTime()) / 86400000);
    const parts = Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>`${v} ${k}`).join(', ');
    return `<div style="padding:10px;border:1px solid var(--gray100);border-radius:8px;margin-bottom:8px">
      <div style="font-weight:600">${r.company_name} — ${r.performed_by_name||'—'} — ${ago} gün önce</div>
      <div style="color:var(--gray500);font-size:11px;margin:4px 0">${parts}</div>
      <div style="color:#92400e;font-size:11px">⏰ ${daysLeft} gün sonra kalıcı silinecek</div>
      <div style="margin-top:6px;display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="doRestore('${r.company_id}')">↩️ Geri Al</button>
      </div>
    </div>`;
  }).join('');
}

const _spSearchCallbacks = {};

function spSearchInit(prefix, onSelect) {
  _spSearchCallbacks[prefix] = onSelect;
  const list = document.getElementById(prefix + '-list');
  if (list) {
    list.innerHTML = companies.map(c => `<div class="sp-search-item" data-id="${c.id}" onclick="spSearchSelect('${prefix}','${c.id}')"><span class="co-name">${c.name}</span><span class="co-email">${c.owner_email||c.plan||''}</span></div>`).join('');
  }
  document.addEventListener('click', (e) => {
    const wrap = document.getElementById(prefix + '-wrap');
    if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
  });
}

function spSearchOpen(prefix) {
  document.getElementById(prefix + '-wrap')?.classList.add('open');
  spSearchFilter(prefix, document.getElementById(prefix + '-search')?.value || '');
}

function spSearchFilter(prefix, q) {
  const list = document.getElementById(prefix + '-list');
  if (!list) return;
  const term = q.toLowerCase();
  list.querySelectorAll('.sp-search-item').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = !term || text.includes(term) ? '' : 'none';
  });
}

function spSearchSelect(prefix, id) {
  const hidden = document.getElementById(prefix);
  if (hidden) hidden.value = id;
  const c = companies.find(x => x.id === id);
  const search = document.getElementById(prefix + '-search');
  if (search && c) search.value = c.name;
  document.getElementById(prefix + '-wrap')?.classList.remove('open');
  if (_spSearchCallbacks[prefix]) _spSearchCallbacks[prefix](id);
}

// ===== CARI FIX =====
async function fixSingleContactBalance(contactId, rowIdx) {
  const row = document.getElementById('rt-contact-row-' + rowIdx);
  const { data, error } = await sb.rpc('sp_fix_contact_balance', { p_company_id: repairCompanyId, p_contact_id: contactId });
  if (error) { showToast(error.message, 'error'); return; }
  if (row) { row.style.background = '#dcfce7'; row.querySelector('td:last-child').innerHTML = '✅'; }
  const el = document.getElementById('rt-result-contact_balances');
  const remaining = el?.querySelectorAll('tbody tr:not([style*=dcfce7]) button')?.length || 0;
  const counter = document.getElementById('rt-contact-counter');
  if (counter) counter.textContent = remaining > 0 ? `⚠️ ${remaining} caride açık bakiye var` : '✅ Tümü düzeltildi';
  if (remaining === 0) { const fixAll = document.getElementById('rt-contact-fixall'); if (fixAll) fixAll.style.display = 'none'; }
}

async function fixAllContactBalances() {
  const el = document.getElementById('rt-result-contact_balances');
  const btns = el?.querySelectorAll('tbody tr:not([style*=dcfce7]) button');
  if (!btns?.length) return;
  for (const btn of btns) btn.click();
}

function showAddPanelUserModal() {
  const tempPwd = Math.random().toString(36).substring(2, 10);
  openModal('Panel Kullanıcısı Ekle', `
    <div class="field"><label>Ad</label><input type="text" id="pu-name"></div>
    <div class="field"><label>Email</label><input type="email" id="pu-email"></div>
    <div class="field"><label>Rol</label>
      <select id="pu-role">
        <option value="support">Destek</option>
        <option value="partner">Partner</option>
        <option value="partner_manager">Partner Yöneticisi</option>
      </select>
    </div>
    <div class="field"><label>Geçici Şifre (otomatik)</label><input type="text" id="pu-pwd" value="${tempPwd}" readonly style="font-family:monospace"></div>
  `, [
    { text: 'İptal', cls: 'btn-outline', onclick: 'closeModal()' },
    { text: 'Kaydet', cls: 'btn-primary', onclick: 'savePanelUser()' }
  ]);
}

async function savePanelUser() {
  const name = document.getElementById('pu-name').value.trim();
  const email = document.getElementById('pu-email').value.trim();
  const role = document.getElementById('pu-role').value;
  const pwd = document.getElementById('pu-pwd').value;
  if (!name || !email) { showToast('Ad ve email gerekli', 'error'); return; }
  const { error } = await sb.from('service_panel_users').insert({ name, email, role, password_hash: pwd, is_active: true });
  if (error) { showToast(getErrorMessage(error), 'error'); return; }
  await sb.rpc('sp_log', { p_user_id: user.id, p_action: 'create_panel_user', p_details: { email, role } });
  closeModal();
  showToast('Kullanıcı eklendi. Şifre: ' + pwd, 'success');
  renderPanelUsers();
}

// ===== SYSTEM SETTINGS (superadmin) =====
async function renderSystem() {
  const content = document.getElementById('sp-content');
  content.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray400)">⏳ Yükleniyor...</div>';
  const { data: info } = await sb.rpc('sp_get_anthropic_key_info', { p_user_id: user.id });
  if (info && info.error){
    content.innerHTML = `<div class="card" style="padding:24px;color:#dc2626">⛔ ${info.error}</div>`;
    return;
  }
  const masked = info?.masked || '';
  const has = info?.has_key === true;
  content.innerHTML = `
    <div class="card" style="padding:24px;max-width:720px">
      <h2 style="font-size:18px;margin-bottom:6px">🤖 AI Entegrasyonu</h2>
      <div style="font-size:12px;color:var(--gray500);margin-bottom:18px">Anthropic Claude API anahtarı — etiket çevirisi, AI Asistan ve müşteri destek özellikleri için kullanılır.</div>

      <label style="font-size:12px;font-weight:600;color:var(--gray500);display:block;margin-bottom:4px">Anthropic API Key</label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <input type="password" id="anth-key-input" placeholder="${has ? masked : 'sk-ant-...'}" style="flex:1;padding:9px 12px;border:1px solid var(--gray200);border-radius:8px;font-family:'SF Mono',Menlo,monospace;font-size:13px;background:#fff" autocomplete="off">
        <button class="btn btn-ghost" type="button" onclick="toggleApiKeyVisibility()">👁</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <button class="btn btn-primary" type="button" onclick="saveAnthropicKey()" data-action="save">💾 Kaydet</button>
        <button class="btn btn-outline" type="button" onclick="testAnthropicKey()" ${has ? '' : 'disabled'}>🧪 Test Et</button>
        <span id="anth-test-result" style="font-size:12px;margin-left:6px"></span>
      </div>
      <div style="font-size:11px;color:var(--gray500);margin-top:8px;line-height:1.5">
        ${has ? `Mevcut: <code style="font-family:'SF Mono',Menlo,monospace">${masked}</code> (${info.length} karakter)` : '<span style="color:#ea580c">⚠️ Henüz anahtar tanımlanmamış</span>'}<br>
        Anahtarı buradan al: <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--blue)">console.anthropic.com</a><br>
        Bu anahtar bütün Solvenin müşterileri tarafından paylaşılır. Kullanım faturası Anthropic hesabına yansır.
      </div>
    </div>
  `;
}

function toggleApiKeyVisibility(){
  const inp = document.getElementById('anth-key-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function saveAnthropicKey(){
  const v = document.getElementById('anth-key-input').value.trim();
  if (!v){ showToast('Boş anahtar gönderilemez', 'error'); return; }
  if (!v.startsWith('sk-ant-')){ showToast('Anthropic anahtarı sk-ant- ile başlamalı', 'error'); return; }
  const { data, error } = await sb.rpc('sp_set_anthropic_key', { p_user_id: user.id, p_value: v });
  if (error){ showToast(error.message, 'error'); return; }
  if (!data?.success){ showToast(data?.error || 'Kaydedilemedi', 'error'); return; }
  showToast('API key kaydedildi ✓', 'success');
  renderSystem();
}

async function testAnthropicKey(){
  const result = document.getElementById('anth-test-result');
  result.textContent = '⏳ Test ediliyor…'; result.style.color = 'var(--gray500)';
  try {
    const { data, error } = await sb.functions.invoke('claude-proxy', {
      body: { prompt: 'ping', max_tokens: 10, model: 'claude-haiku-4-5-20251001' }
    });
    if (error) throw new Error(error.message || 'edge fn error');
    if (data?.error){
      result.textContent = '❌ ' + (data.error?.message || data.error);
      result.style.color = '#dc2626'; return;
    }
    if (data?.content){
      result.textContent = '✅ Bağlantı başarılı';
      result.style.color = '#059669';
    } else {
      result.textContent = '❌ Beklenmedik yanıt';
      result.style.color = '#dc2626';
    }
  } catch(e){
    result.textContent = '❌ ' + e.message;
    result.style.color = '#dc2626';
  }
}

// ===== MODAL HELPERS =====
function openModal(title, bodyHTML, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = buttons.map(b => `<button class="btn ${b.cls}" onclick="${b.onclick}">${b.text}</button>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
